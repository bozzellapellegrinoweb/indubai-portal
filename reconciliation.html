    .rec-grid { display:grid; grid-template-columns:260px 1fr; gap:0; min-height:calc(100vh - 80px); }

    .rec-sidebar { background:white; border-right:1.5px solid var(--border); padding:16px 0; overflow-y:auto; max-height:calc(100vh - 80px); }

    .rec-main { padding:24px; overflow-y:auto; max-height:calc(100vh - 80px); }
    .rec-empty { text-align:center; padding:80px 20px; color:var(--text-muted); }

    .rec-upload { border:2.5px dashed var(--border); border-radius:14px; padding:40px; text-align:center; cursor:pointer; transition:all .2s; background:white; margin-bottom:20px; }
    .rec-upload:hover, .rec-upload.dragover { border-color:var(--primary); background:#f0f6ff; }
    .rec-upload-icon { font-size:36px; margin-bottom:10px; }
    .rec-upload-text { font-size:14px; font-weight:600; color:var(--text-primary); }

    .rec-uploads-list { margin-bottom:20px; }

    .rec-upload-item.active { border-color:var(--primary); background:#f0f6ff; }

    .rec-upload-status { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
    .rus-uploaded { background:#fef3c7; color:#92400e; }
    .rus-parsed { background:#dbeafe; color:#1d4ed8; }
    .rus-reconciled { background:#dcfce7; color:#166534; }
    /* Transactions table */
    .rec-tx-card { background:white; border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
    .rec-tx-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }

    .rec-tx-count { font-size:12px; color:var(--text-muted); font-weight:600; }
    .rec-tx-table { width:100%; border-collapse:collapse; font-size:13px; }
    .rec-tx-table th { text-align:left; padding:10px 14px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); border-bottom:1px solid var(--border); background:var(--surface2); }
    .rec-tx-table td { padding:10px 14px; border-bottom:1px solid var(--border); }
    .rec-tx-table tr:hover { background:#f8fafc; }
    .tx-debit { color:#dc2626; font-weight:600; }
    .tx-credit { color:#059669; font-weight:600; }
    .tx-status { font-size:11px; font-weight:700; padding:2px 8px; border-radius:12px; }
    .txs-pending { background:#f3f4f6; color:#6b7280; }
    .txs-matched { background:#dcfce7; color:#166534; }
    .txs-probable { background:#fef3c7; color:#92400e; }
    .txs-unmatched { background:#fee2e2; color:#dc2626; }
    /* Month/Year selector */
    .rec-period { display:flex; gap:10px; align-items:center; margin-bottom:16px; }
    .rec-period select { padding:6px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; font-weight:600; }

    .rec-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    @media(max-width:900px) {
      .rec-grid { grid-template-columns:1fr; }
      .rec-sidebar { max-height:200px; border-right:none; border-bottom:1.5px solid var(--border); }

<div class="main-content">

      <h1 style="font-size:22px;font-weight:800;margin:0">🔄 Riconciliazione</h1>

<input type="file" id="file-input" accept=".csv,.xlsx,.xls,.pdf" style="display:none" onchange="handleFileSelect(this.files)">

<script src="/js/supabase.js"></script>
<script src="/js/notify.js"></script>
<script src="/js/app.js"></script>
<script src="/js/i18n.js"></script>
<script>
// ============================================================
// Reconciliation — Phase 1: Upload & Parse
// ============================================================

let allClients = [];
let selectedClient = null;
let selectedUpload = null;
let clientUploads = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;

// ── Bank format auto-detection ──────────────────────────────

const BANK_SIGNATURES = {
  wio:     { fingerprint: ['date','description','debit','credit','balance'], label: 'WIO Bank', source: 'bank' },
  adcb:    { fingerprint: ['transaction date','description','debit amount','credit amount'], label: 'ADCB', source: 'bank' },
  enbd:    { fingerprint: ['date','narration','withdrawals','deposits'], label: 'Emirates NBD', source: 'bank' },
  rakbank: { fingerprint: ['value date','reference','debit','credit'], label: 'RAKBANK', source: 'bank' },
  mashreq: { fingerprint: ['posting date','description','debit','credit','balance'], label: 'Mashreq', source: 'bank' },
  fab:     { fingerprint: ['transaction date','details','debit','credit'], label: 'FAB', source: 'bank' },
  stripe:  { fingerprint: ['created (utc)','amount','fee','net','description'], label: 'Stripe', source: 'stripe' },
  paypal:  { fingerprint: ['date','name','type','gross','fee'], label: 'PayPal', source: 'paypal' },
  wise:    { fingerprint: ['transferwise id','date','amount','currency'], label: 'Wise', source: 'wise' },
};

const BANK_COLUMNS = {
  wio:     { dateCol:'Date', descCol:'Description', debitCol:'Debit', creditCol:'Credit', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  adcb:    { dateCol:'Transaction Date', descCol:'Description', debitCol:'Debit Amount', creditCol:'Credit Amount', balanceCol:'Running Balance', dateFormat:'DD-MM-YYYY' },
  enbd:    { dateCol:'Date', descCol:'Narration', debitCol:'Withdrawals', creditCol:'Deposits', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  rakbank: { dateCol:'Value Date', descCol:'Description', debitCol:'Debit', creditCol:'Credit', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  mashreq: { dateCol:'Posting Date', descCol:'Description', debitCol:'Debit', creditCol:'Credit', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  fab:     { dateCol:'Transaction Date', descCol:'Details', debitCol:'Debit', creditCol:'Credit', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  stripe:  { dateCol:'Created (UTC)', descCol:'Description', debitCol:'Fee', creditCol:'Amount', balanceCol:null, dateFormat:'YYYY-MM-DD' },
  paypal:  { dateCol:'Date', descCol:'Name', debitCol:null, creditCol:'Gross', balanceCol:'Balance', dateFormat:'DD/MM/YYYY' },
  wise:    { dateCol:'Date', descCol:'Description', debitCol:null, creditCol:'Amount', balanceCol:'Running Balance', dateFormat:'DD-MM-YYYY' },
};

function detectBank(headers) {
  const lowerHeaders = headers.map(h => (h||'').toLowerCase().trim());
  let bestMatch = null, bestScore = 0;
  for (const [bank, sig] of Object.entries(BANK_SIGNATURES)) {
    const matchCount = sig.fingerprint.filter(col =>
      lowerHeaders.some(h => h.includes(col))
    ).length;
    const score = matchCount / sig.fingerprint.length;
    if (score > bestScore) { bestScore = score; bestMatch = bank; }
  }
  return bestScore >= 0.6 ? bestMatch : null;
}

// ── Date parsing ────────────────────────────────────────────

function parseDate(str, format) {
  if (!str) return null;
  str = str.trim();
  try {
    if (format === 'YYYY-MM-DD') return new Date(str);
    // Try DD/MM/YYYY or DD-MM-YYYY
    const parts = str.split(/[\/\-\.]/);
    if (parts.length === 3) {
      let d, m, y;
      if (parts[0].length === 4) { y = parts[0]; m = parts[1]; d = parts[2]; }
      else { d = parts[0]; m = parts[1]; y = parts[2]; }
      if (y.length === 2) y = '20' + y;
      const date = new Date(y, m - 1, d);
      if (!isNaN(date)) return date;
    }
    // Fallback
    const fallback = new Date(str);
    if (!isNaN(fallback)) return fallback;
  } catch(e) {}
  return null;
}

function parseAmount(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return val;
  // Remove currency symbols, spaces, thousands separators
  const clean = String(val).replace(/[^\d.\-,]/g, '').replace(/,(\d{2})$/, '.$1').replace(/,/g, '');
  return parseFloat(clean) || 0;
}

// ── CSV/Excel Parsing ───────────────────────────────────────

function parseCSVData(csvText) {
  const result = Papa.parse(csvText, { header: true, skipEmptyLines: true, dynamicTyping: false });
  if (!result.data || !result.data.length) throw new Error('Nessuna riga trovata nel CSV');
  return { headers: result.meta.fields || [], rows: result.data };
}

function parseExcelData(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
  if (!json.length) throw new Error('Nessuna riga trovata nel foglio Excel');
  const headers = Object.keys(json[0]);
  return { headers, rows: json };
}

function mapTransactions(rows, bank, headers) {
  const cols = BANK_COLUMNS[bank] || null;
  if (!cols) {
    // Generic: try to auto-map by common column names
    return autoMapTransactions(rows, headers);
  }

  return rows.map(row => {
    // Find the actual column name (case-insensitive partial match)
    const getVal = (colName) => {
      if (!colName) return null;
      const key = Object.keys(row).find(k => k.toLowerCase().trim().includes(colName.toLowerCase()));
      return key ? row[key] : null;
    };

    const date = parseDate(getVal(cols.dateCol), cols.dateFormat);
    const desc = getVal(cols.descCol) || '';
    const debit = Math.abs(parseAmount(getVal(cols.debitCol)));
    const credit = Math.abs(parseAmount(getVal(cols.creditCol)));
    const balance = cols.balanceCol ? parseAmount(getVal(cols.balanceCol)) : null;

    if (!date) return null; // Skip rows without a valid date

    return { tx_date: date.toISOString().split('T')[0], description: desc.trim(), reference: '', debit, credit, balance, currency: 'AED' };
  }).filter(Boolean);
}

function autoMapTransactions(rows, headers) {
  // Heuristic: find columns by common keywords
  const lower = headers.map(h => h.toLowerCase());
  const find = (keywords) => headers[lower.findIndex(h => keywords.some(k => h.includes(k)))] || null;

  const dateCol = find(['date', 'data', 'posting']);
  const descCol = find(['description', 'narration', 'details', 'memo', 'name']);
  const debitCol = find(['debit', 'withdrawal', 'out']);
  const creditCol = find(['credit', 'deposit', 'in', 'amount']);
  const balanceCol = find(['balance', 'saldo']);

  if (!dateCol) throw new Error('Colonna data non trovata. Colonne disponibili: ' + headers.join(', '));

  return rows.map(row => {
    const date = parseDate(row[dateCol]);
    if (!date) return null;

    let debit = 0, credit = 0;
    if (debitCol && creditCol) {
      debit = Math.abs(parseAmount(row[debitCol]));
      credit = Math.abs(parseAmount(row[creditCol]));
    } else if (creditCol) {
      const amt = parseAmount(row[creditCol]);
      if (amt < 0) debit = Math.abs(amt);
      else credit = amt;
    }

    return {
      tx_date: date.toISOString().split('T')[0],
      description: (row[descCol] || '').trim(),
      reference: '',
      debit, credit,
      balance: balanceCol ? parseAmount(row[balanceCol]) : null,
      currency: 'AED'
    };
  }).filter(Boolean);
}

// ── Init ────────────────────────────────────────────────────

(async function init() {
  try {
    const rows = await sb.db.select('clients', {
      columns: 'id,company_name,zoho_org_id,is_active',
      filter: 'is_active=eq.true',
      order: 'company_name.asc'
    });
    allClients = rows || [];
    renderClientList();
  } catch(e) {
    console.error('Load clients error:', e);
  }
})();

// ── Client list ─────────────────────────────────────────────

function renderClientList() {
  const search = (document.getElementById('client-search')?.value || '').toLowerCase();
  let list = allClients;
  if (search) list = list.filter(c => (c.company_name||'').toLowerCase().includes(search));

  const el = document.getElementById('client-list');
  el.innerHTML = list.map(c => `
    <div class="rec-client ${selectedClient?.id === c.id ? 'active' : ''}" onclick="selectClient('${c.id}')">
      <div class="rec-client-name">${esc(c.company_name)}</div>
      <div class="rec-client-badge rcb-none" id="badge-${c.id}"></div>
    </div>
  `).join('');
}

async function selectClient(clientId) {
  selectedClient = allClients.find(c => c.id === clientId);
  selectedUpload = null;
  renderClientList();
  await loadClientView();
}

// ── Client view (upload + transactions) ─────────────────────

async function loadClientView() {
  if (!selectedClient) return;
  const main = document.getElementById('rec-main');

  main.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <h2 style="font-size:18px;font-weight:800;margin:0">${esc(selectedClient.company_name)}</h2>
      <div class="rec-period">
        <select id="sel-month" onchange="currentMonth=+this.value;loadClientView()">
          ${[...Array(12)].map((_,i) => `<option value="${i+1}" ${i+1===currentMonth?'selected':''}>${['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][i]}</option>`).join('')}
        </select>
        <select id="sel-year" onchange="currentYear=+this.value;loadClientView()">
          ${[2024,2025,2026].map(y => `<option value="${y}" ${y===currentYear?'selected':''}>${y}</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- Upload zone -->
    <div class="rec-upload" id="upload-zone"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="event.preventDefault();this.classList.remove('dragover');handleFileSelect(event.dataTransfer.files)"
         onclick="document.getElementById('file-input').click()">
      <div class="rec-upload-icon">📄</div>
      <div class="rec-upload-text">Trascina qui il file o clicca per caricare</div>
      <div class="rec-upload-hint">CSV, Excel (.xlsx) o PDF • Il formato della banca viene riconosciuto automaticamente</div>
    </div>

    <!-- Previous uploads for this client/period -->
    <div id="uploads-section"></div>

    <!-- Transactions view -->
    <div id="tx-section"></div>
  `;

  await loadUploads();
}

// ── Load existing uploads ───────────────────────────────────

async function loadUploads() {
  try {
    const rows = await sb.db.select('statement_uploads', {
      filter: `client_id=eq.${selectedClient.id}&year=eq.${currentYear}&month=eq.${currentMonth}`,
      order: 'created_at.desc'
    });
    clientUploads = rows || [];
  } catch(e) {
    clientUploads = [];
  }

  const el = document.getElementById('uploads-section');
  if (!clientUploads.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">
      📁 Statement caricati (${['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][currentMonth-1]} ${currentYear})
    </div>
    <div class="rec-uploads-list">
      ${clientUploads.map(u => `
        <div class="rec-upload-item ${selectedUpload?.id === u.id ? 'active' : ''}" onclick="viewUpload('${u.id}')">
          <div style="font-size:20px">📊</div>
          <div class="rec-upload-info">
            <div class="rec-upload-name">${esc(u.file_name)}</div>
            <div class="rec-upload-meta">${u.bank_name || u.source} • ${u.transaction_count} transazioni • ${new Date(u.created_at).toLocaleDateString('it-IT')}</div>
          </div>
          <span class="rec-upload-status rus-${u.status}">${u.status}</span>
          <button onclick="event.stopPropagation();deleteUpload('${u.id}')" style="background:none;border:none;cursor:pointer;font-size:16px;opacity:.4" title="Elimina">🗑</button>
        </div>
      `).join('')}
    </div>
  `;

  // Auto-select first if none selected
  if (clientUploads.length && !selectedUpload) {
    await viewUpload(clientUploads[0].id);
  }
}

// ── View upload transactions ────────────────────────────────

async function viewUpload(uploadId) {
  selectedUpload = clientUploads.find(u => u.id === uploadId);
  if (!selectedUpload) return;

  // Re-render uploads to highlight active
  await loadUploads();

  // Load transactions
  try {
    const txs = await sb.db.select('parsed_transactions', {
      filter: `upload_id=eq.${uploadId}`,
      order: 'tx_date.asc'
    });
    renderTransactions(txs || []);
  } catch(e) {
    document.getElementById('tx-section').innerHTML = `<div style="padding:20px;color:#dc2626">Errore: ${e.message}</div>`;
  }
}

function renderTransactions(txs) {
  const el = document.getElementById('tx-section');
  if (!txs.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">Nessuna transazione trovata</div>';
    return;
  }

  const totalDebit = txs.reduce((s, t) => s + (parseFloat(t.debit) || 0), 0);
  const totalCredit = txs.reduce((s, t) => s + (parseFloat(t.credit) || 0), 0);

  el.innerHTML = `
    <div class="rec-tx-card">
      <div class="rec-tx-header">
        <div class="rec-tx-title">Transazioni estratte</div>
        <div class="rec-tx-count">${txs.length} transazioni</div>
        <div style="font-size:12px;color:var(--text-muted)">
          Debiti: <span class="tx-debit">AED ${totalDebit.toLocaleString('it-IT',{minimumFractionDigits:2})}</span> •
          Crediti: <span class="tx-credit">AED ${totalCredit.toLocaleString('it-IT',{minimumFractionDigits:2})}</span>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="rec-tx-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrizione</th>
              <th style="text-align:right">Debito</th>
              <th style="text-align:right">Credito</th>
              <th style="text-align:right">Saldo</th>
              <th>Stato</th>
            </tr>
          </thead>
          <tbody>
            ${txs.map(t => `
              <tr>
                <td style="white-space:nowrap">${new Date(t.tx_date).toLocaleDateString('it-IT')}</td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.description)}">${esc(t.description)}</td>
                <td style="text-align:right" class="${parseFloat(t.debit) > 0 ? 'tx-debit' : ''}">${parseFloat(t.debit) > 0 ? parseFloat(t.debit).toLocaleString('it-IT',{minimumFractionDigits:2}) : ''}</td>
                <td style="text-align:right" class="${parseFloat(t.credit) > 0 ? 'tx-credit' : ''}">${parseFloat(t.credit) > 0 ? parseFloat(t.credit).toLocaleString('it-IT',{minimumFractionDigits:2}) : ''}</td>
                <td style="text-align:right">${t.balance !== null ? parseFloat(t.balance).toLocaleString('it-IT',{minimumFractionDigits:2}) : '—'}</td>
                <td><span class="tx-status txs-${t.match_status}">${{pending:'⏳',matched:'✅',probable:'⚠️',unmatched:'❓',ignored:'➖'}[t.match_status]||'⏳'} ${t.match_status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="rec-actions">
      <button class="btn btn-accent" onclick="alert('Fase 2: Matching con Zoho Books — Coming soon')" disabled>🔄 Avvia Matching</button>
      <button class="btn btn-ghost" onclick="alert('Fase 3: Report transazioni non identificate — Coming soon')" disabled>📄 Genera Report</button>
    </div>
  `;
}

// ── File upload & parsing ───────────────────────────────────

async function handleFileSelect(files) {
  if (!files || !files.length) return;
  if (!selectedClient) { alert('Seleziona prima un cliente'); return; }

  const file = files[0];
  const ext = file.name.split('.').pop().toLowerCase();

  if (!['csv','xlsx','xls','pdf'].includes(ext)) {
    alert('Formato non supportato. Usa CSV, Excel (.xlsx) o PDF.');
    return;
  }

  // Show loading
  const main = document.getElementById('rec-main');
  const uploadZone = document.getElementById('upload-zone');
  if (uploadZone) {
    uploadZone.innerHTML = `<div class="rec-upload-icon">⏳</div><div class="rec-upload-text">Analisi in corso...</div><div class="rec-upload-hint">${esc(file.name)} (${(file.size/1024).toFixed(0)} KB)</div>`;
    uploadZone.style.pointerEvents = 'none';
  }

  try {
    let transactions = [];
    let detectedBank = null;

    if (ext === 'pdf') {
      // PDF → Claude Vision via bright-service Edge Function
      const pdfBase64 = await readFileAsync(file, 'base64');

      if (uploadZone) uploadZone.innerHTML = `<div class="rec-upload-icon">🤖</div><div class="rec-upload-text">AI sta analizzando il PDF...</div><div class="rec-upload-hint">Claude Vision sta estraendo le transazioni da ${esc(file.name)}</div>`;

      const fnUrl = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/bright-service';
      const res = await fetch(fnUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + window.ENV_SUPABASE_ANON_KEY },
        body: JSON.stringify({ action: 'parse_pdf', pdf_base64: pdfBase64 })
      });
      const pdfData = await res.json();
      if (pdfData.error) throw new Error(pdfData.error);
      if (!pdfData.transactions || !pdfData.transactions.length) throw new Error('Nessuna transazione trovata nel PDF');

      detectedBank = pdfData.bank_name || 'PDF Statement';
      transactions = pdfData.transactions.map(tx => ({
        tx_date: tx.date,
        description: tx.description || '',
        reference: tx.reference || '',
        debit: Math.abs(parseFloat(tx.debit) || 0),
        credit: Math.abs(parseFloat(tx.credit) || 0),
        balance: tx.balance !== undefined ? parseFloat(tx.balance) : null,
        currency: pdfData.currency || 'AED'
      })).filter(tx => tx.tx_date);

      // Upload the file to storage
      const uploadRes2 = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileName: file.name, fileBase64: pdfBase64, contentType: 'application/pdf' })
      });
      const uploadData2 = await uploadRes2.json();
      if (!uploadData2.ok) throw new Error(uploadData2.error || 'Upload fallito');

      // Save upload record
      const uploadRecord2 = await sb.db.insert('statement_uploads', [{
        client_id: selectedClient.id,
        year: currentYear,
        month: currentMonth,
        source: 'bank',
        bank_name: detectedBank,
        file_name: file.name,
        storage_path: uploadData2.path,
        file_size: file.size,
        mime_type: 'application/pdf',
        status: 'parsed',
        transaction_count: transactions.length,
        uploaded_by: sb.getCurrentUser()?.id || null
      }], { returning: true });

      const uploadId2 = uploadRecord2?.[0]?.id;
      if (!uploadId2) throw new Error('Errore creazione record upload');

      // Save transactions
      const txRows2 = transactions.map(tx => ({
        upload_id: uploadId2,
        client_id: selectedClient.id,
        ...tx,
        match_status: 'pending'
      }));
      for (let i = 0; i < txRows2.length; i += 50) {
        await sb.db.insert('parsed_transactions', txRows2.slice(i, i + 50));
      }

      // Update bank_statements
      try {
        await sb.db.upsertBankStatement(selectedClient.id, currentYear, currentMonth, { received: true });
      } catch(e) { console.warn('bank_statements upsert:', e); }

      showToast(`✅ ${detectedBank}: ${transactions.length} transazioni estratte dal PDF`, 'success');
      selectedUpload = null;
      await loadClientView();
      return;
    }

    // Read file
    const data = await readFileAsync(file, ext === 'csv' ? 'text' : 'arraybuffer');

    // Parse
    let parsed;
    if (ext === 'csv') {
      parsed = parseCSVData(data);
    } else {
      parsed = parseExcelData(data);
    }

    // Auto-detect bank
    detectedBank = detectBank(parsed.headers);
    const bankLabel = detectedBank ? BANK_SIGNATURES[detectedBank].label : 'Formato generico';
    const bankSource = detectedBank ? BANK_SIGNATURES[detectedBank].source : 'bank';

    // Map transactions
    transactions = mapTransactions(parsed.rows, detectedBank || 'generic', parsed.headers);

    if (!transactions.length) {
      alert('Nessuna transazione trovata nel file. Controlla il formato.');
      await loadClientView();
      return;
    }

    // Upload file to storage
    const fileBase64 = await readFileAsync(file, 'base64');
    const uploadRes = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fileName: file.name, fileBase64, contentType: file.type || 'application/octet-stream' })
    });
    const uploadData = await uploadRes.json();
    if (!uploadData.ok) throw new Error(uploadData.error || 'Upload fallito');

    // Save upload record
    const uploadRecord = await sb.db.insert('statement_uploads', [{
      client_id: selectedClient.id,
      year: currentYear,
      month: currentMonth,
      source: bankSource,
      bank_name: bankLabel,
      file_name: file.name,
      storage_path: uploadData.path,
      file_size: file.size,
      mime_type: file.type,
      status: 'parsed',
      transaction_count: transactions.length,
      uploaded_by: sb.getCurrentUser()?.id || null
    }], { returning: true });

    const uploadId = uploadRecord?.[0]?.id;
    if (!uploadId) throw new Error('Errore creazione record upload');

    // Save transactions
    const txRows = transactions.map(tx => ({
      upload_id: uploadId,
      client_id: selectedClient.id,
      ...tx,
      match_status: 'pending'
    }));

    // Batch insert (max 50 at a time for PostgREST)
    for (let i = 0; i < txRows.length; i += 50) {
      await sb.db.insert('parsed_transactions', txRows.slice(i, i + 50));
    }

    // Update bank_statements tracking
    try {
      await sb.db.upsertBankStatement(selectedClient.id, currentYear, currentMonth, {
        received: true
      });
    } catch(e) { console.warn('bank_statements upsert:', e); }

    // Show success
    showToast(`✅ ${bankLabel}: ${transactions.length} transazioni estratte`, 'success');

    // Reload view
    selectedUpload = null;
    await loadClientView();

  } catch(e) {
    console.error('Parse error:', e);
    alert('Errore: ' + e.message);
    await loadClientView();
  }
}

function readFileAsync(file, format) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      if (format === 'base64') {
        resolve(reader.result.split(',')[1]); // Strip data URL prefix
      } else {
        resolve(reader.result);
      }
    };
    reader.onerror = reject;
    if (format === 'text') reader.readAsText(file);
    else if (format === 'base64') reader.readAsDataURL(file);
    else reader.readAsArrayBuffer(file);
  });
}

// ── Delete upload ───────────────────────────────────────────

async function deleteUpload(uploadId) {
  if (!confirm('Eliminare questo upload e tutte le transazioni associate?')) return;
  try {
    // Delete transactions first (cascade should handle it but be safe)
    await sb.db.update('parsed_transactions', `upload_id=eq.${uploadId}`, { match_status: 'pending' });
    // Actually delete
    const SB = window.ENV_SUPABASE_URL;
    const AK = window.ENV_SUPABASE_ANON_KEY;
    const tok = sb.getSession?.()?.access_token || AK;
    // Delete transactions
    await fetch(`${SB}/rest/v1/parsed_transactions?upload_id=eq.${uploadId}`, {
      method: 'DELETE', headers: { apikey: AK, Authorization: 'Bearer ' + tok }
    });
    // Delete upload
    await fetch(`${SB}/rest/v1/statement_uploads?id=eq.${uploadId}`, {
      method: 'DELETE', headers: { apikey: AK, Authorization: 'Bearer ' + tok }
    });
    showToast('Upload eliminato', 'success');
    selectedUpload = null;
    await loadClientView();
  } catch(e) {
    alert('Errore eliminazione: ' + e.message);
  }
}

// ── Utils ───────────────────────────────────────────────────

function esc(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function showToast(msg, type) {
  // Use portal's toast system if available
  if (typeof ui !== 'undefined' && ui.showToast) { ui.showToast(msg, type); return; }
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;color:white;background:' + (type==='success'?'#059669':'#dc2626');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
