<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>InDubai — Il tuo Portale</title>
  <meta name="theme-color" content="#0f1e35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- OneSignal Push -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a1628;
      --navy2: #1a3a5c;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --bg: #f2f2f7;
      --surface: #ffffff;
      --border: rgba(60,60,67,.12);
      --text: #000000;
      --text2: #3c3c43;
      --muted: rgba(60,60,67,.55);
      --blue: #007aff;
      --green: #34c759;
      --red: #ff3b30;
      --orange: #ff9500;
      --purple: #af52de;
      --teal: #30b0c7;
      --r: 12px;
      --tab-h: 83px;
      --hdr-h: 44px;
    }
    body {
      font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── SAFE AREA TOP ── */
    body::before {
      content: '';
      display: block;
      height: env(safe-area-inset-top, 0px);
      background: var(--navy);
    }

    /* ── HEADER ── */
    .header {
      background: rgba(10,22,40,.96);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      height: var(--hdr-h);
      padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 0.5px solid rgba(255,255,255,.08);
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-mark { font-size: 18px; font-weight: 800; color: white; letter-spacing: -.4px; line-height: 1; }
    .logo-mark span { color: var(--gold); }
    .logo-divider, .logo-sub { display: none; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-company { font-size: 12px; color: rgba(255,255,255,.5); font-weight: 500; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-menu {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: white; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-logout { display: none; }

    /* ── LAYOUT ── */
    .sidebar { display: none; }
    .layout { display: block; }
    .main {
      padding: 12px 16px;
      padding-bottom: calc(var(--tab-h) + 16px + env(safe-area-inset-bottom, 0px));
      min-height: calc(100vh - var(--hdr-h));
    }

    /* ── BOTTOM TAB BAR ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: rgba(249,249,249,.94);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid rgba(0,0,0,.15);
      display: flex; align-items: flex-start; padding-top: 8px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-icon { font-size: 22px; line-height: 1; transition: transform .12s; }
    .tab-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: -.1px; }
    .tab-item.active .tab-label { color: var(--blue); font-weight: 600; }
    .tab-item.active .tab-icon { transform: scale(1.1); }
    .tab-item:active .tab-icon { transform: scale(.92); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── SPINNER ── */
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(0,0,0,.06);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      padding: 0 4px; margin-bottom: 8px;
    }

    /* ── HERO (panel anagrafica top) ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(201,168,76,.15);
      border-radius: 50%;
    }
    .hero-welcome { font-size: 12px; color: rgba(255,255,255,.5); font-weight: 500; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
    .hero-title { font-size: 20px; font-weight: 800; color: white; margin-bottom: 6px; line-height: 1.2; }
    .hero-sub { font-size: 12px; color: rgba(255,255,255,.45); line-height: 1.4; margin-bottom: 12px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .hero-badge {
      padding: 3px 10px;
      background: rgba(255,255,255,.12);
      border-radius: 20px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8);
    }
    .hero-badge.gold { background: rgba(201,168,76,.25); color: var(--gold2); }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 16px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .card-body { padding: 12px 16px 16px; }

    /* ── INFO GRID (anagrafica) ── */
    .info-grid { display: flex; flex-direction: column; }
    .info-field {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      gap: 12px;
    }
    .info-field:last-child { border-bottom: none; padding-bottom: 0; }
    .info-field label { font-size: 13px; color: var(--muted); font-weight: 400; flex-shrink: 0; }
    .info-field span { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; word-break: break-word; }
    .info-field span.empty { color: var(--muted); font-weight: 400; font-style: italic; }

    /* ── FINANCIALS ── */
    .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .fin-card { background: var(--surface); border-radius: var(--r); padding: 14px; }
    .fin-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .fin-value { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .fin-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .fin-card.outstanding .fin-value { color: var(--orange); }
    .fin-card.collected .fin-value { color: var(--green); }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green { background: rgba(52,199,89,.1); color: #1a7a35; }
    .badge-yellow { background: rgba(255,149,0,.1); color: #b06800; }
    .badge-red { background: rgba(255,59,48,.08); color: #c0392b; }
    .badge-blue { background: rgba(0,122,255,.1); color: var(--blue); }
    .badge-gray { background: rgba(60,60,67,.06); color: var(--muted); }
    .badge-orange { background: rgba(255,149,0,.1); color: #b06800; }

    /* ── VISA CARDS ── */
    .visa-card {
      background: var(--surface); border-radius: var(--r);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .visa-icon { font-size: 28px; }
    .visa-name { font-size: 15px; font-weight: 600; }
    .visa-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .visa-exp { margin-left: auto; text-align: right; }
    .visa-exp-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .visa-exp-date { font-size: 13px; font-weight: 600; margin-top: 2px; }

    /* ── SCADENZE ── */
    .scad-row {
      background: var(--surface); border-radius: var(--r);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .scad-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .scad-title { font-size: 15px; font-weight: 500; }
    .scad-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .scad-days { margin-left: auto; font-size: 13px; font-weight: 700; white-space: nowrap; }

    /* ── DOCUMENTI DRIVE ── */
    .drive-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
    .breadcrumb { font-size: 13px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vbtn-group { display: flex; gap: 4px; }
    .vbtn { padding: 5px 10px; background: rgba(60,60,67,.08); border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--muted); }
    .vbtn.on { background: var(--blue); color: white; }
    .folder-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; padding-bottom: 2px; }
    .folder-tabs::-webkit-scrollbar { display: none; }
    .folder-tab { padding: 5px 14px; background: rgba(60,60,67,.08); border: none; border-radius: 20px; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; }
    .folder-tab.active { background: var(--blue); color: white; }

    /* Drive grid */
    .f-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 8px; }
    .f-card {
      background: var(--surface); border-radius: 12px; padding: 12px 6px;
      text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .f-card:active { opacity: .65; transform: scale(.96); }
    .f-ico { font-size: 30px; margin-bottom: 6px; }
    .f-nm { font-size: 11px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .f-sz { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Drive list */
    .f-list { background: var(--surface); border-radius: var(--r); overflow: hidden; }
    .l-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
    }
    .l-row:last-child { border-bottom: none; }
    .l-row:active { background: rgba(0,0,0,.04); }
    .l-ico { font-size: 22px; flex-shrink: 0; }
    .l-nm { flex: 1; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .l-sz { font-size: 12px; color: var(--muted); min-width: 44px; text-align: right; }
    .l-acts { display: flex; gap: 6px; flex-shrink: 0; }
    .f-acts { display: none; }
    .drv-grid { display: contents; }
    .drv-list { display: contents; }
    .drv-card, .drv-dir, .drv-file { cursor: pointer; }

    /* Drive action buttons */
    .btn-dl {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 18px;
      background: var(--blue); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer;
    }
    .btn-act {
      padding: 5px 10px;
      background: rgba(0,122,255,.1); color: var(--blue);
      border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer;
    }

    /* ── MODAL (preview) ── */
    .prev-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.5);
      display: flex; align-items: flex-end;
      display: none;
    }
    .prev-overlay.open { display: flex; }
    .prev-modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-height: 92vh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .prev-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .prev-header::before {
      content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 4px; background: rgba(60,60,67,.15); border-radius: 2px;
    }
    .prev-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    .prev-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(60,60,67,.1); border: none;
      font-size: 13px; cursor: pointer; color: var(--muted);
    }
    .prev-body { flex: 1; overflow: auto; background: var(--bg); min-height: 200px; }

    /* ── SERVIZI ── */
    .srv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .srv-card {
      background: var(--surface); border-radius: var(--r);
      padding: 16px 14px; position: relative;
    }
    .srv-tag {
      position: absolute; top: 10px; right: 10px;
      background: var(--gold); color: white;
      font-size: 9px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .4px;
    }
    .srv-icon { font-size: 28px; margin-bottom: 8px; }
    .srv-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .srv-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }
    .srv-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 8px;
      background: rgba(0,122,255,.08); color: var(--blue);
      border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      text-decoration: none; cursor: pointer;
    }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state .icon, .empty-state .e-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── IOS SHEET ── */
    .ios-sheet-overlay {
      position: fixed; inset: 0; z-index: 499;
      background: rgba(0,0,0,.35);
      display: none;
    }
    .ios-sheet-overlay.open { display: block; }
    .ios-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(242,242,247,.97);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1,.23,1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .ios-sheet.open { transform: translateY(0); }
    .ios-sheet-handle { width: 36px; height: 4px; background: rgba(60,60,67,.25); border-radius: 2px; margin: 10px auto 14px; }
    .ios-sheet-header { padding: 0 20px 14px; border-bottom: 0.5px solid var(--border); }
    .ios-sheet-company { font-size: 17px; font-weight: 700; color: var(--text); }
    .ios-sheet-email { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .ios-sheet-section { padding: 16px 20px 6px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .ios-sheet-item {
      width: 100%; display: flex; align-items: center;
      padding: 12px 20px; background: none; border: none;
      border-bottom: 0.5px solid var(--border);
      font-size: 16px; font-family: inherit; color: var(--text);
      cursor: pointer; text-align: left;
    }
    .ios-sheet-item:active { background: rgba(0,0,0,.04); }
    .ios-sheet-item.active-item { color: var(--blue); font-weight: 500; }
    .item-icon { font-size: 18px; margin-right: 14px; width: 24px; text-align: center; }
    .item-chevron { margin-left: auto; color: var(--muted); font-size: 14px; }
    .ios-sheet-logout {
      width: calc(100% - 32px); margin: 14px 16px;
      padding: 13px; background: rgba(255,59,48,.07);
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; color: var(--red);
      font-family: inherit; cursor: pointer;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 20px; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .6; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-gold { background: var(--gold); color: white; }
    .btn-ghost { background: rgba(0,122,255,.08); color: var(--blue); }
    .btn-danger { background: rgba(255,59,48,.08); color: var(--red); }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }


    /* ── DRIVE classes (used by JS) ── */
    .drv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(82px,1fr)); gap: 8px; }
    .drv-list { background: var(--surface); border-radius: var(--r); overflow: hidden; }
    .drv-card {
      background: var(--surface); border-radius: 12px; padding: 12px 8px;
      text-align: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: opacity .12s;
    }
    .drv-card:active { opacity: .6; }
    .drv-ico { font-size: 32px; margin-bottom: 6px; line-height: 1; }
    .drv-nm { font-size: 11px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .drv-sz { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .drv-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
    }
    .drv-row:last-child { border-bottom: none; }
    .drv-row:active { background: rgba(0,0,0,.04); }
    .drv-row-name { flex: 1; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .drv-row-meta { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── DESKTOP ── */
    @media (min-width: 900px) {
      body::before { display: none; }
      .header { height: 60px; padding: 0 32px; position: sticky; top: 0; }
      .tab-bar { display: none; }
      .sidebar {
        display: block; width: 220px;
        background: var(--surface);
        border-right: 0.5px solid var(--border);
        padding: 20px 0;
        position: sticky; top: 60px;
        height: calc(100vh - 60px); overflow-y: auto; flex-shrink: 0;
      }
      .layout { display: flex; }
      .main { padding: 28px 32px; padding-bottom: 32px; flex: 1; }
      .nav-section { padding: 0 16px 6px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
      .nav-item {
        width: 100%; display: flex; align-items: center; gap: 10px;
        padding: 9px 16px; background: none; border: none;
        border-left: 3px solid transparent;
        font-size: 14px; font-weight: 500; color: var(--text2);
        cursor: pointer; font-family: inherit; text-align: left;
      }
      .nav-item:hover { background: rgba(0,122,255,.05); color: var(--blue); }
      .nav-item.active { background: rgba(0,122,255,.07); border-left-color: var(--blue); color: var(--blue); font-weight: 600; }
      .nav-icon { font-size: 15px; width: 20px; text-align: center; }
      .f-acts { display: flex; gap: 4px; }
    }

  </style>
</head>
<body>

<!-- Desktop header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">In<span>Dubai</span></div>
    <div class="logo-divider"></div>
    <div class="logo-sub">Area Clienti</div>
  </div>
  <div class="header-right">
    <span class="header-company" id="header-company"></span>
    <button class="btn-menu" onclick="openSheet()">☰</button>
  </div>
</div>

<!-- Sheet overlay backdrop -->
<div class="ios-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- iOS Sheet Menu -->
<div class="ios-sheet" id="ios-sheet">
  <div class="ios-sheet-handle"></div>
  <div class="ios-sheet-header">
    <div class="ios-sheet-company" id="sheet-company">—</div>
    <div class="ios-sheet-email" id="sheet-email">—</div>

<script src="supabase.js"></script>
<script>
const SB_URL = window.ENV_SUPABASE_URL;
const SB_KEY = window.ENV_SUPABASE_ANON_KEY;
function H() {
  const tok = sb.getSession()?.access_token || SB_KEY;
  return { apikey: SB_KEY, Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' };
}
async function GET(path) {
  const r = await fetch(SB_URL + path, { headers: H() });
  return r.json();
}
async function doLogout() {
  try { await fetch(SB_URL + '/auth/v1/logout', { method: 'POST', headers: H() }); } catch {}
  localStorage.removeItem('indubai_session');
  window.location.href = 'login.html';
}

let clientData = null;
let allFiles = [];

async function loadFinancials(clientId) {
  // Live sync from Zoho if org_id available
  const orgId = clientData?.zoho_org_id;
  if (orgId) {
    try {
      const FN = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/zoho-proxy';
      const res = await fetch(FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY) },
        body: JSON.stringify({ action: 'client_summary', org_id: orgId }),
      });
      const d = await res.json();
      if (!d.error && d.rolling12AED !== undefined) {
        const fin = {
          client_id: clientId, zoho_org_id: orgId,
          total_invoiced: Math.round(d.totalBilledAED || 0),
          total_collected: Math.round(d.totalPaidAED || 0),
          total_outstanding: Math.round(d.totalUnpaidAED || 0),
          invoiced_12m: Math.round(d.rolling12AED || 0),
          invoice_count: d.countInvoices || 0,
          currency: 'AED',
          last_synced_at: new Date().toISOString(),
        };
        fetch(SB_URL + '/rest/v1/client_financials', {
          method: 'POST',
          headers: { apikey: SB_KEY, Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY), 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
          body: JSON.stringify(fin),
        }).catch(() => {});
        return fin;
      }
    } catch(e) { console.warn('live sync failed, using cached:', e.message); }
  }
  // Fallback: cached data
  try {
    const rows = await GET('/rest/v1/client_financials?client_id=eq.' + clientId + '&select=*&limit=1');
    return rows?.[0] || null;
  } catch { return null; }
}

async function loadVisas(clientId) {
  try {
    const visas = await GET(`/rest/v1/client_visas?client_id=eq.${clientId}&select=holder_name,visa_type,expiry_date&order=expiry_date.asc`);
    return visas || [];
  } catch { return []; }
}

async function init() {
  const sess = sb.getSession();
  if (!sess?.access_token) { window.location.href = 'login.html'; return; }

  try {
    // Get client_id
    const links = await GET(`/rest/v1/client_users?user_id=eq.${sess.user.id}&select=client_id`);
    if (!links?.length) throw new Error('Nessun cliente collegato. Contatta il tuo consulente.');
    const clientId = links[0].client_id;

    // Load client
    const clients = await GET(`/rest/v1/clients?id=eq.${clientId}&select=*`);
    clientData = clients?.[0];
    if (!clientData) throw new Error('Dati aziendali non trovati.');

    // Load files
    allFiles = await GET(`/rest/v1/client_files?client_id=eq.${clientId}&select=id,display_name,file_size,mime_type,folder,storage_path,created_at&order=created_at.desc`) || [];

    // Set header
    document.getElementById('header-company').textContent = clientData.company_name;

    // Load visas and financials in parallel
    const [visas, financials] = await Promise.all([
      loadVisas(clientId),
      loadFinancials(clientId),
    ]);

    // Render all panels
    renderAll();
    try {
      document.getElementById('main').innerHTML = buildMainHTML(visas, financials);
    } catch(renderErr) {
      document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Render error:</strong> \${renderErr.message}</div>`;
    }
    setupNav();
    // Init push notifications after login
    initOneSignal(sess.user.id, clientData.company_name);
    // Pre-render drive if documenti panel is pre-selected
    // (it will render when user clicks the tab via showPanel)

  } catch(e) {
    document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Errore:</strong> ${e.message}<br><small style="color:#666">${e.stack||''}</small></div>`;
  }
}

function buildMainHTML(visas=[], financials=null) {
  return `
    <!-- ANAGRAFICA -->
    <div class="panel active" id="panel-anagrafica">
      ${heroHTML()}
      ${financialsHTML(financials)}
      ${anagraficaHTML()}
    </div>

    <!-- DOCUMENTI -->
    <div class="panel" id="panel-documenti">
      <div class="section-title" style="margin-bottom:20px">I tuoi Documenti</div>
      ${documentiHTML()}
    </div>

    <!-- SCADENZE -->
    <div class="panel" id="panel-scadenze">
      <div class="section-title" style="margin-bottom:20px">Scadenze Importanti</div>
      ${scadenzeHTML(visas)}
    </div>

    <!-- PRATICHE -->
    <div class="panel" id="panel-pratiche">
      <div class="section-title" style="margin-bottom:20px">Le mie Pratiche</div>
      <div id="pratiche-client-content"><div class="spinner"></div></div>
    </div>

    <!-- ZOHO -->
    <div class="panel" id="panel-zoho">
      <div id="zoho-client-content"><div class="spinner"></div></div>
    </div>

    <!-- SERVIZI -->
    <div class="panel" id="panel-servizi">
      ${serviziHTML()}
    </div>

    <!-- NUMERI UTILI -->
    <div class="panel" id="panel-numeri">
      ${numeriHTML()}
    </div>
    <div class="panel" id="panel-news">
      <div id="client-news-container" style="padding:4px 0">
        <div style="text-align:center;padding:32px;color:rgba(255,255,255,.4);font-size:13px">Caricamento notizie...</div>
      </div>
    </div>
  `;
}


function financialsHTML(f) {
  if (!f) return '';

  const fmt = n => {
    const num = Math.round(n || 0);
    return num.toLocaleString('it-IT') + ' AED';
  };

  const pct = Math.min(100, Math.round(((f.invoiced_12m || 0) / 375000) * 100));
  const vatColor = f.invoiced_12m >= 375000 ? '#d97706' : f.invoiced_12m >= 300000 ? '#d97706' : '#059669';
  const vatBg    = f.invoiced_12m >= 375000 ? '#fffbeb' : f.invoiced_12m >= 300000 ? '#fffbeb' : '#f0fdf4';
  const vatBorder= f.invoiced_12m >= 375000 ? '#fde68a' : f.invoiced_12m >= 300000 ? '#fde68a' : '#86efac';
  const vatLabel = f.invoiced_12m >= 375000 ? '📋 Soglia VAT raggiunta — contatta il tuo consulente' : f.invoiced_12m >= 300000 ? '📋 In avvicinamento alla soglia VAT' : '✓ Tutto in ordine — sotto la soglia VAT';
  const remaining = Math.max(0, 375000 - (f.invoiced_12m || 0));
  const lastSync = f.last_synced_at ? new Date(f.last_synced_at).toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric', hour:'2-digit', minute:'2-digit'}) : '—';

  return `
    <div class="card" style="margin-bottom:20px;border-color:#e2e8f0">
      <div class="card-header" style="background:linear-gradient(135deg,#0f1e35 0%,#1e3a5f 100%);border-radius:12px 12px 0 0">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="card-title" style="color:white;font-size:15px">📊 Riepilogo Finanziario</div>
          <div style="font-size:11px;color:rgba(255,255,255,.5)">Aggiornato: ${lastSync}</div>
        </div>
      </div>
      <div class="card-body" style="padding:20px">

        <!-- KPI Grid -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px">

          <div style="background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Fatturato Totale</div>
            <div style="font-size:18px;font-weight:800;color:var(--navy2)">${fmt(f.total_invoiced)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">dall'inizio attività</div>
          </div>

          <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Incassato</div>
            <div style="font-size:18px;font-weight:800;color:#059669">${fmt(f.total_collected)}</div>
            <div style="font-size:11px;color:#059669;margin-top:2px">pagamenti ricevuti</div>
          </div>

          <div style="background:${f.total_outstanding > 0 ? '#fffbeb' : '#f8fafc'};border:1.5px solid ${f.total_outstanding > 0 ? '#fde68a' : 'var(--border)'};border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:${f.total_outstanding > 0 ? '#d97706' : 'var(--muted)'};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Da Incassare</div>
            <div style="font-size:18px;font-weight:800;color:${f.total_outstanding > 0 ? '#d97706' : 'var(--navy2)'}">${fmt(f.total_outstanding)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${f.invoice_count || 0} fatture emesse</div>
          </div>

        </div>

        <!-- VAT Bar -->
        <div style="background:${vatBg};border:1.5px solid ${vatBorder};border-radius:12px;padding:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
            <div style="font-size:13px;font-weight:700;color:${vatColor}">${vatLabel}</div>
            <div style="font-size:12px;color:var(--muted)">Soglia registrazione IVA UAE</div>
          </div>
          <div style="background:rgba(0,0,0,.08);border-radius:100px;height:10px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;border-radius:100px;background:${vatColor};width:${pct}%;transition:width .6s ease"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600">
            <span style="color:${vatColor}">${fmt(f.invoiced_12m)} negli ultimi 12 mesi</span>
            <span style="color:var(--muted)">${pct}% di 375.000 AED${remaining > 0 ? ' · mancano ' + fmt(remaining) : ''}</span>
          </div>
        </div>

      </div>
    </div>`;
}

async function loadZohoClient() {
  const el = document.getElementById('zoho-client-content');
  const orgId = clientData && clientData.zoho_org_id;
  if (!orgId) { el.innerHTML = '<div style="padding:32px;text-align:center;color:#6b7280">Nessun account Zoho Books collegato. Contatta il tuo consulente.</div>'; return; }
  el.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;color:#6b7280">Connessione a Zoho Books...</div></div>';
  try {
    const res = await fetch('https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/bright-service', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ action: 'client_summary', org_id: orgId })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    const fmt = function(n) { if (n===undefined||n===null||isNaN(n)) return '--'; return new Intl.NumberFormat('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n); };
    const cur = d.orgCurrency || 'AED';
    const isMulti = cur !== 'AED';
    if (!d.rolling12AED) d.rolling12AED = 0;
    if (!d.prevYearAED) d.prevYearAED = 0;
    if (!d.totalBilledAED) d.totalBilledAED = d.totalBilled || 0;
    if (!d.totalPaidAED) d.totalPaidAED = d.totalPaid || 0;
    if (!d.totalUnpaidAED) d.totalUnpaidAED = d.totalUnpaid || 0;
    if (!d.vatStatus) d.vatStatus = 'ok';
    if (!d.vatThreshold) d.vatThreshold = 375000;
    if (!d.rolling12Start) d.rolling12Start = new Date(Date.now()-365*86400000).toISOString().split('T')[0];
    const vatPct = Math.min(100, Math.round(d.rolling12AED/d.vatThreshold*100));
    const vatReg = clientData && clientData.vat_registered;
    const exceeded = d.vatStatus==='exceeded' || d.vatStatus==='warning';
    const vc = vatReg ? '#059669' : exceeded ? '#d97706' : '#059669';
    const vb = vatReg ? '#f0fdf4' : exceeded ? '#fffbeb' : '#f0fdf4';
    const vbr = vatReg ? '#86efac' : exceeded ? '#fde68a' : '#86efac';
    const vl = vatReg ? 'VAT Registrata' : d.vatStatus==='exceeded' ? 'Soglia VAT raggiunta — contatta il tuo consulente' : d.vatStatus==='warning' ? 'In avvicinamento alla soglia VAT' : 'Tutto in ordine — sotto la soglia VAT';
    const pp = Math.round(d.totalBilled ? d.totalPaid/d.totalBilled*100 : 0);
    const up = Math.round(d.totalBilled ? d.totalUnpaid/d.totalBilled*100 : 0);
    const now = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const yoyColor = d.totalBilledAED >= d.prevYearAED ? '#059669' : '#dc2626';
    const yoyArrow = d.totalBilledAED >= d.prevYearAED ? '\u25b2' : '\u25bc';
    const yoyText = d.prevYearAED ? yoyArrow + ' ' + Math.abs(Math.round((d.totalBilledAED-d.prevYearAED)/d.prevYearAED*100)) + '% vs anno prec.' : '--';
    const unpaidBg = d.totalUnpaid > 0 ? 'linear-gradient(135deg,#7f1d1d,#dc2626)' : 'linear-gradient(135deg,#374151,#6b7280)';
    el.innerHTML =
      '<div style="padding:4px 0">' +
      '<div style="background:'+vb+';border:1.5px solid '+vbr+';border-radius:14px;padding:20px 24px;margin-bottom:24px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">' +
          '<div><div style="font-size:13px;font-weight:700;color:'+vc+'">Soglia VAT — Ultimi 12 mesi</div>' +
          '<div style="font-size:12px;color:#6b7280;margin-top:2px">Da '+d.rolling12Start+' a oggi · in AED</div></div>' +
          '<div style="text-align:right"><div style="font-size:20px;font-weight:800;color:'+vc+'">AED '+fmt(d.rolling12AED)+'</div>' +
          '<div style="font-size:11px;color:#6b7280">'+vatPct+'% di AED '+fmt(d.vatThreshold)+'</div></div>' +
        '</div>' +
        '<div style="background:white;border-radius:100px;height:12px;overflow:hidden;margin-bottom:8px">' +
          '<div style="height:100%;border-radius:100px;background:'+vc+';width:'+vatPct+'%;transition:width .6s ease"></div></div>' +
        '<div style="font-size:12px;font-weight:600;color:'+vc+'">'+vl+'</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px">' +
        '<div style="background:linear-gradient(135deg,#1a3a5c,#2563a8);border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Fatturato '+d.year+'</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalBilled)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalBilledAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+d.countInvoices+' fatture emesse</div></div>' +
        '<div style="background:linear-gradient(135deg,#065f46,#059669);border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Incassato</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalPaid)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalPaidAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+pp+'% del fatturato</div></div>' +
        '<div style="background:'+unpaidBg+';border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Da Incassare</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalUnpaid)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalUnpaidAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+d.countOverdue+' scadute</div></div>' +
        '<div style="background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:20px 24px">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#6b7280;margin-bottom:8px">Anno prec. ('+(d.year-1)+')</div>' +
          '<div style="font-size:22px;font-weight:800">AED '+fmt(d.prevYearAED)+'</div>' +
          '<div style="font-size:12px;margin-top:4px;color:'+yoyColor+'">'+yoyText+'</div></div>' +
      '</div>' +
      '<div style="background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:20px 24px;margin-bottom:20px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
          '<div style="font-size:13px;font-weight:700">Stato Incassi '+d.year+'</div>' +
          '<div style="font-size:13px;color:#6b7280">'+cur+' '+fmt(d.totalPaid)+' / '+cur+' '+fmt(d.totalBilled)+'</div></div>' +
        '<div style="background:#f1f5f9;border-radius:100px;height:10px;overflow:hidden">' +
          '<div style="height:100%;border-radius:100px;background:linear-gradient(90deg,#059669,#34d399);width:'+pp+'%;transition:width .6s ease"></div></div>' +
        '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px">' +
          '<span style="color:#059669;font-weight:600">Incassato '+pp+'%</span>' +

// DRIVE LOGIC
let cwd = '/';
let driveView = 'grid';

const esc  = s => String(s||'').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const sz   = b => !b?'': b<1024?b+'B': b<1048576?(b/1024).toFixed(0)+'KB':(b/1048576).toFixed(1)+'MB';
const dt   = s => new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
const mico = (m,n) => {
  if(m?.includes('pdf')) return '📄';
  if(m?.includes('word')) return '📝';
  if(m?.includes('excel')||m?.includes('sheet')) return '📊';
  if(m?.startsWith('image')) return '🖼️';
  const e=(n||'').split('.').pop().toLowerCase();
  return {zip:'🗜️',rar:'🗜️',txt:'📃',csv:'📊',ppt:'📑',pptx:'📑'}[e]||'📎';
};

function renderDrive() {
  if (!allFiles.length) {
    document.getElementById('drive-content').innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>Nessun documento disponibile.<br>Il tuo consulente caricherà i documenti qui.</p></div>`;
    return;
  }
  // Build virtual folder tree from flat file list
  const files = allFiles.filter(f => (f.folder||'/') === cwd && f.display_name !== '.keep');
  const subsSet = new Set();
  allFiles.forEach(f => {
    const folder = f.folder || '/';
    if (!folder.startsWith(cwd) || folder === cwd) return;
    const seg = folder.slice(cwd.length).split('/')[0];
    if (seg) subsSet.add(seg);
  });
  const dirs = [...subsSet].sort();

  renderBC();

  // GRID
  let g = '<div class="drv-grid">';
  dirs.forEach(n => {
    g += `<div class="drv-card drv-dir" data-dir="${esc(n)}">
      <div class="drv-ico">📁</div>
      <div class="drv-nm">${esc(n)}</div>
      <div class="drv-sz">Cartella</div>
    </div>`;
  });
  files.forEach(f => {
    g += `<div class="drv-card drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <div class="drv-ico">${mico(f.mime_type, f.display_name)}</div>
      <div class="drv-nm">${esc(f.display_name)}</div>
      <div class="drv-sz">${sz(f.file_size)}</div>
    </div>`;
  });
  g += '</div>';

  // LIST
  let l = '<div class="drv-list">';
  dirs.forEach(n => {
    l += `<div class="drv-row drv-dir" data-dir="${esc(n)}">
      <span style="font-size:20px">📁</span>
      <span class="drv-row-name">${esc(n)}</span>
      <span class="drv-row-meta">Cartella</span>
      <span class="drv-row-meta">—</span>
    </div>`;
  });
  files.forEach(f => {
    l += `<div class="drv-row drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <span style="font-size:20px">${mico(f.mime_type, f.display_name)}</span>
      <span class="drv-row-name">${esc(f.display_name)}</span>
      <span class="drv-row-meta">${dt(f.created_at)}</span>
      <span class="drv-row-meta">${sz(f.file_size)}</span>
    </div>`;
  });
  l += '</div>';

  document.getElementById('drive-content').innerHTML = g + l;
  applyDriveView();
  // Event delegation for file clicks
  document.getElementById('drive-content').querySelectorAll('.drv-file').forEach(el => {
    el.addEventListener('click', () => previewFile(el.dataset.sp, el.dataset.nm, el.dataset.mime));
  });
  document.getElementById('drive-content').querySelectorAll('.drv-dir').forEach(el => {
    el.addEventListener('click', () => cdDir(el.dataset.dir));
  });
}

function cdDir(name) {
  cwd = cwd + name + '/';
  renderDrive();
}

function renderBC() {
  const bc = document.getElementById('drive-bc');
  if (!bc) return;
  const parts = cwd.split('/').filter(Boolean);
  let html = `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='/';renderDrive()">📁 Documenti</span>`;
  let built = '/';
  parts.forEach((p,i) => {
    built += p+'/';
    const target = built;
    const isLast = i === parts.length-1;
    html += ` <span style="color:var(--muted)">›</span> `;
    html += isLast
      ? `<span style="color:var(--navy2)">${esc(p)}</span>`
      : `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='${target}';renderDrive()">${esc(p)}</span>`;
  });
  bc.innerHTML = html;
}

function setDriveView(v) {
  driveView = v;
  document.getElementById('vbtn-grid')?.classList.toggle('active', v==='grid');
  document.getElementById('vbtn-list')?.classList.toggle('active', v==='list');
  applyDriveView();
}

function applyDriveView() {
  document.querySelectorAll('.drv-grid').forEach(e => e.style.display = driveView==='grid' ? 'grid' : 'none');
  document.querySelectorAll('.drv-list').forEach(e => e.style.display = driveView==='list' ? 'block' : 'none');
}


function scadenzeHTML(visas=[]) {
  const c = clientData;
  const items = [];
  const today = new Date();
  const addDeadline = (label, dateStr, icon) => {
    if (!dateStr) return;
    const d = new Date(dateStr);
    const days = Math.round((d - today) / 86400000);
    const fmt = d.toLocaleDateString('it-IT', {day:'2-digit',month:'long',year:'numeric'});
    items.push({ label, fmt, days, icon });
  };
  addDeadline('Licenza Aziendale', c.trade_license_date, '🪪');
  addDeadline('Passaporto', c.passport_expiry, '📘');
  addDeadline('Emirates ID', c.eid_expiry, '🆔');
  // Add individual visas
  (visas||[]).forEach(v => addDeadline(`✈️ ${v.holder_name} (${v.visa_type||'Residenza'})`, v.expiry_date, '🛂'));

  if (!items.length) return `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">📅</div><p>Nessuna scadenza configurata.<br>Contatta il tuo consulente per aggiornarle.</p></div></div></div>`;

  return items.map(item => {
    const cls = item.days < 0 ? 'danger' : item.days <= 60 ? 'warning' : null;
    const badgeCls = item.days < 0 ? 'badge-red' : item.days <= 60 ? 'badge-yellow' : 'badge-green';
    const badgeText = item.days < 0 ? 'Scaduto' : item.days <= 60 ? `${item.days} giorni` : 'OK';
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;padding:16px 24px">
          <span style="font-size:28px">${item.icon}</span>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${item.label}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:2px">${item.fmt}</div>
          </div>
          <span class="badge ${badgeCls}">${badgeText}</span>
        </div>
      </div>`;
  }).join('');
}

function showPushPrompt() {
  if (document.getElementById('push-prompt')) return;

  document.body.appendChild(el);
}
window.acceptPush = function() {

  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OS) {
    try { await OS.Notifications.requestPermission(); } catch(e) {}

};
window.dismissPush = function() {
  var el = document.getElementById('push-prompt');
  if (el) { el.style.animation = 'none'; el.style.opacity = '0'; el.style.transform = 'translateY(100px)'; el.style.transition = 'all .25s'; setTimeout(function(){ el.remove(); }, 260); }
};

// PRATICHE CLIENTE
async function loadPraticheClient() {
  const el = document.getElementById('pratiche-client-content');
  if (!el) return;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    // Aspetta clientData max 5 secondi
    let waited = 0;
    while (!clientData?.id && waited < 5000) {
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (!clientData?.id) throw new Error('Sessione scaduta, ricarica la pagina');
    const clientId = clientData.id;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const r = await fetch(SB_URL + '/rest/v1/client_practices?client_id=eq.' + clientId + '&select=id,title,category,status,description,due_date,completed_at,created_at&order=created_at.desc', { headers: H(), signal: controller.signal });
    clearTimeout(timeout);
    if (!r.ok) {
      const err = await r.json();
      throw new Error((err?.message || err?.hint || JSON.stringify(err)));
    }
    const pratiche = await r.json();
    
    const STATUSES = {
      in_attesa:      { label: 'In Attesa',         color: '#64748b', bg: '#f1f5f9', border: '#cbd5e1' },
      in_lavorazione: { label: 'In Lavorazione',    color: '#d97706', bg: '#fffbeb', border: '#fde68a' },
      attesa_docs:    { label: 'Attesa Documenti',  color: '#7c3aed', bg: '#f5f3ff', border: '#ddd6fe' },
      completato:     { label: '✓ Completato',      color: '#059669', bg: '#f0fdf4', border: '#86efac' },
      annullato:      { label: 'Annullato',         color: '#dc2626', bg: '#fef2f2', border: '#fca5a5' },
    };
    const fmtDate = d => d ? new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'}) : null;
    const badge = s => {
      const st = STATUSES[s] || STATUSES.in_attesa;
      return `<span style="display:inline-flex;align-items:center;padding:3px 12px;border-radius:100px;font-size:11px;font-weight:700;background:${st.bg};color:${st.color};border:1px solid ${st.border}">${st.label}</span>`;
    };

    if (!pratiche?.length) {
      el.innerHTML = `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">📋</div><p>Nessuna pratica in corso.<br>Contatta il tuo consulente per avviare una nuova pratica.</p></div></div></div>`;
      return;
    }

    el.innerHTML = pratiche.map(p => `
      <div class="card" style="margin-bottom:12px">
        <div class="card-body" style="padding:18px 24px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px">
            <div style="font-weight:700;font-size:15px;color:var(--navy2)">${p.title}</div>
            ${badge(p.status)}
          </div>
          ${p.category ? `<div style="display:inline-block;font-size:11px;font-weight:600;color:var(--muted);background:#f1f5f9;padding:2px 10px;border-radius:100px;margin-bottom:8px">${p.category}</div>` : ''}
          ${p.description ? `<div style="font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px">${p.description}</div>` : ''}
          <div style="font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap">
            <span>Aperta: ${fmtDate(p.created_at)}</span>
            ${p.due_date ? `<span style="color:${new Date(p.due_date)<new Date()?'#dc2626':'var(--muted)'}">Scadenza: <strong>${fmtDate(p.due_date)}</strong></span>` : ''}
            ${p.completed_at ? `<span style="color:#059669">Completata: ${fmtDate(p.completed_at)}</span>` : ''}
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="card"><div class="card-body" style="color:#dc2626">Errore: ${e.message}</div></div>`;
  }
}

async function fetchBlob(storagePath) {
  const tok = sb.getSession()?.access_token || SB_KEY;
  const r = await fetch(`${SB_URL}/storage/v1/object/authenticated/client-documents/${storagePath}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${tok}` }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.blob();
}

window.downloadFile = async function(storagePath, name) {
  try {
    const blob = await fetchBlob(storagePath);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) { alert('Errore download: ' + e.message); }
};

window.previewFile = async function(storagePath, name, mime) {
  const modal = document.getElementById('preview-modal');
  const body  = document.getElementById('preview-body');
  const title = document.getElementById('preview-title');
  const dlBtn = document.getElementById('preview-dl-btn');

  title.textContent = name;
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px"><div class="spinner"></div></div>';
  modal.style.display = 'flex';

  dlBtn.onclick = () => downloadFile(storagePath, name);

  const ext = (name || '').split('.').pop().toLowerCase();
  const isImg = mime?.startsWith('image') || ['jpg','jpeg','png','webp','gif','bmp','svg','tiff','tif'].includes(ext);
  const isPdf = mime?.includes('pdf') || ext === 'pdf';

  if (!isImg && !isPdf) {
    const icons = {doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📑',pptx:'📑',zip:'🗜️',rar:'🗜️',txt:'📃'};
    const ico = icons[ext] || '📎';
    body.innerHTML = `<div style="text-align:center;padding:50px 30px">
      <div style="font-size:56px;margin-bottom:16px">${ico}</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text)">${name}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Anteprima non disponibile — clicca per scaricare</div>
      <button class="btn-dl" onclick="downloadFile('${storagePath.replace(/'/g,"\'")}','${name.replace(/'/g,"\'")}')">⬇ Scarica file</button>
    </div>`;
    return;
  }

  try {
    const blob = await fetchBlob(storagePath);
    const url  = URL.createObjectURL(blob);
    if (isImg) {
      body.innerHTML = `<img src="${url}" style="max-width:100%;max-height:78vh;object-fit:contain;display:block;padding:16px" onload="URL.revokeObjectURL(this.src)">`;
    } else {
      body.innerHTML = `<iframe src="${url}" style="width:100%;height:78vh;border:none"></iframe>`;
    }
  } catch(e) {
    body.innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626">Errore: ${e.message}</div>`;
  }
};

(function() {
  var startY = 0, pulling = false, triggered = false, THRESHOLD = 60;
  function getScroller() { return document.getElementById("main") || document.documentElement; }
  function gst() { var m = getScroller(); return m.scrollTop || window.scrollY || 0; }
  document.addEventListener("touchstart", function(e) {
    if (gst() <= 2) { startY = e.touches[0].clientY; pulling = true; triggered = false; }
    else { pulling = false; }
  }, { passive: true });
  document.addEventListener("touchmove", function(e) {
    if (!pulling) return;
    var delta = e.touches[0].clientY - startY;
    if (delta > 8 && gst() <= 2) { var b = document.getElementById("ptr-bar"); if (b) b.classList.add("visible"); }
  }, { passive: true });
  document.addEventListener("touchend", function(e) {
    if (!pulling) return; pulling = false;
    var delta = e.changedTouches[0].clientY - startY;
    var bar = document.getElementById("ptr-bar");
    if (delta > THRESHOLD && !triggered) {
      triggered = true; if (bar) bar.classList.add("visible");
      var ap = document.querySelector(".panel.active");
      if (ap) { var pn = ap.id.replace("panel-","");
        if (pn==="zoho") loadZohoClient();
        else if (pn==="pratiche") loadPraticheClient();
        else if (pn==="documenti") renderDrive(); }
      setTimeout(function(){ if (bar) bar.classList.remove("visible"); triggered=false; }, 1400);
    } else { if (bar) bar.classList.remove("visible"); }
  }, { passive: true });
  var sh = document.getElementById("ios-sheet"), shy = 0;
  if (sh) {
    sh.addEventListener("touchstart", function(e){ shy = e.touches[0].clientY; }, { passive: true });
    sh.addEventListener("touchend", function(e){ if (e.changedTouches[0].clientY - shy > 60) closeSheet(); }, { passive: true });
  }
})();
