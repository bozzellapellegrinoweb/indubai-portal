<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InDubai — Il tuo Portale</title>
  <meta name="theme-color" content="#0f1e35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/client-portal/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- OneSignal Push -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="/js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1e35;
      --navy2: #1a3a5c;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #7a8ca0;
      --radius: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.3);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark { font-family: 'Playfair Display', serif; font-size: 22px; color: white; letter-spacing: -.5px; }
    .logo-mark span { color: var(--gold); }
    .logo-divider { width: 1px; height: 20px; background: rgba(255,255,255,.2); }
    .logo-sub { font-size: 12px; color: rgba(255,255,255,.45); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-company { font-size: 13px; color: rgba(255,255,255,.6); font-weight: 500; }
    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.7);
      padding: 7px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.15); color: white; }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: calc(100vh - 64px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .nav-section { padding: 0 20px 8px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer; border: none;
      background: none; width: 100%; text-align: left;
      font-family: inherit; transition: all .15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--navy2); background: #f0f4f8; }
    .nav-item.active { color: var(--navy2); background: #eff6ff; border-left-color: var(--gold); font-weight: 600; }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; }

    /* ── MAIN ── */
    .main { flex: 1; padding: 36px 40px; max-width: 900px; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      border-radius: var(--radius);
      padding: 32px 36px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,.2) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-welcome { font-size: 12px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 28px; color: white; margin-bottom: 8px; }
    .hero-sub { font-size: 13px; color: rgba(255,255,255,.5); }
    .hero-badges { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .hero-badge {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      color: rgba(255,255,255,.7);
      font-weight: 500;
    }
    .hero-badge.gold { background: rgba(201,168,76,.15); border-color: rgba(201,168,76,.3); color: var(--gold2); }

    /* ── CARDS ── */
    .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(0,0,0,.04);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .card-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--navy2); }
    .card-body { padding: 20px 24px; }

    /* Info grid */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .info-field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; display: block; margin-bottom: 5px; }
    .info-field span { font-size: 14px; font-weight: 500; color: var(--text); }
    .info-field span.empty { color: #cbd5e1; font-style: italic; font-size: 13px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
    .badge-green { background: #f0fdf4; color: #059669; border: 1px solid #86efac; }
    .badge-yellow { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .badge-red { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }

    /* ── FILE LIST ── */
    .folder-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .folder-tab {
      padding: 6px 16px; border-radius: 100px;
      font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border);
      background: white; color: var(--muted);
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .folder-tab:hover { border-color: var(--navy2); color: var(--navy2); }
    .folder-tab.active { background: var(--navy2); color: white; border-color: var(--navy2); }

    .file-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .file-row:last-child { border-bottom: none; }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .btn-dl {
      flex-shrink: 0;
      padding: 7px 16px;
      background: var(--navy2); color: white;
      border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .btn-dl:hover { background: var(--navy); }

    .empty-state { padding: 40px; text-align: center; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── PREVIEW MODAL ── */
    .prev-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .prev-modal {
      background: white; border-radius: 16px;
      width: 95vw; max-width: 900px; max-height: 92vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .prev-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1.5px solid var(--border); flex-shrink: 0;
    }
    .prev-title { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; color: var(--navy2); }
    .prev-body { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; min-height: 300px; background: #f8f8f8; }

    /* ── SERVIZI ── */
    .srv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; margin-bottom: 20px; }
    .srv-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 22px; position: relative; transition: all .2s; display: flex; flex-direction: column; }
    .srv-card:hover { border-color: var(--navy2); box-shadow: 0 6px 20px rgba(15,30,53,.08); transform: translateY(-2px); }
    .srv-tag { position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 100px; background: var(--gold); color: white; text-transform: uppercase; letter-spacing: .5px; }
    .srv-icon { font-size: 32px; margin-bottom: 12px; }
    .srv-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--navy2); margin-bottom: 8px; }
    .srv-desc { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; margin-bottom: 16px; }
    .srv-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--navy2); color: white; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; transition: background .15s; align-self: flex-start; }
    .srv-btn:hover { background: var(--navy); }

    /* ── DRIVE ── */
    .drv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 12px; }
    .drv-card { background:#f8fafc; border:1.5px solid var(--border); border-radius:12px; padding:16px 12px; text-align:center; cursor:pointer; transition:all .15s; }
    .drv-card:hover { border-color:var(--navy2); background:#eff6ff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .drv-dir .drv-ico { filter: none; }
    .drv-ico { font-size:32px; margin-bottom:8px; }
    .drv-nm { font-size:12px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .drv-sz { font-size:11px; color:var(--muted); margin-top:3px; }
    .drv-list { display:none; }
    .drv-row { display:flex; align-items:center; gap:12px; padding:10px 8px; border-bottom:1px solid #f1f5f9; cursor:pointer; border-radius:8px; transition:background .1s; }
    .drv-row:hover { background:#f0f4f8; }
    .drv-row:last-child { border-bottom:none; }
    .drv-row-name { flex:1; font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .drv-row-meta { font-size:11px; color:var(--muted); min-width:60px; text-align:right; }

    /* iOS SHEET MENU */
    .ios-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); opacity:0; transition:opacity .3s; }
    .ios-sheet-overlay.open { opacity:1; }
    .ios-sheet { position:fixed; bottom:0; left:0; right:0; z-index:301; background:#1c1c1e; border-radius:20px 20px 0 0; padding:0 0 env(safe-area-inset-bottom,20px); transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1); max-height:85vh; overflow-y:auto; }
    .ios-sheet.open { transform:translateY(0); }
    .ios-sheet-handle { width:36px; height:4px; background:rgba(255,255,255,.2); border-radius:2px; margin:12px auto 4px; }
    .ios-sheet-header { padding:8px 20px 16px; border-bottom:1px solid rgba(255,255,255,.07); }
    .ios-sheet-company { font-size:14px; font-weight:700; color:white; }
    .ios-sheet-email { font-size:12px; color:rgba(255,255,255,.4); margin-top:3px; }
    .ios-sheet-section { padding:16px 20px 6px; font-size:11px; font-weight:700; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:1.2px; }
    .ios-sheet-item { display:flex; align-items:center; gap:14px; padding:13px 20px; font-size:16px; font-weight:500; color:rgba(255,255,255,.9); background:none; border:none; border-bottom:1px solid rgba(255,255,255,.05); width:100%; text-align:left; cursor:pointer; font-family:inherit; transition:background .1s; }
    .ios-sheet-item:active { background:rgba(255,255,255,.06); }
    .ios-sheet-item.active-item { color:var(--gold); }
    .ios-sheet-item .item-icon { font-size:20px; width:30px; text-align:center; }
    .ios-sheet-item .item-chevron { margin-left:auto; color:rgba(255,255,255,.2); font-size:13px; }
    .ios-sheet-logout { margin:16px 16px 4px; padding:14px; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); border-radius:14px; color:#f87171; font-size:15px; font-weight:600; cursor:pointer; width:calc(100% - 32px); font-family:inherit; }
    .ios-sheet-logout:active { background:rgba(239,68,68,.2); }
    .ptr-bar { position:fixed; top:56px; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:center; padding:8px; pointer-events:none; opacity:0; transition:opacity .2s; }
    .ptr-bar.visible { opacity:1; }
    .ptr-pill { background:white; border-radius:20px; padding:7px 16px; display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--navy2); box-shadow:0 4px 20px rgba(0,0,0,.15); }
    .ptr-spin { width:14px; height:14px; border:2.5px solid #e2e8f0; border-top-color:var(--navy2); border-radius:50%; animation:spin .7s linear infinite; }
    .ios-topbar { display:none; position:sticky; top:0; z-index:100; height:56px; padding:0 12px; align-items:center; justify-content:space-between; background:rgba(15,30,53,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,.08); }
    .ios-topbar-center { position:absolute; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; }
    .ios-topbar-logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:white; letter-spacing:-.3px; }
    .ios-topbar-logo span { color:var(--gold); }
    .ios-topbar-sub { font-size:10px; color:rgba(255,255,255,.35); font-weight:500; letter-spacing:.5px; }
    .ios-icon-btn { background:rgba(255,255,255,.1); border:none; border-radius:10px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:white; font-size:16px; flex-shrink:0; }
    .ios-icon-btn:active { background:rgba(255,255,255,.2); }
    .bottom-nav { display:none; }
    @media (max-width:768px) {
      .header { display:none; }
      .ios-topbar { display:flex; }
      .layout { flex-direction:column; }
      .sidebar { display:none; }
      .main { padding:16px 14px calc(32px + env(safe-area-inset-bottom,16px)); max-width:100%; }
      .hero { padding:20px; margin-bottom:16px; border-radius:16px; }
      .hero-title { font-size:22px; }
      .hero-badges { flex-wrap:wrap; gap:6px; margin-top:12px; }
      .card { border-radius:14px; margin-bottom:14px; }
      .card-header, .card-body { padding:14px 16px; }
      .info-grid { grid-template-columns:1fr 1fr !important; gap:12px; }
      .srv-grid { grid-template-columns:1fr; }
      .drv-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; }
    }
    @media (max-width:480px) {
      .info-grid { grid-template-columns:1fr !important; }
      .hero-title { font-size:19px; }
    }
    /* ── PANEL VISIBILITY ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── SPINNER ── */
    .spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: var(--navy2); border-radius: 50%; animation: spin .7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCADENZA BANNER ── */
    .deadline-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-radius: 12px;
      margin-bottom: 16px; font-size: 13px; font-weight: 500;
    }
    .deadline-banner.warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .deadline-banner.danger  { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  </style>
</head>
<body>

<!-- Desktop header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">In<span>Dubai</span></div>
    <div class="logo-divider"></div>
    <div class="logo-sub">Area Clienti</div>
  </div>
  <div class="header-right">
    <span class="header-company" id="header-company"></span>
    <button class="btn-logout" onclick="doLogout()">⏻ Esci</button>
  </div>
</div>

<!-- iOS Top Bar mobile -->
<div class="ios-topbar" id="ios-topbar">
  <button class="ios-icon-btn" id="ios-refresh-btn" onclick="refreshPage()">↻</button>
  <div class="ios-topbar-center">
    <div class="ios-topbar-logo">In<span>Dubai</span></div>
    <div class="ios-topbar-sub" id="ios-page-label">AREA CLIENTI</div>
  </div>
  <button class="ios-icon-btn" onclick="openSheet()">☰</button>
</div>

<!-- Pull-to-refresh indicator -->
<div class="ptr-bar" id="ptr-bar">
  <div class="ptr-pill"><div class="ptr-spin"></div>Aggiornamento...</div>
</div>

<!-- Sheet overlay backdrop -->
<div class="ios-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- iOS Sheet Menu -->
<div class="ios-sheet" id="ios-sheet">
  <div class="ios-sheet-handle"></div>
  <div class="ios-sheet-header">
    <div class="ios-sheet-company" id="sheet-company">—</div>
    <div class="ios-sheet-email" id="sheet-email">—</div>
  </div>
  <div class="ios-sheet-section">Il mio profilo</div>
  <button class="ios-sheet-item active-item" id="sitem-anagrafica" onclick="sheetGo('anagrafica','AZIENDA')"><span class="item-icon">🏢</span>Anagrafica<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-documenti"  onclick="sheetGo('documenti','DOCUMENTI')"><span class="item-icon">📁</span>Documenti<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-scadenze"   onclick="sheetGo('scadenze','SCADENZE')"><span class="item-icon">📅</span>Scadenze<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-zoho"       onclick="sheetGo('zoho','CONTABILITÀ')"><span class="item-icon">📊</span>Contabilità<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-pratiche"   onclick="sheetGo('pratiche','PRATICHE')"><span class="item-icon">📋</span>Le mie Pratiche<span class="item-chevron">›</span></button>
  <div class="ios-sheet-section">InDubai</div>
  <button class="ios-sheet-item" id="sitem-servizi"    onclick="sheetGo('servizi','SERVIZI')"><span class="item-icon">✦</span>Servizi<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-numeri"     onclick="sheetGo('numeri','NUMERI UTILI')"><span class="item-icon">📞</span>Numeri Utili<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-news"       onclick="sheetGo('news','UAE NEWS')"><span class="item-icon">📰</span>UAE News<span class="item-chevron">›</span></button>
  <button class="ios-sheet-logout" onclick="closeSheet(); doLogout()">⏻ Esci dall'account</button>
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-section" style="margin-bottom:8px">Menu</div>
    <button class="nav-item active" onclick="showPanel('anagrafica', this)"><span class="nav-icon">🏢</span> Anagrafica</button>
    <button class="nav-item" onclick="showPanel('documenti', this)"><span class="nav-icon">📁</span> Documenti</button>
    <button class="nav-item" onclick="showPanel('scadenze', this)"><span class="nav-icon">📅</span> Scadenze</button>
    <button class="nav-item" onclick="showPanel('zoho', this)"><span class="nav-icon">📊</span> Contabilità</button>
    <button class="nav-item" onclick="showPanel('pratiche', this)"><span class="nav-icon">📋</span> Le mie Pratiche</button>
    <div class="nav-section" style="margin-top:16px">InDubai</div>
    <button class="nav-item" onclick="showPanel('servizi', this)"><span class="nav-icon">✦</span> Servizi</button>
    <button class="nav-item" onclick="showPanel('numeri', this)"><span class="nav-icon">📞</span> Numeri Utili</button>
    <button class="nav-item" onclick="showPanel('news', this)"><span class="nav-icon">📰</span> UAE News</button>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="spinner"></div>
  </main>
</div>

<script>
const SB_URL = window.ENV_SUPABASE_URL;
const SB_KEY = window.ENV_SUPABASE_ANON_KEY;
function H() {
  const tok = sb.getSession()?.access_token || SB_KEY;
  return { apikey: SB_KEY, Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' };
}
async function GET(path) {
  const r = await fetch(SB_URL + path, { headers: H() });
  return r.json();
}
async function doLogout() {
  try { await fetch(SB_URL + '/auth/v1/logout', { method: 'POST', headers: H() }); } catch {}
  localStorage.removeItem('indubai_session');
  window.location.href = '/client-portal/login.html';
}

let clientData = null;
let allFiles = [];

async function loadFinancials(clientId) {
  // Live sync from Zoho if org_id available
  const orgId = clientData?.zoho_org_id;
  if (orgId) {
    try {
      const FN = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/zoho-proxy';
      const res = await fetch(FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY) },
        body: JSON.stringify({ action: 'client_summary', org_id: orgId }),
      });
      const d = await res.json();
      if (!d.error && d.rolling12AED !== undefined) {
        const fin = {
          client_id: clientId, zoho_org_id: orgId,
          total_invoiced: Math.round(d.totalBilledAED || 0),
          total_collected: Math.round(d.totalPaidAED || 0),
          total_outstanding: Math.round(d.totalUnpaidAED || 0),
          invoiced_12m: Math.round(d.rolling12AED || 0),
          invoice_count: d.countInvoices || 0,
          currency: 'AED',
          last_synced_at: new Date().toISOString(),
        };
        fetch(SB_URL + '/rest/v1/client_financials', {
          method: 'POST',
          headers: { apikey: SB_KEY, Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY), 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
          body: JSON.stringify(fin),
        }).catch(() => {});
        return fin;
      }
    } catch(e) { console.warn('live sync failed, using cached:', e.message); }
  }
  // Fallback: cached data
  try {
    const rows = await GET('/rest/v1/client_financials?client_id=eq.' + clientId + '&select=*&limit=1');
    return rows?.[0] || null;
  } catch { return null; }
}

async function loadVisas(clientId) {
  try {
    const visas = await GET(`/rest/v1/client_visas?client_id=eq.${clientId}&select=holder_name,visa_type,expiry_date&order=expiry_date.asc`);
    return visas || [];
  } catch { return []; }
}

async function init() {
  const sess = sb.getSession();
  if (!sess?.access_token) { window.location.href = '/client-portal/login.html'; return; }

  try {
    // Get client_id
    const links = await GET(`/rest/v1/client_users?user_id=eq.${sess.user.id}&select=client_id`);
    if (!links?.length) throw new Error('Nessun cliente collegato. Contatta il tuo consulente.');
    const clientId = links[0].client_id;

    // Load client
    const clients = await GET(`/rest/v1/clients?id=eq.${clientId}&select=*`);
    clientData = clients?.[0];
    if (!clientData) throw new Error('Dati aziendali non trovati.');

    // Load files
    allFiles = await GET(`/rest/v1/client_files?client_id=eq.${clientId}&select=id,display_name,file_size,mime_type,folder,storage_path,created_at&order=created_at.desc`) || [];

    // Set header
    document.getElementById('header-company').textContent = clientData.company_name;

    // Load visas and financials in parallel
    const [visas, financials] = await Promise.all([
      loadVisas(clientId),
      loadFinancials(clientId),
    ]);

    // Render all panels
    renderAll();
    try {
      document.getElementById('main').innerHTML = buildMainHTML(visas, financials);
    } catch(renderErr) {
      document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Render error:</strong> \${renderErr.message}</div>`;
    }
    setupNav();
    // Init push notifications after login
    initOneSignal(sess.user.id, clientData.company_name);
    // Pre-render drive if documenti panel is pre-selected
    // (it will render when user clicks the tab via showPanel)

  } catch(e) {
    document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Errore:</strong> ${e.message}<br><small style="color:#666">${e.stack||''}</small></div>`;
  }
}

          <div style="background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Fatturato Totale</div>
            <div style="font-size:18px;font-weight:800;color:var(--navy2)">${fmt(f.total_invoiced)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">dall'inizio attività</div>

          </div>

          <div style="background:${f.total_outstanding > 0 ? '#fffbeb' : '#f8fafc'};border:1.5px solid ${f.total_outstanding > 0 ? '#fde68a' : 'var(--border)'};border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:${f.total_outstanding > 0 ? '#d97706' : 'var(--muted)'};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Da Incassare</div>
            <div style="font-size:18px;font-weight:800;color:${f.total_outstanding > 0 ? '#d97706' : 'var(--navy2)'}">${fmt(f.total_outstanding)}</div>

          </div>

        </div>

        <!-- VAT Bar -->

            <div style="font-size:12px;color:var(--muted)">Soglia registrazione IVA UAE</div>

          <div style="background:rgba(0,0,0,.08);border-radius:100px;height:10px;overflow:hidden;margin-bottom:8px">

async function loadZohoClient() {
  const el = document.getElementById('zoho-client-content');
  const orgId = clientData && clientData.zoho_org_id;
  if (!orgId) { el.innerHTML = '<div style="padding:32px;text-align:center;color:#6b7280">Nessun account Zoho Books collegato. Contatta il tuo consulente.</div>'; return; }
  el.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;color:#6b7280">Connessione a Zoho Books...</div></div>';
  try {
    const res = await fetch('https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/bright-service', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ action: 'client_summary', org_id: orgId })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    const fmt = function(n) { if (n===undefined||n===null||isNaN(n)) return '--'; return new Intl.NumberFormat('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n); };
    const cur = d.orgCurrency || 'AED';
    const isMulti = cur !== 'AED';
    if (!d.rolling12AED) d.rolling12AED = 0;
    if (!d.prevYearAED) d.prevYearAED = 0;
    if (!d.totalBilledAED) d.totalBilledAED = d.totalBilled || 0;
    if (!d.totalPaidAED) d.totalPaidAED = d.totalPaid || 0;
    if (!d.totalUnpaidAED) d.totalUnpaidAED = d.totalUnpaid || 0;
    if (!d.vatStatus) d.vatStatus = 'ok';
    if (!d.vatThreshold) d.vatThreshold = 375000;
    if (!d.rolling12Start) d.rolling12Start = new Date(Date.now()-365*86400000).toISOString().split('T')[0];
    const vatPct = Math.min(100, Math.round(d.rolling12AED/d.vatThreshold*100));
    const vatReg = clientData && clientData.vat_registered;
    const exceeded = d.vatStatus==='exceeded' || d.vatStatus==='warning';
    const vc = vatReg ? '#059669' : exceeded ? '#d97706' : '#059669';
    const vb = vatReg ? '#f0fdf4' : exceeded ? '#fffbeb' : '#f0fdf4';
    const vbr = vatReg ? '#86efac' : exceeded ? '#fde68a' : '#86efac';
    const vl = vatReg ? 'VAT Registrata' : d.vatStatus==='exceeded' ? 'Soglia VAT raggiunta — contatta il tuo consulente' : d.vatStatus==='warning' ? 'In avvicinamento alla soglia VAT' : 'Tutto in ordine — sotto la soglia VAT';
    const pp = Math.round(d.totalBilled ? d.totalPaid/d.totalBilled*100 : 0);
    const up = Math.round(d.totalBilled ? d.totalUnpaid/d.totalBilled*100 : 0);
    const now = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const yoyColor = d.totalBilledAED >= d.prevYearAED ? '#059669' : '#dc2626';
    const yoyArrow = d.totalBilledAED >= d.prevYearAED ? '\u25b2' : '\u25bc';
    const yoyText = d.prevYearAED ? yoyArrow + ' ' + Math.abs(Math.round((d.totalBilledAED-d.prevYearAED)/d.prevYearAED*100)) + '% vs anno prec.' : '--';
    const unpaidBg = d.totalUnpaid > 0 ? 'linear-gradient(135deg,#7f1d1d,#dc2626)' : 'linear-gradient(135deg,#374151,#6b7280)';
    el.innerHTML =
      '<div style="padding:4px 0">' +

        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">' +
          '<div><div style="font-size:13px;font-weight:700;color:'+vc+'">Soglia VAT — Ultimi 12 mesi</div>' +

          '<div style="text-align:right"><div style="font-size:20px;font-weight:800;color:'+vc+'">AED '+fmt(d.rolling12AED)+'</div>' +

        '</div>' +

          '<div style="height:100%;border-radius:100px;background:'+vc+';width:'+vatPct+'%;transition:width .6s ease"></div></div>' +
        '<div style="font-size:12px;font-weight:600;color:'+vc+'">'+vl+'</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px">' +
        '<div style="background:linear-gradient(135deg,#1a3a5c,#2563a8);border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Fatturato '+d.year+'</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalBilled)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalBilledAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+d.countInvoices+' fatture emesse</div></div>' +

        '<div style="background:#f1f5f9;border-radius:100px;height:10px;overflow:hidden">' +
          '<div style="height:100%;border-radius:100px;background:linear-gradient(90deg,#059669,#34d399);width:'+pp+'%;transition:width .6s ease"></div></div>' +
        '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px">' +
          '<span style="color:#059669;font-weight:600">Incassato '+pp+'%</span>' +
          '<span style="color:'+(d.totalUnpaid>0?'#dc2626':'#6b7280')+';font-weight:600">Da incassare '+up+'%</span></div>' +
      '</div>' +
      (d.lastInvoice ? '<div style="background:white;border:1.5px solid #e2e8f0;border-radius:14px;padding:20px 24px;margin-bottom:20px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:12px">Ultima Fattura</div><div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><div style="font-size:16px;font-weight:800">'+d.lastInvoice.number+'</div><div style="font-size:13px;color:#6b7280">'+d.lastInvoice.date+'</div><div style="font-size:15px;font-weight:700">'+(d.lastInvoice.currency||cur)+' '+fmt(d.lastInvoice.total)+'</div></div></div>' : '') +

      '</div></div>';
  } catch(e) {
    el.innerHTML = '<div style="padding:20px;background:#fef2f2;border-radius:12px;color:#dc2626">'+e.message+'</div>';
  }
}

        <div class="info-grid">

          ${f('Tipo Società', c.company_type)}

          ${f('N. Licenza', c.license_number)}
          <div class="info-field"><label>Scadenza Licenza</label><span>${fmtDate(c.trade_license_date) || '<span class="empty">Non disponibile</span>'}${licBadge}</span></div>
          <div class="info-field"><label>Stato VAT</label><span>${c.vat_registered ? '<span class="badge badge-green">✓ Registrata</span>' : '<span class="badge badge-yellow">Non registrata</span>'}</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">👤 Contatto Principale</div></div>

// DRIVE LOGIC
let cwd = '/';
let driveView = 'grid';

const esc  = s => String(s||'').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const sz   = b => !b?'': b<1024?b+'B': b<1048576?(b/1024).toFixed(0)+'KB':(b/1048576).toFixed(1)+'MB';
const dt   = s => new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
const mico = (m,n) => {
  if(m?.includes('pdf')) return '📄';
  if(m?.includes('word')) return '📝';
  if(m?.includes('excel')||m?.includes('sheet')) return '📊';
  if(m?.startsWith('image')) return '🖼️';
  const e=(n||'').split('.').pop().toLowerCase();
  return {zip:'🗜️',rar:'🗜️',txt:'📃',csv:'📊',ppt:'📑',pptx:'📑'}[e]||'📎';
};

function renderDrive() {
  if (!allFiles.length) {
    document.getElementById('drive-content').innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>Nessun documento disponibile.<br>Il tuo consulente caricherà i documenti qui.</p></div>`;
    return;
  }
  // Build virtual folder tree from flat file list
  const files = allFiles.filter(f => (f.folder||'/') === cwd && f.display_name !== '.keep');
  const subsSet = new Set();
  allFiles.forEach(f => {
    const folder = f.folder || '/';
    if (!folder.startsWith(cwd) || folder === cwd) return;
    const seg = folder.slice(cwd.length).split('/')[0];
    if (seg) subsSet.add(seg);
  });
  const dirs = [...subsSet].sort();

  renderBC();

  // GRID
  let g = '<div class="drv-grid">';
  dirs.forEach(n => {
    g += `<div class="drv-card drv-dir" data-dir="${esc(n)}">
      <div class="drv-ico">📁</div>
      <div class="drv-nm">${esc(n)}</div>
      <div class="drv-sz">Cartella</div>
    </div>`;
  });
  files.forEach(f => {
    g += `<div class="drv-card drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <div class="drv-ico">${mico(f.mime_type, f.display_name)}</div>
      <div class="drv-nm">${esc(f.display_name)}</div>
      <div class="drv-sz">${sz(f.file_size)}</div>
    </div>`;
  });
  g += '</div>';

  // LIST
  let l = '<div class="drv-list">';
  dirs.forEach(n => {
    l += `<div class="drv-row drv-dir" data-dir="${esc(n)}">
      <span style="font-size:20px">📁</span>
      <span class="drv-row-name">${esc(n)}</span>
      <span class="drv-row-meta">Cartella</span>
      <span class="drv-row-meta">—</span>
    </div>`;
  });
  files.forEach(f => {
    l += `<div class="drv-row drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <span style="font-size:20px">${mico(f.mime_type, f.display_name)}</span>
      <span class="drv-row-name">${esc(f.display_name)}</span>
      <span class="drv-row-meta">${dt(f.created_at)}</span>
      <span class="drv-row-meta">${sz(f.file_size)}</span>
    </div>`;
  });
  l += '</div>';

  document.getElementById('drive-content').innerHTML = g + l;
  applyDriveView();
  // Event delegation for file clicks
  document.getElementById('drive-content').querySelectorAll('.drv-file').forEach(el => {
    el.addEventListener('click', () => previewFile(el.dataset.sp, el.dataset.nm, el.dataset.mime));
  });
  document.getElementById('drive-content').querySelectorAll('.drv-dir').forEach(el => {
    el.addEventListener('click', () => cdDir(el.dataset.dir));
  });
}

function cdDir(name) {
  cwd = cwd + name + '/';
  renderDrive();
}

function renderBC() {
  const bc = document.getElementById('drive-bc');
  if (!bc) return;
  const parts = cwd.split('/').filter(Boolean);
  let html = `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='/';renderDrive()">📁 Documenti</span>`;
  let built = '/';
  parts.forEach((p,i) => {
    built += p+'/';
    const target = built;
    const isLast = i === parts.length-1;
    html += ` <span style="color:var(--muted)">›</span> `;
    html += isLast
      ? `<span style="color:var(--navy2)">${esc(p)}</span>`
      : `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='${target}';renderDrive()">${esc(p)}</span>`;
  });
  bc.innerHTML = html;
}

function setDriveView(v) {
  driveView = v;
  document.getElementById('vbtn-grid')?.classList.toggle('active', v==='grid');
  document.getElementById('vbtn-list')?.classList.toggle('active', v==='list');
  applyDriveView();
}

function applyDriveView() {
  document.querySelectorAll('.drv-grid').forEach(e => e.style.display = driveView==='grid' ? 'grid' : 'none');
  document.querySelectorAll('.drv-list').forEach(e => e.style.display = driveView==='list' ? 'block' : 'none');
}


function scadenzeHTML(visas=[]) {
  const c = clientData;
  const items = [];
  const today = new Date();
  const addDeadline = (label, dateStr, icon) => {
    if (!dateStr) return;
    const d = new Date(dateStr);
    const days = Math.round((d - today) / 86400000);
    const fmt = d.toLocaleDateString('it-IT', {day:'2-digit',month:'long',year:'numeric'});
    items.push({ label, fmt, days, icon });
  };
  addDeadline('Licenza Aziendale', c.trade_license_date, '🪪');
  addDeadline('Passaporto', c.passport_expiry, '📘');
  addDeadline('Emirates ID', c.eid_expiry, '🆔');
  // Add individual visas
  (visas||[]).forEach(v => addDeadline(`✈️ ${v.holder_name} (${v.visa_type||'Residenza'})`, v.expiry_date, '🛂'));

  if (!items.length) return `<div class="card"><div class="card-body"><div class="empty-state"><div class="icon">📅</div><p>Nessuna scadenza configurata.<br>Contatta il tuo consulente per aggiornarle.</p></div></div></div>`;

  return items.map(item => {
    const cls = item.days < 0 ? 'danger' : item.days <= 60 ? 'warning' : null;
    const badgeCls = item.days < 0 ? 'badge-red' : item.days <= 60 ? 'badge-yellow' : 'badge-green';
    const badgeText = item.days < 0 ? 'Scaduto' : item.days <= 60 ? `${item.days} giorni` : 'OK';
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;padding:16px 24px">
          <span style="font-size:28px">${item.icon}</span>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${item.label}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:2px">${item.fmt}</div>
          </div>
          <span class="badge ${badgeCls}">${badgeText}</span>
        </div>
      </div>`;
  }).join('');
}

async function fetchBlob(storagePath) {
  const tok = sb.getSession()?.access_token || SB_KEY;
  const r = await fetch(`${SB_URL}/storage/v1/object/authenticated/client-documents/${storagePath}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${tok}` }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.blob();
}

window.downloadFile = async function(storagePath, name) {
  try {
    const blob = await fetchBlob(storagePath);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) { alert('Errore download: ' + e.message); }
};

window.previewFile = async function(storagePath, name, mime) {
  const modal = document.getElementById('preview-modal');
  const body  = document.getElementById('preview-body');
  const title = document.getElementById('preview-title');
  const dlBtn = document.getElementById('preview-dl-btn');

  title.textContent = name;
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px"><div class="spinner"></div></div>';
  modal.style.display = 'flex';

  dlBtn.onclick = () => downloadFile(storagePath, name);

  const ext = (name || '').split('.').pop().toLowerCase();
  const isImg = mime?.startsWith('image') || ['jpg','jpeg','png','webp','gif','bmp','svg','tiff','tif'].includes(ext);
  const isPdf = mime?.includes('pdf') || ext === 'pdf';

  if (!isImg && !isPdf) {
    const icons = {doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📑',pptx:'📑',zip:'🗜️',rar:'🗜️',txt:'📃'};
    const ico = icons[ext] || '📎';
    body.innerHTML = `<div style="text-align:center;padding:50px 30px">
      <div style="font-size:56px;margin-bottom:16px">${ico}</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text)">${name}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Anteprima non disponibile — clicca per scaricare</div>
      <button class="btn-dl" onclick="downloadFile('${storagePath.replace(/'/g,"\'")}','${name.replace(/'/g,"\'")}')">⬇ Scarica file</button>
    </div>`;
    return;
  }

  try {
    const blob = await fetchBlob(storagePath);
    const url  = URL.createObjectURL(blob);
    if (isImg) {
      body.innerHTML = `<img src="${url}" style="max-width:100%;max-height:78vh;object-fit:contain;display:block;padding:16px" onload="URL.revokeObjectURL(this.src)">`;
    } else {
      body.innerHTML = `<iframe src="${url}" style="width:100%;height:78vh;border:none"></iframe>`;
    }
  } catch(e) {
    body.innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626">Errore: ${e.message}</div>`;
  }
};

window.closePreview = function() {
  document.getElementById('preview-modal').style.display = 'none';

async function loadClientNews() {
  const el = document.getElementById('client-news-container');
  if (!el) return;
  // Se già caricato non riscaricare
  if (el.dataset.loaded) return;

  const FN = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/news-aggregator';
  const CATS = { business:'💼 Business', realestate:'🏠 Real Estate', visa:'📋 Visa', governo:'🏛️ Governo', mercati:'💹 Mercati' };
  const CAT_COLORS = { business:'#38bdf8', realestate:'#34d399', visa:'#a78bfa', governo:'#fbbf24', mercati:'#f87171' };

  el.innerHTML = '<div style="text-align:center;padding:32px;color:rgba(255,255,255,.4);font-size:13px">⏳ Caricamento notizie UAE...</div>';

  try {
    const r = await fetch(FN, { headers: { 
      Authorization: 'Bearer ' + window.ENV_SUPABASE_ANON_KEY,
      'x-anthropic-key': window.ENV_ANTHROPIC_KEY || '',
    } });
    const data = await r.json();
    if (!data.ok || !data.items?.length) throw new Error('Nessuna notizia');

    el.dataset.loaded = '1';

    // Category filter pills
    let currentCat = 'all';
    const items = data.items;

    function timeAgo(s) {
      const m = Math.floor((Date.now() - new Date(s)) / 60000);
      if (m < 2) return 'Ora'; if (m < 60) return m+'min'; 
      const h = Math.floor(m/60); if (h < 24) return h+'h';
      return Math.floor(h/24)+'g';
    }
    function escH(s) { return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function renderClientNews(cat) {
      const filtered = cat === 'all' ? items : items.filter(n => n.category === cat);
      const pills = ['all','governo','business','realestate','visa','mercati'].map(c => {
        const label = c === 'all' ? '🌐 Tutte' : (CATS[c] || c);
        const active = cat === c;
        return `<button onclick="setClientNewsCat('${c}')" style="white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid ${active ? CAT_COLORS[c]||'rgba(255,255,255,.6)' : 'rgba(255,255,255,.1)'};background:${active ? (CAT_COLORS[c]||'rgba(255,255,255,.2)')+'22' : 'none'};color:${active ? CAT_COLORS[c]||'white' : 'rgba(255,255,255,.5)'};cursor:pointer;font-family:inherit">${label}</button>`;
      }).join('');

      const cards = filtered.map(n => {
        const col = CAT_COLORS[n.category] || '#c9a84c';
        return `<a href="${escH(n.link)}" target="_blank" rel="noopener" style="display:block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-left:3px solid ${col};border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.07)'" onmouseout="this.style.background='rgba(255,255,255,.04)'">
          <div style="font-size:10px;font-weight:700;color:${col};text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">${escH(n.categoryLabel)} · ${escH(n.source)} · ${timeAgo(n.pubDate)}</div>
          <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.92);line-height:1.4;margin-bottom:6px">${escH(n.title)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.5">${escH(n.summary)}</div>
        </a>`;
      }).join('');

      el.innerHTML = `
        <div style="padding:0 0 12px">
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:800;color:white;margin-bottom:4px">📰 UAE News</div>
          <div style="font-size:11px;color:rgba(255,255,255,.35)">Aggiornate ${new Date(data.generated).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})} · tradotte in italiano</div>
        </div>
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;-ms-overflow-style:none;margin-bottom:8px">${pills}</div>
        ${cards || '<div style="padding:24px;text-align:center;color:rgba(255,255,255,.3);font-size:13px">Nessuna notizia in questa categoria</div>'}
        <div style="text-align:center;font-size:10px;color:rgba(255,255,255,.2);padding-top:8px">📡 Gulf News · WAM · Arabian Post · tradotto con AI</div>`;
    }

    window.setClientNewsCat = function(cat) { currentCat = cat; renderClientNews(cat); };
    renderClientNews('all');

  } catch(e) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:rgba(255,255,255,.3);font-size:13px">⚠️ ${escH ? escH(e.message) : e.message}<br><button onclick="loadClientNews()" style="margin-top:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit">Riprova</button></div>`;
  }
}

window.showPanel = function(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.ios-sheet-item').forEach(function(b){ b.classList.remove('active-item'); });
  var panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  var sitem = document.getElementById('sitem-' + name);
  if (sitem) sitem.classList.add('active-item');
  if (name === 'documenti') { cwd = '/'; renderDrive(); }
  if (name === 'pratiche') loadPraticheClient();
  if (name === 'zoho') loadZohoClient();
  if (name === 'news') loadClientNews();
  if (window.innerWidth <= 768) window.scrollTo({ top: 0, behavior: 'smooth' });
};
(function() {
  var startY = 0, pulling = false, triggered = false, THRESHOLD = 60;
  function getScroller() { return document.getElementById("main") || document.documentElement; }
  function gst() { var m = getScroller(); return m.scrollTop || window.scrollY || 0; }
  document.addEventListener("touchstart", function(e) {
    if (gst() <= 2) { startY = e.touches[0].clientY; pulling = true; triggered = false; }
    else { pulling = false; }
  }, { passive: true });
  document.addEventListener("touchmove", function(e) {
    if (!pulling) return;
    var delta = e.touches[0].clientY - startY;
    if (delta > 8 && gst() <= 2) { var b = document.getElementById("ptr-bar"); if (b) b.classList.add("visible"); }
  }, { passive: true });
  document.addEventListener("touchend", function(e) {
    if (!pulling) return; pulling = false;
    var delta = e.changedTouches[0].clientY - startY;
    var bar = document.getElementById("ptr-bar");
    if (delta > THRESHOLD && !triggered) {
      triggered = true; if (bar) bar.classList.add("visible");
      var ap = document.querySelector(".panel.active");
      if (ap) { var pn = ap.id.replace("panel-","");
        if (pn==="zoho") loadZohoClient();
        else if (pn==="pratiche") loadPraticheClient();
        else if (pn==="documenti") renderDrive(); }
      setTimeout(function(){ if (bar) bar.classList.remove("visible"); triggered=false; }, 1400);
    } else { if (bar) bar.classList.remove("visible"); }
  }, { passive: true });
  var sh = document.getElementById("ios-sheet"), shy = 0;
  if (sh) {
    sh.addEventListener("touchstart", function(e){ shy = e.touches[0].clientY; }, { passive: true });
    sh.addEventListener("touchend", function(e){ if (e.changedTouches[0].clientY - shy > 60) closeSheet(); }, { passive: true });
  }
})();
