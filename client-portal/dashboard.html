<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>InDubai — Il tuo Portale</title>
  <meta name="theme-color" content="#0f1e35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- OneSignal Push -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0c1a2e;
      --navy2: #142540;
      --gold: #c9a84c;
      --gold2: #f0d080;
      --bg: #0c1a2e;
      --surface: rgba(255,255,255,.07);
      --surface2: rgba(255,255,255,.11);
      --surface-solid: #1c2e44;
      --border: rgba(255,255,255,.1);
      --border2: rgba(255,255,255,.06);
      --text: #ffffff;
      --text2: rgba(255,255,255,.85);
      --muted: rgba(255,255,255,.45);
      --blue: #0a84ff;
      --green: #30d158;
      --red: #ff453a;
      --orange: #ff9f0a;
      --purple: #bf5af2;
      --teal: #5ac8fa;
      --r: 16px;
      --r-sm: 12px;
      --tab-h: 83px;
      --hdr-h: 52px;
    }

    body {
      font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      min-height: 100vh;
    }



    /* ── HEADER ── */
    .header {
      background: rgba(10,22,40,.96);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: 20px; padding-right: 20px; padding-bottom: 0;
      display: flex; flex-direction: column; justify-content: flex-end;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      border-bottom: 0.5px solid var(--border2);
    }
    .header-inner {
      height: var(--hdr-h);
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      font-size: 20px; font-weight: 800; color: white;
      letter-spacing: -.5px; line-height: 1;
    }
    .logo-mark span { color: var(--gold); }
    .logo-divider { display: none; }
    .logo-sub { display: none; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-company {
      font-size: 12px; color: var(--muted); font-weight: 500;
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-menu {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: white; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-logout { display: none; }

    /* ── LAYOUT ── */
    .sidebar { display: none; }
    .layout { display: block; }
    .main {
      padding-top: calc(var(--hdr-h) + env(safe-area-inset-top, 0px) + 16px);
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: calc(58px + max(env(safe-area-inset-bottom, 16px), 16px) + 12px);
    }

    /* ── BOTTOM TAB BAR ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(18,30,48,.95);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-top: 0.5px solid rgba(255,255,255,.08);
      display: flex; align-items: flex-start;
      padding-top: 12px;
      /* abbraccia home indicator */
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 16px);
      z-index: 100;
      /* impedisce stacco al bounce */
      box-shadow: 0 60px 0 60px rgba(18,30,48,.95);
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    .tab-label { font-size: 10px; font-weight: 500; color: var(--muted); }
    .tab-item.active .tab-label { color: var(--blue); font-weight: 600; }
    .tab-item.active .tab-icon { transform: scale(1.12); }
    .tab-item:active .tab-icon { transform: scale(.88); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── SPINNER ── */
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(255,255,255,.08);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 70px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 28px; font-weight: 800;
      color: var(--text);
      letter-spacing: -.5px;
      margin-bottom: 16px;
      padding: 0 2px;
    }

    /* ── HERO (panel anagrafica top) ── */
    .hero {
      background: linear-gradient(160deg, #1b3d6e 0%, #0c2040 60%, #071428 100%);
      border: 0.5px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 12px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(201,168,76,.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-welcome {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px;
    }
    .hero-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 6px; line-height: 1.2; }
    .hero-sub { font-size: 13px; color: rgba(255,255,255,.4); line-height: 1.45; margin-bottom: 14px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .hero-badge {
      padding: 4px 12px;
      background: rgba(255,255,255,.1);
      border: 0.5px solid rgba(255,255,255,.15);
      border-radius: 20px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.75);
    }
    .hero-badge.gold {
      background: rgba(201,168,76,.2);
      border-color: rgba(201,168,76,.3);
      color: var(--gold2);
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface-solid);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .card-header {
      padding: 18px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid var(--border2);
    }
    .card-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 0 18px 18px; }

    /* ── INFO GRID (anagrafica) ── */
    .info-grid { display: flex; flex-direction: column; padding-top: 4px; }
    .info-field {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border2);
      gap: 16px;
    }
    .info-field:last-child { border-bottom: none; padding-bottom: 4px; }
    .info-field label {
      font-size: 14px; color: var(--muted); font-weight: 400; flex-shrink: 0;
    }
    .info-field span {
      font-size: 14px; font-weight: 500; color: var(--text2); text-align: right;
      word-break: break-word;
    }
    .info-field span.empty { color: var(--muted); font-weight: 400; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green  { background: rgba(48,209,88,.15);  color: #30d158; }
    .badge-yellow, .badge-orange { background: rgba(255,159,10,.15); color: #ff9f0a; }
    .badge-red    { background: rgba(255,69,58,.15);  color: #ff453a; }
    .badge-blue   { background: rgba(10,132,255,.15); color: #0a84ff; }
    .badge-gray   { background: rgba(255,255,255,.1); color: var(--muted); }

    /* ── VISA / SCADENZE ── */
    .visa-card, .scad-row {
      background: var(--surface-solid);
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px;
    }
    .visa-icon, .scad-dot { font-size: 28px; flex-shrink: 0; }
    .scad-dot { width: 10px; height: 10px; border-radius: 50%; font-size: inherit; }
    .visa-name, .scad-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .visa-type, .scad-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .visa-exp { margin-left: auto; text-align: right; }
    .visa-exp-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .visa-exp-date { font-size: 13px; font-weight: 600; color: var(--text2); margin-top: 2px; }
    .scad-days { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }

    /* ── DRIVE ── */
    .drv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 8px; }
    .drv-list {
      background: var(--surface-solid);
      border: 0.5px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .drv-card {
      background: var(--surface-solid);
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 8px 12px;
      text-align: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .12s, transform .12s;
    }
    .drv-card:active { opacity: .6; transform: scale(.95); }
    .drv-ico { font-size: 34px; margin-bottom: 8px; line-height: 1; }
    .drv-nm { font-size: 11px; color: var(--text2); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
    .drv-sz { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .drv-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px;
      border-bottom: 0.5px solid var(--border2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .drv-row:last-child { border-bottom: none; }
    .drv-row:active { background: rgba(255,255,255,.04); }
    .drv-row-name { flex: 1; font-size: 15px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .drv-row-meta { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* Drive toolbar */
    .drive-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
    .folder-tab {
      padding: 5px 14px;
      background: rgba(255,255,255,.08);
      border: 0.5px solid var(--border);
      border-radius: 20px; font-size: 13px;
      color: var(--text2); cursor: pointer; font-family: inherit;
      white-space: nowrap;
    }
    .folder-tab.active { background: var(--blue); border-color: var(--blue); color: white; }

    /* Download button */
    .btn-dl {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 20px;
      background: var(--blue); color: white;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .btn-act {
      padding: 5px 12px;
      background: rgba(10,132,255,.15); color: var(--blue);
      border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    /* ── MODAL (file preview) ── */
    .prev-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: flex-end;
    }
    .prev-overlay.open { display: flex; }
    .prev-modal {
      background: #1c2e44;
      border: 0.5px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%; max-height: 92vh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .prev-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 0.5px solid var(--border2);
      position: relative;
    }
    .prev-header::before {
      content: '';
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 4px;
      background: rgba(255,255,255,.2); border-radius: 2px;
    }
    .prev-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
    .prev-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: none;
      font-size: 13px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .prev-body { flex: 1; overflow: auto; min-height: 200px; background: #111c2d; }

    /* ── SERVIZI ── */
    .srv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .srv-card {
      background: var(--surface-solid);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 18px 14px; position: relative;
    }
    .srv-tag {
      position: absolute; top: 12px; right: 12px;
      background: var(--gold); color: #1a1000;
      font-size: 9px; font-weight: 800; padding: 2px 7px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .4px;
    }
    .srv-icon { font-size: 30px; margin-bottom: 10px; }
    .srv-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .srv-desc { font-size: 11px; color: var(--muted); line-height: 1.45; margin-bottom: 12px; }
    .srv-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 9px;
      background: rgba(10,132,255,.15); color: var(--blue);
      border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      text-decoration: none; cursor: pointer;
    }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty-state .icon, .empty-state .e-icon { font-size: 48px; margin-bottom: 14px; display: block; }
    .empty-state h3 { font-size: 17px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── IOS SHEET ── */
    .ios-sheet-overlay {
      position: fixed; inset: 0; z-index: 499;
      background: rgba(0,0,0,.5); display: none;
    }
    .ios-sheet-overlay.open { display: block; }
    .ios-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(22,36,58,.97);
      backdrop-filter: saturate(180%) blur(28px);
      -webkit-backdrop-filter: saturate(180%) blur(28px);
      border: 0.5px solid var(--border);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1,.23,1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .ios-sheet.open { transform: translateY(0); }
    .ios-sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 12px auto 16px; }
    .ios-sheet-header { padding: 0 22px 16px; border-bottom: 0.5px solid var(--border2); }
    .ios-sheet-company { font-size: 18px; font-weight: 700; color: var(--text); }
    .ios-sheet-email { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .ios-sheet-section { padding: 18px 22px 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
    .ios-sheet-item {
      width: 100%; display: flex; align-items: center;
      padding: 14px 22px;
      background: none; border: none;
      border-bottom: 0.5px solid var(--border2);
      font-size: 16px; font-family: inherit; color: var(--text2);
      cursor: pointer; text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .ios-sheet-item:active { background: rgba(255,255,255,.05); }
    .ios-sheet-item.active-item { color: var(--blue); }
    .item-icon { font-size: 18px; margin-right: 14px; width: 24px; text-align: center; }
    .item-chevron { margin-left: auto; color: var(--muted); font-size: 16px; }
    .ios-sheet-logout {
      width: calc(100% - 32px); margin: 16px 16px;
      padding: 14px; background: rgba(255,69,58,.1);
      border: 0.5px solid rgba(255,69,58,.2);
      border-radius: 14px;
      font-size: 16px; font-weight: 600; color: var(--red);
      font-family: inherit; cursor: pointer;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 11px 22px; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .12s;
    }
    .btn:active { opacity: .55; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-gold { background: var(--gold); color: #1a1000; }
    .btn-ghost { background: rgba(10,132,255,.12); color: var(--blue); }
    .btn-danger { background: rgba(255,69,58,.1); color: var(--red); }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 10px; }

    /* ── NEWS card override ── */
    #client-news-container div[onclick] {
      background: var(--surface-solid) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }

    /* ── PRATICHE ── */
    #pratiche-client-content .card {
      background: var(--surface-solid);
    }

    /* ── DESKTOP ── */
    @media (min-width: 900px) {
      body::before { display: none; }
      .header { height: 60px; padding: 0 32px; }
      .tab-bar { display: none; }
      .sidebar {
        display: block; width: 220px;
        background: rgba(255,255,255,.04);
        border-right: 0.5px solid var(--border2);
        padding: 20px 0;
        position: sticky; top: 60px;
        height: calc(100vh - 60px); overflow-y: auto; flex-shrink: 0;
      }
      .layout { display: flex; margin-top: 60px; }
      .main { padding: 28px 32px; flex: 1; }
      .nav-section { padding: 0 18px 6px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
      .nav-item {
        width: 100%; display: flex; align-items: center; gap: 10px;
        padding: 10px 18px; background: none; border: none;
        border-left: 3px solid transparent;
        font-size: 14px; font-weight: 500; color: var(--muted);
        cursor: pointer; font-family: inherit; text-align: left;
      }
      .nav-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
      .nav-item.active { background: rgba(10,132,255,.1); border-left-color: var(--blue); color: var(--blue); font-weight: 600; }
      .nav-icon { font-size: 15px; width: 20px; text-align: center; }
      .section-title { font-size: 24px; }
    }

  </style>
</head>
<body>

<!-- Desktop header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">In<span>Dubai</span></div>
    </div>
    <div class="header-right">
      <span class="header-company" id="header-company"></span>
      <button class="btn-menu" onclick="openSheet()">☰</button>
    </div>
  </div>
</div>

<!-- Sheet overlay backdrop -->
<div class="ios-sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- iOS Sheet Menu -->
<div class="ios-sheet" id="ios-sheet">
  <div class="ios-sheet-handle"></div>
  <div class="ios-sheet-header">
    <div class="ios-sheet-company" id="sheet-company">—</div>
    <div class="ios-sheet-email" id="sheet-email">—</div>
  </div>
  <div class="ios-sheet-section">Il mio profilo</div>
  <button class="ios-sheet-item active-item" id="sitem-anagrafica" onclick="sheetGo('anagrafica','AZIENDA')"><span class="item-icon">🏢</span>La mia Azienda<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-documenti"  onclick="sheetGo('documenti','DOCUMENTI')"><span class="item-icon">📁</span>Documenti<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-scadenze"   onclick="sheetGo('scadenze','SCADENZE')"><span class="item-icon">📅</span>Scadenze<span class="item-chevron">›</span></button>
  <button class="ios-sheet-item" id="sitem-zoho"       onclick="sheetGo('zoho','CONTABILITÀ')"><span class="item-icon">📊</span>Contabilità<span class="item-chevron">›</span></button>

<script>
const SB_URL = window.ENV_SUPABASE_URL;
const SB_KEY = window.ENV_SUPABASE_ANON_KEY;
function H() {
  const tok = sb.getSession()?.access_token || SB_KEY;
  return { apikey: SB_KEY, Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' };
}
async function GET(path) {
  const r = await fetch(SB_URL + path, { headers: H() });
  return r.json();
}
async function doLogout() {
  try { await fetch(SB_URL + '/auth/v1/logout', { method: 'POST', headers: H() }); } catch {}
  localStorage.removeItem('indubai_session');
  window.location.href = 'login.html';
}

let clientData = null;
let allFiles = [];

async function loadFinancials(clientId) {
  // Live sync from Zoho if org_id available
  const orgId = clientData?.zoho_org_id;
  if (orgId) {
    try {
      const FN = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/zoho-proxy';
      const res = await fetch(FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY) },
        body: JSON.stringify({ action: 'client_summary', org_id: orgId }),
      });
      const d = await res.json();
      if (!d.error && d.rolling12AED !== undefined) {
        const fin = {
          client_id: clientId, zoho_org_id: orgId,
          total_invoiced: Math.round(d.totalBilledAED || 0),
          total_collected: Math.round(d.totalPaidAED || 0),
          total_outstanding: Math.round(d.totalUnpaidAED || 0),
          invoiced_12m: Math.round(d.rolling12AED || 0),
          invoice_count: d.countInvoices || 0,
          currency: 'AED',
          last_synced_at: new Date().toISOString(),
        };
        fetch(SB_URL + '/rest/v1/client_financials', {
          method: 'POST',
          headers: { apikey: SB_KEY, Authorization: 'Bearer ' + (sb.getSession()?.access_token || SB_KEY), 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
          body: JSON.stringify(fin),
        }).catch(() => {});
        return fin;
      }
    } catch(e) { console.warn('live sync failed, using cached:', e.message); }
  }
  // Fallback: cached data (force fresh from DB)
  try {
    const rows = await GET('/rest/v1/client_financials?client_id=eq.' + clientId + '&select=*&order=last_synced_at.desc&limit=1');
    if (rows?.[0]) {
      // Aggiorna last_synced_at al momento attuale per mostrare data corretta
      rows[0]._cached = true;
      return rows[0];
    }
    return null;
  } catch { return null; }
}

async function loadVisas(clientId) {
  try {
    const visas = await GET(`/rest/v1/client_visas?client_id=eq.${clientId}&select=holder_name,visa_type,expiry_date&order=expiry_date.asc`);
    return visas || [];
  } catch { return []; }
}


async function refreshFinancials() {
  const container = document.getElementById('fin-card-container');
  if (!container) { console.warn('fin-card-container not found'); return; }
  const orig = container.innerHTML;
  container.innerHTML = '<div style="text-align:center;padding:40px 20px"><div class="spinner" style="margin:0 auto"></div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:16px">Caricamento dati finanziari...</div></div>';
  try {
    if (!clientData?.id) throw new Error('clientData non disponibile');
    console.log('refreshFinancials: clientId=', clientData.id, 'zoho_org_id=', clientData.zoho_org_id);
    const fin = await loadFinancials(clientData.id);
    console.log('loadFinancials result:', fin);
    if (fin) {
      container.innerHTML = financialsHTML(fin);
    } else {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,.4);font-size:13px">Nessun dato finanziario disponibile.<br><small>Configura Zoho per dati live.</small></div>';
    }
  } catch(e) {
    console.warn('refresh failed:', e.message);
    container.innerHTML = orig;
  }
}
async function init() {
  // Auto-refresh token ogni 10 min
  setInterval(function() { try { sb.refreshSession && sb.refreshSession(); } catch(e) {} }, 600000);
  const sess = sb.getSession();
  if (!sess?.access_token) { window.location.href = 'login.html'; return; }

  try {
    // Get client_id
    const links = await GET(`/rest/v1/client_users?user_id=eq.${sess.user.id}&select=client_id`);
    if (!links?.length) throw new Error('Nessun cliente collegato. Contatta il tuo consulente.');
    const clientId = links[0].client_id;

    // Load client
    const clients = await GET(`/rest/v1/clients?id=eq.${clientId}&select=*`);
    clientData = clients?.[0];
    if (!clientData) throw new Error('Dati aziendali non trovati.');

    // Load files
    allFiles = await GET(`/rest/v1/client_files?client_id=eq.${clientId}&select=id,display_name,file_size,mime_type,folder,storage_path,created_at&order=created_at.desc`) || [];

    // Set header
    document.getElementById('header-company').textContent = clientData.company_name;

    // Load visas and financials in parallel
    const [visas, financials] = await Promise.all([
      loadVisas(clientId),
      loadFinancials(clientId),
    ]);

    // Render all panels
    renderAll();
    try {
      document.getElementById('main').innerHTML = buildMainHTML(visas, financials);
    } catch(renderErr) {
      document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Render error:</strong> \${renderErr.message}</div>`;
    }
    setupNav();
    // Init push notifications after login
    initOneSignal(sess.user.id, clientData.company_name);
    // Pre-render drive if documenti panel is pre-selected
    // (it will render when user clicks the tab via showPanel)

  } catch(e) {
    document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626"><strong>Errore:</strong> ${e.message}<br><small style="color:#666">${e.stack||''}</small></div>`;
  }
}

            <div style="font-size:11px;color:rgba(255,255,255,.5)">Aggiornato: ${lastSync}</div>
            <button onclick="refreshFinancials()" id="fin-refresh-btn" style="background:rgba(255,255,255,.12);border:0.5px solid rgba(255,255,255,.2);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent">↻</button>
          </div>
        </div>
      </div>
      <div class="card-body" style="padding:20px">

        <!-- KPI Grid -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px">

          <div style="background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Fatturato Totale</div>
            <div style="font-size:18px;font-weight:800;color:#ffffff">${fmt(f.total_invoiced)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">dall'inizio attività</div>
          </div>

          <div style="background:rgba(48,209,88,.12);border:0.5px solid rgba(48,209,88,.2);border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:#30d158;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Incassato</div>
            <div style="font-size:18px;font-weight:800;color:#30d158">${fmt(f.total_collected)}</div>

          </div>

          <div style="background:${f.total_outstanding > 0 ? 'rgba(255,159,10,.15)' : 'rgba(255,255,255,.06)'};border:0.5px solid ${f.total_outstanding > 0 ? 'rgba(255,159,10,.3)' : 'rgba(255,255,255,.1)'};border-radius:12px;padding:14px 16px">
            <div style="font-size:11px;font-weight:700;color:${f.total_outstanding > 0 ? '#ff9f0a' : 'rgba(255,255,255,.45)'};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Da Incassare</div>
            <div style="font-size:18px;font-weight:800;color:${f.total_outstanding > 0 ? '#ff9f0a' : '#ffffff'}">${fmt(f.total_outstanding)}</div>

          </div>

        </div>

        <!-- VAT Bar -->

async function loadZohoClient() {
  const el = document.getElementById('zoho-client-content');
  const orgId = clientData && clientData.zoho_org_id;
  if (!orgId) { el.innerHTML = '<div style="padding:32px;text-align:center;color:rgba(255,255,255,.45)">Nessun account Zoho Books collegato. Contatta il tuo consulente.</div>'; return; }
  el.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="margin-top:12px;font-size:13px;color:rgba(255,255,255,.45)">Connessione a Zoho Books...</div></div>';
  try {
    const res = await fetch('https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/bright-service', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ action: 'client_summary', org_id: orgId })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    const fmt = function(n) { if (n===undefined||n===null||isNaN(n)) return '--'; return new Intl.NumberFormat('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n); };
    const cur = d.orgCurrency || 'AED';
    const isMulti = cur !== 'AED';
    if (!d.rolling12AED) d.rolling12AED = 0;
    if (!d.prevYearAED) d.prevYearAED = 0;
    if (!d.totalBilledAED) d.totalBilledAED = d.totalBilled || 0;
    if (!d.totalPaidAED) d.totalPaidAED = d.totalPaid || 0;
    if (!d.totalUnpaidAED) d.totalUnpaidAED = d.totalUnpaid || 0;
    if (!d.vatStatus) d.vatStatus = 'ok';
    if (!d.vatThreshold) d.vatThreshold = 375000;
    if (!d.rolling12Start) d.rolling12Start = new Date(Date.now()-365*86400000).toISOString().split('T')[0];
    const vatPct = Math.min(100, Math.round(d.rolling12AED/d.vatThreshold*100));
    const vatReg = clientData && clientData.vat_registered;
    const exceeded = d.vatStatus==='exceeded' || d.vatStatus==='warning';
    const vc = vatReg ? '#059669' : exceeded ? '#d97706' : '#059669';
    const vb = vatReg ? '#f0fdf4' : exceeded ? '#fffbeb' : '#f0fdf4';
    const vbr = vatReg ? '#86efac' : exceeded ? '#fde68a' : '#86efac';
    const vl = vatReg ? 'VAT Registrata' : d.vatStatus==='exceeded' ? 'Soglia VAT raggiunta — contatta il tuo consulente' : d.vatStatus==='warning' ? 'In avvicinamento alla soglia VAT' : 'Tutto in ordine — sotto la soglia VAT';
    const pp = Math.round(d.totalBilled ? d.totalPaid/d.totalBilled*100 : 0);
    const up = Math.round(d.totalBilled ? d.totalUnpaid/d.totalBilled*100 : 0);
    const now = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const yoyColor = d.totalBilledAED >= d.prevYearAED ? '#059669' : '#dc2626';
    const yoyArrow = d.totalBilledAED >= d.prevYearAED ? '\u25b2' : '\u25bc';
    const yoyText = d.prevYearAED ? yoyArrow + ' ' + Math.abs(Math.round((d.totalBilledAED-d.prevYearAED)/d.prevYearAED*100)) + '% vs anno prec.' : '--';
    const unpaidBg = d.totalUnpaid > 0 ? 'linear-gradient(135deg,#7f1d1d,#dc2626)' : 'linear-gradient(135deg,#374151,#6b7280)';
    el.innerHTML =
      '<div style="padding:4px 0">' +
      '<div style="background:'+vb+';border:1.5px solid '+vbr+';border-radius:14px;padding:20px 24px;margin-bottom:24px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">' +
          '<div><div style="font-size:13px;font-weight:700;color:'+vc+'">Soglia VAT — Ultimi 12 mesi</div>' +
          '<div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:2px">Da '+d.rolling12Start+' a oggi · in AED</div></div>' +
          '<div style="text-align:right"><div style="font-size:20px;font-weight:800;color:'+vc+'">AED '+fmt(d.rolling12AED)+'</div>' +
          '<div style="font-size:11px;color:rgba(255,255,255,.45)">'+vatPct+'% di AED '+fmt(d.vatThreshold)+'</div></div>' +
        '</div>' +
        '<div style="background:white;border-radius:100px;height:12px;overflow:hidden;margin-bottom:8px">' +
          '<div style="height:100%;border-radius:100px;background:'+vc+';width:'+vatPct+'%;transition:width .6s ease"></div></div>' +
        '<div style="font-size:12px;font-weight:600;color:'+vc+'">'+vl+'</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px">' +
        '<div style="background:linear-gradient(135deg,#1a3a5c,#2563a8);border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Fatturato '+d.year+'</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalBilled)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalBilledAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+d.countInvoices+' fatture emesse</div></div>' +
        '<div style="background:linear-gradient(135deg,#065f46,#059669);border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Incassato</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalPaid)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalPaidAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+pp+'% del fatturato</div></div>' +
        '<div style="background:'+unpaidBg+';border-radius:14px;padding:20px 24px;color:white">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px">Da Incassare</div>' +
          '<div style="font-size:22px;font-weight:800">'+cur+' '+fmt(d.totalUnpaid)+'</div>' +
          (isMulti ? '<div style="font-size:11px;color:rgba(255,255,255,.5)">AED '+fmt(d.totalUnpaidAED)+'</div>' : '') +
          '<div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">'+d.countOverdue+' scadute</div></div>' +
        '<div style="background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:14px;padding:20px 24px">' +
          '<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px">Anno prec. ('+(d.year-1)+')</div>' +
          '<div style="font-size:22px;font-weight:800">AED '+fmt(d.prevYearAED)+'</div>' +

// DRIVE LOGIC
let cwd = '/';
let driveView = 'grid';

const esc  = s => String(s||'').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const sz   = b => !b?'': b<1024?b+'B': b<1048576?(b/1024).toFixed(0)+'KB':(b/1048576).toFixed(1)+'MB';
const dt   = s => new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
const mico = (m,n) => {
  if(m?.includes('pdf')) return '📄';
  if(m?.includes('word')) return '📝';
  if(m?.includes('excel')||m?.includes('sheet')) return '📊';
  if(m?.startsWith('image')) return '🖼️';
  const e=(n||'').split('.').pop().toLowerCase();
  return {zip:'🗜️',rar:'🗜️',txt:'📃',csv:'📊',ppt:'📑',pptx:'📑'}[e]||'📎';
};

function renderDrive() {
  if (!allFiles.length) {
    document.getElementById('drive-content').innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>Nessun documento disponibile.<br>Il tuo consulente caricherà i documenti qui.</p></div>`;
    return;
  }
  // Build virtual folder tree from flat file list
  const files = allFiles.filter(f => (f.folder||'/') === cwd && f.display_name !== '.keep');
  const subsSet = new Set();
  allFiles.forEach(f => {
    const folder = f.folder || '/';
    if (!folder.startsWith(cwd) || folder === cwd) return;
    const seg = folder.slice(cwd.length).split('/')[0];
    if (seg) subsSet.add(seg);
  });
  const dirs = [...subsSet].sort();

  renderBC();

  // GRID
  let g = '<div class="drv-grid">';
  dirs.forEach(n => {
    g += `<div class="drv-card drv-dir" data-dir="${esc(n)}">
      <div class="drv-ico">📁</div>
      <div class="drv-nm">${esc(n)}</div>
      <div class="drv-sz">Cartella</div>
    </div>`;
  });
  files.forEach(f => {
    g += `<div class="drv-card drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <div class="drv-ico">${mico(f.mime_type, f.display_name)}</div>
      <div class="drv-nm">${esc(f.display_name)}</div>
      <div class="drv-sz">${sz(f.file_size)}</div>
    </div>`;
  });
  g += '</div>';

  // LIST
  let l = '<div class="drv-list">';
  dirs.forEach(n => {
    l += `<div class="drv-row drv-dir" data-dir="${esc(n)}">
      <span style="font-size:20px">📁</span>
      <span class="drv-row-name">${esc(n)}</span>
      <span class="drv-row-meta">Cartella</span>
      <span class="drv-row-meta">—</span>
    </div>`;
  });
  files.forEach(f => {
    l += `<div class="drv-row drv-file" data-sp="${esc(f.storage_path)}" data-nm="${esc(f.display_name)}" data-mime="${esc(f.mime_type||'')}">
      <span style="font-size:20px">${mico(f.mime_type, f.display_name)}</span>
      <span class="drv-row-name">${esc(f.display_name)}</span>
      <span class="drv-row-meta">${dt(f.created_at)}</span>
      <span class="drv-row-meta">${sz(f.file_size)}</span>
    </div>`;
  });
  l += '</div>';

  document.getElementById('drive-content').innerHTML = g + l;
  applyDriveView();
  // Event delegation for file clicks
  document.getElementById('drive-content').querySelectorAll('.drv-file').forEach(el => {
    el.addEventListener('click', () => previewFile(el.dataset.sp, el.dataset.nm, el.dataset.mime));
  });
  document.getElementById('drive-content').querySelectorAll('.drv-dir').forEach(el => {
    el.addEventListener('click', () => cdDir(el.dataset.dir));
  });
}

function cdDir(name) {
  cwd = cwd + name + '/';
  renderDrive();
}

function renderBC() {
  const bc = document.getElementById('drive-bc');
  if (!bc) return;
  const parts = cwd.split('/').filter(Boolean);
  let html = `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='/';renderDrive()">📁 Documenti</span>`;
  let built = '/';
  parts.forEach((p,i) => {
    built += p+'/';
    const target = built;
    const isLast = i === parts.length-1;
    html += ` <span style="color:var(--muted)">›</span> `;
    html += isLast
      ? `<span style="color:#ffffff">${esc(p)}</span>`
      : `<span style="cursor:pointer;color:var(--gold)" onclick="cwd='${target}';renderDrive()">${esc(p)}</span>`;
  });
  bc.innerHTML = html;
}

function setDriveView(v) {

// Web: OneSignal Web SDK | Native: @capacitor/push-notifications → Edge Function
function initOneSignal(userId, companyName) {
  const isNative = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
  if (!isNative) {
    // WEB
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      try {
        await OneSignal.init({
          appId: '06f381cd-ed3d-4393-a5c2-3f6ef8322661',
          serviceWorkerPath: '/OneSignalSDKWorker.js',
          serviceWorkerParam: { scope: '/' },
          notifyButton: { enable: false },
          welcomeNotification: { disable: true },
        });
        await OneSignal.User.addTag('company', companyName);
        await OneSignal.User.addTag('client_id', userId);
        var perm = OneSignal.Notifications.permissionNative;
        if (perm === 'default') setTimeout(showPushPrompt, 3000);
      } catch(e) { console.warn('OneSignal web:', e); }
    });
    return;
  }

  // NATIVE iOS - usa @capacitor/push-notifications per il token APNs
  // poi registra il device su OneSignal via Edge Function server-side
  var { PushNotifications } = window.Capacitor.Plugins;
  if (!PushNotifications) { console.warn('PushNotifications plugin non trovato'); return; }

  // Listener APNs token
  PushNotifications.addListener('registration', async function(token) {
    console.log('APNs token:', token.value.substring(0,20) + '...');
    try {
      var sess = sb.getSession();
      var res = await fetch('https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/register-device', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (sess?.access_token || '')
        },
        body: JSON.stringify({ token: token.value, client_id: userId, company: companyName })
      });
      var data = await res.json();
      if (data.player_id) {
        console.log('✅ Device registrato su OneSignal:', data.player_id);
      } else {
        console.warn('❌ register-device error:', data.error);
      }
    } catch(e) { console.warn('register-device fetch error:', e); }
  });

  PushNotifications.addListener('registrationError', function(err) {
    console.warn('APNs registrationError:', JSON.stringify(err));
  });

  PushNotifications.addListener('pushNotificationActionPerformed', function(action) {
    var url = action?.notification?.data?.url;
    if (url) window.location.href = url;
  });

  // Richiedi permesso
  PushNotifications.checkPermissions().then(function(status) {
    console.log('Push permission status:', status.receive);
    if (status.receive === 'granted') {
      PushNotifications.register();
    } else if (status.receive !== 'denied') {
      // Mostra prompt dopo 2s
      setTimeout(function() {
        PushNotifications.requestPermissions().then(function(result) {
          console.log('Push permission result:', result.receive);
          if (result.receive === 'granted') {
            PushNotifications.register();
          }
        });
      }, 2000);
    }
  });
}

function showPushPrompt() {
  if (document.getElementById('push-prompt')) return;
  var s = document.createElement('style');
  s.textContent = '@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}';
  document.head.appendChild(s);

  document.body.appendChild(el);
}

    try { await OS.Notifications.requestPermission(); } catch(e) {}

};

};

async function loadPraticheClient() {

  try {
    // Aspetta clientData max 5 secondi
    let waited = 0;
    while (!clientData?.id && waited < 5000) {
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (!clientData?.id) throw new Error('Sessione scaduta, ricarica la pagina');
    const clientId = clientData.id;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const r = await fetch(SB_URL + '/rest/v1/client_practices?client_id=eq.' + clientId + '&select=id,title,category,status,description,due_date,completed_at,created_at&order=created_at.desc', { headers: H(), signal: controller.signal });

    if (!r.ok) {
      const err = await r.json();

    const pratiche = await r.json();

async function fetchBlob(storagePath) {
  const tok = sb.getSession()?.access_token || SB_KEY;
  const r = await fetch(`${SB_URL}/storage/v1/object/authenticated/client-documents/${storagePath}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${tok}` }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.blob();
}

window.downloadFile = async function(storagePath, name) {
  try {
    const blob = await fetchBlob(storagePath);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) { alert('Errore download: ' + e.message); }
};

window.previewFile = async function(storagePath, name, mime) {
  const modal = document.getElementById('preview-modal');
  const body  = document.getElementById('preview-body');
  const title = document.getElementById('preview-title');
  const dlBtn = document.getElementById('preview-dl-btn');

  title.textContent = name;
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px"><div class="spinner"></div></div>';
  modal.style.display = 'flex';

  dlBtn.onclick = () => downloadFile(storagePath, name);

  const ext = (name || '').split('.').pop().toLowerCase();
  const isImg = mime?.startsWith('image') || ['jpg','jpeg','png','webp','gif','bmp','svg','tiff','tif'].includes(ext);
  const isPdf = mime?.includes('pdf') || ext === 'pdf';

  if (!isImg && !isPdf) {
    const icons = {doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📑',pptx:'📑',zip:'🗜️',rar:'🗜️',txt:'📃'};
    const ico = icons[ext] || '📎';
    body.innerHTML = `<div style="text-align:center;padding:50px 30px">
      <div style="font-size:56px;margin-bottom:16px">${ico}</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:#ffffff">${name}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Anteprima non disponibile — clicca per scaricare</div>
      <button class="btn-dl" onclick="downloadFile('${storagePath.replace(/'/g,"\'")}','${name.replace(/'/g,"\'")}')">⬇ Scarica file</button>
    </div>`;
    return;
  }

  try {
    const blob = await fetchBlob(storagePath);
    const url  = URL.createObjectURL(blob);
    if (isImg) {
      body.innerHTML = `<img src="${url}" style="max-width:100%;max-height:78vh;object-fit:contain;display:block;padding:16px" onload="URL.revokeObjectURL(this.src)">`;
    } else {
      body.innerHTML = `<iframe src="${url}" style="width:100%;height:78vh;border:none"></iframe>`;
    }
  } catch(e) {
    body.innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626">Errore: ${e.message}</div>`;
  }
};

};
(function() {
  var startY = 0, pulling = false, triggered = false, THRESHOLD = 60;
  function getScroller() { return document.getElementById("main") || document.documentElement; }
  function gst() { var m = getScroller(); return m.scrollTop || window.scrollY || 0; }
  document.addEventListener("touchstart", function(e) {
    if (gst() <= 2) { startY = e.touches[0].clientY; pulling = true; triggered = false; }
    else { pulling = false; }
  }, { passive: true });

    if (!pulling) return;
    var delta = e.touches[0].clientY - startY;
    if (delta > 8 && gst() <= 2) { var b = document.getElementById("ptr-bar"); if (b) b.classList.add("visible"); }
  }, { passive: true });
  document.addEventListener("touchend", function(e) {
    if (!pulling) return; pulling = false;
    var delta = e.changedTouches[0].clientY - startY;
    var bar = document.getElementById("ptr-bar");
    if (delta > THRESHOLD && !triggered) {
      triggered = true; if (bar) bar.classList.add("visible");
      var ap = document.querySelector(".panel.active");
      if (ap) { var pn = ap.id.replace("panel-","");
        if (pn==="zoho") loadZohoClient();
        else if (pn==="pratiche") loadPraticheClient();
        else if (pn==="documenti") renderDrive(); }
      setTimeout(function(){ if (bar) bar.classList.remove("visible"); triggered=false; }, 1400);
    } else { if (bar) bar.classList.remove("visible"); }
  }, { passive: true });
  var sh = document.getElementById("ios-sheet"), shy = 0;
  if (sh) {
    sh.addEventListener("touchstart", function(e){ shy = e.touches[0].clientY; }, { passive: true });
    sh.addEventListener("touchend", function(e){ if (e.changedTouches[0].clientY - shy > 60) closeSheet(); }, { passive: true });
  }
})();

// Safety check before init
window.addEventListener('DOMContentLoaded', function() {
  if (typeof sb === 'undefined') {
    document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center;color:#dc2626">Errore: libreria sb non caricata</div>';
    return;
  }
  if (!window.ENV_SUPABASE_URL) {
    document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center;color:#dc2626">Errore: configurazione mancante</div>';
    return;
  }
  init().catch(e => {
    document.getElementById('main').innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626">Init error: ${e.message}</div>`;
  });
});

// ── TAB BAR ──────────────────────────────────────────
function tabGo(name, icon, label, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  showPanel(name, null);
  // aggiorna anche sidebar
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function syncTabBar(name) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
}
</script>
