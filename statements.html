<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Estratti Conto — InDubai Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .status-cell { text-align:center; padding:6px 3px !important; cursor:pointer; white-space:nowrap; }
    .status-cell:hover { background:var(--surface2); }
    .month-h { text-align:center; padding:8px 4px !important; font-size:11px; }

    .filter-bar {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding:12px 20px; background:white; border-bottom:1.5px solid var(--border);
    }
    .filter-bar select, .filter-bar input {
      padding:7px 12px; border:1.5px solid var(--border); border-radius:8px;
      font-size:13px; font-family:inherit; outline:none; background:white; transition:border-color .15s;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color:var(--primary); }
    .filter-chip {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
      cursor:pointer; border:1.5px solid var(--border); background:white;
      color:var(--text-muted); transition:all .12s;
    }
    .filter-chip:hover { border-color:var(--primary); color:var(--primary); }
    .filter-chip.on { background:var(--primary); border-color:var(--primary); color:white; }
    .filter-count { font-size:12px; color:var(--text-muted); white-space:nowrap; }

    .pagination {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; border-top:1.5px solid var(--border); background:white; flex-wrap:wrap; gap:10px;
    }
    .page-info { font-size:13px; color:var(--text-muted); }
    .page-btns { display:flex; gap:6px; }
    .page-btn {
      width:34px; height:34px; border-radius:8px; border:1.5px solid var(--border);
      background:white; cursor:pointer; font-size:13px; font-weight:600;
      display:flex; align-items:center; justify-content:center; transition:all .12s; color:var(--text);
    }
    .page-btn:hover { border-color:var(--primary); color:var(--primary); }
    .page-btn.on { background:var(--primary); border-color:var(--primary); color:white; }
    .page-btn:disabled { opacity:.35; cursor:not-allowed; }

    .month-ok   { background:#dcfce7; color:#15803d; border-radius:4px; padding:2px 5px; font-size:11px; font-weight:700; }
    .month-warn { background:#fef9c3; color:#92400e; border-radius:4px; padding:2px 5px; font-size:11px; font-weight:700; }
    .month-fail { background:#fee2e2; color:#b91c1c; border-radius:4px; padding:2px 5px; font-size:11px; font-weight:700; }
    .month-na   { background:#f3f4f6; color:#6b7280; border-radius:4px; padding:2px 5px; font-size:11px; font-weight:700; }
  </style>
  <script src="/js/config.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <link rel="manifest" href="/manifest-admin.json">
  <meta name="theme-color" content="#0f1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">Estratti Conto</div>
        <div class="topbar-subtitle">Ricezione estratti mensili</div>
      </div>
    </div>

    <div class="page-content">
      <!-- KPI summary -->
      <div class="kpi-grid" id="summary-cards" style="margin-bottom:20px"></div>

      <div class="card" style="padding:0;overflow:hidden">

        <!-- Filter bar -->
        <div class="filter-bar">
          <select id="filter-year">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
          </select>
          <div style="position:relative">
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none">🔍</span>
            <input type="text" id="search" placeholder="Cerca cliente..." style="padding-left:30px;min-width:200px">
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span id="filter-month-label" style="font-size:11px;color:var(--text-muted);font-weight:600">Ultimo mese:</span>
            <div class="filter-chip on" data-status="all">Tutti</div>
            <div class="filter-chip" data-status="ok">✓ Completi</div>
            <div class="filter-chip" data-status="received">○ Ricevuti</div>
            <div class="filter-chip" data-status="missing">✕ Mancanti</div>
            <div class="filter-chip" data-status="na">— N/A</div>
          </div>
          <span class="filter-count" id="filter-count"></span>
          <button class="btn btn-ghost btn-sm" id="btn-reset" style="margin-left:auto">↺ Reset</button>
        </div>

        <!-- Table -->
        <div class="table-wrap" id="table-wrap" style="border-radius:0">
          <div style="padding:40px;text-align:center"><div class="spinner"></div></div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display:none">
          <div class="page-info" id="page-info"></div>
          <div class="page-btns" id="page-btns"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Statement picker -->
<div id="stmt-picker" style="display:none;position:fixed;z-index:300;background:white;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:8px;min-width:200px">
  <div style="font-size:11px;font-weight:600;color:var(--text-muted);padding:4px 8px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Cambia stato</div>
  <button class="status-opt" data-received="false" data-registered="false" data-na="false" style="display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px">✕ Mancante</button>
  <button class="status-opt" data-received="true"  data-registered="false" data-na="false" style="display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px">○ Ricevuto</button>
  <button class="status-opt" data-received="true"  data-registered="true"  data-na="false" style="display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px">✓ Ricevuto + Registrato</button>
  <button class="status-opt" data-received="false" data-registered="false" data-na="true"  style="display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px">— N/A</button>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/app.js"></script>
<script>
const PAGE_SIZE = 50;
let allClients = [], statements = {};
let currentYear  = 2026;
let statusFilter = 'all';
let currentPage  = 1;
let activePicker = null;

// Restituisce l'ultimo mese COMPLETATO per l'anno visualizzato.
// Un mese è "completato" solo quando è già finito interamente.
// Es: oggi 7 Apr 2026 → mese completato = 3 (Marzo)
function lastDoneMonth() {
  const { month: tm, year: ty } = ui.currentYearMonth();
  if (currentYear < ty) return 12;          // anno passato: tutti i mesi completati
  if (currentYear > ty) return 0;           // anno futuro: nessun mese ancora completato
  return tm - 1;                            // anno corrente: ultimo mese terminato (0 = nessuno, es. Gennaio)
}

// ── helpers ───────────────────────────────────────────────────
function stmtBadge(s) {
  if (!s || (!s.received && !s.not_applicable)) return '<span class="month-fail">✕</span>';
  if (s.not_applicable)          return '<span class="month-na">—</span>';
  if (s.received && s.registered) return '<span class="month-ok">✓</span>';
  return '<span class="month-warn">○</span>';
}

function stmtStatus(s) {
  if (!s || (!s.received && !s.not_applicable)) return 'missing';
  if (s.not_applicable)          return 'na';
  if (s.received && s.registered) return 'ok';
  return 'received';
}

// ── load ─────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('table-wrap').innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div></div>';
  try {
    allClients = await sb.db.select('clients', {
      filter: 'is_active=eq.true&in_bilancio=eq.true',
      order:  'company_name.asc',
      columns:'id,company_name,contact_name,bank_accounts'
    });
    // PostgREST server max-rows=1000: fetch in two pages to get all rows (87 clients × 12 months = 1044)
    const [page1, page2] = await Promise.all([
      sb.db.select('bank_statements', { filter: `year=eq.${currentYear}&limit=1000&offset=0`,    columns: 'client_id,month,received,registered,not_applicable' }),
      sb.db.select('bank_statements', { filter: `year=eq.${currentYear}&limit=1000&offset=1000`, columns: 'client_id,month,received,registered,not_applicable' }),
    ]);
    statements = {};
    [...(page1||[]), ...(page2||[])].forEach(r => { statements[`${r.client_id}_${r.month}`] = r; });
    renderSummary();
    currentPage = 1;
    renderGrid();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<div class="alert alert-danger" style="margin:16px">${e.message}</div>`;
  }
}

// ── summary ───────────────────────────────────────────────────
function renderSummary() {
  const m = lastDoneMonth();
  const label = m > 0 ? ui.MONTHS[m-1] : '—';
  document.getElementById('filter-month-label').textContent = `${label}:`;
  if (m === 0) {
    document.getElementById('summary-cards').innerHTML = '';
    return;
  }
  let ok=0, received=0, missing=0, na=0;
  allClients.forEach(c => {
    const st = stmtStatus(statements[`${c.id}_${m}`]);
    if (st==='ok')       ok++;
    else if (st==='received') received++;
    else if (st==='na')  na++;
    else                 missing++;
  });
  document.getElementById('summary-cards').innerHTML = `
    <div class="kpi-card success">
      <div class="kpi-label">Completi (${label})</div>
      <div class="kpi-value">${ok}</div>
      <div class="kpi-sub">Ricevuti + Registrati</div>
      <div class="kpi-icon">✓</div>
    </div>
    <div class="kpi-card danger">
      <div class="kpi-label">Mancanti</div>
      <div class="kpi-value">${missing}</div>
      <div class="kpi-sub">Non ricevuti</div>
      <div class="kpi-icon">✕</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ricevuti</div>
      <div class="kpi-value">${received}</div>
      <div class="kpi-sub">Da registrare</div>
      <div class="kpi-icon">○</div>
    </div>`;
}

// ── filter ────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const m = lastDoneMonth();
  return allClients.filter(c => {
    if (q && !(c.company_name||'').toLowerCase().includes(q)) return false;
    if (statusFilter !== 'all') {
      if (m === 0) return false; // nessun mese completato: filtro non applicabile
      const st = stmtStatus(statements[`${c.id}_${m}`]);
      if (statusFilter !== st) return false;
    }
    return true;
  });
}

// ── render ────────────────────────────────────────────────────
function renderGrid() {
  const filtered = getFiltered();
  const { month: thisMonth, year: thisYear } = ui.currentYearMonth();
  const isPastYear   = currentYear < thisYear;
  const isFutureYear = currentYear > thisYear;
  const totalPages = Math.max(1, Math.ceil(filtered.length/PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const page = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  document.getElementById('filter-count').textContent =
    `${filtered.length} / ${allClients.length} clienti`;

  const monthHeaders = ui.MONTHS.map((m,i) => {
    const fut = !isPastYear && (i+1) >= thisMonth;
    return `<th class="month-h" style="${fut?'opacity:.3':''}">${m}</th>`;
  }).join('');

  const rows = page.map(c => {
    const cells = ui.MONTHS.map((_,i) => {
      const m = i+1;
      const isFuture = isFutureYear || (!isPastYear && m >= thisMonth);
      if (isFuture) return `<td class="status-cell" style="opacity:.15">·</td>`;
      const s = statements[`${c.id}_${m}`];
      return `<td class="status-cell" onclick="openPicker('${c.id}',${m},this)">${stmtBadge(s)}</td>`;
    }).join('');

    return `<tr>
      <td>
        <div class="td-company">${ui.escapeHtml(c.company_name)}</div>
        <div class="td-contact">${ui.escapeHtml(c.contact_name)||''}</div>
      </td>
      <td style="font-size:11px;color:var(--text-muted)">${(c.bank_accounts||[]).join(', ')||'—'}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = rows.length ? `
    <table>
      <thead>
        <tr>
          <th style="min-width:200px">Cliente</th>
          <th>Conti</th>
          ${monthHeaders}
        </tr>
        <tr>
          <td colspan="2" style="padding:5px 14px;font-size:11px;color:var(--text-muted)">
            <span class="month-ok">✓</span> Ric.+Reg. &nbsp;
            <span class="month-warn">○</span> Ricevuto &nbsp;
            <span class="month-fail">✕</span> Mancante &nbsp;
            <span class="month-na">—</span> N/A
          </td>
          ${ui.MONTHS.map(()=>'<td></td>').join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>` :
    `<div class="empty-state" style="padding:40px"><div class="empty-icon">🔍</div><h3>Nessun risultato</h3><p>Prova a cambiare i filtri</p></div>`;

  renderPagination(filtered.length, totalPages);
}

// ── pagination ────────────────────────────────────────────────
function renderPagination(total, totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.style.display='none'; return; }
  pg.style.display='flex';
  document.getElementById('page-info').textContent = `Pagina ${currentPage} di ${totalPages} · ${total} clienti`;
  let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  getPageRange(currentPage,totalPages).forEach(p => {
    if (p==='…') btns+=`<span style="padding:0 4px;line-height:34px;color:var(--text-muted)">…</span>`;
    else btns+=`<button class="page-btn${p===currentPage?' on':''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  document.getElementById('page-btns').innerHTML = btns;
}
function getPageRange(cur,tot) {
  if(tot<=7) return Array.from({length:tot},(_,i)=>i+1);
  if(cur<=4) return [1,2,3,4,5,'…',tot];
  if(cur>=tot-3) return [1,'…',tot-4,tot-3,tot-2,tot-1,tot];
  return [1,'…',cur-1,cur,cur+1,'…',tot];
}
function goPage(p) {
  const tot=Math.ceil(getFiltered().length/PAGE_SIZE);
  if(p<1||p>tot) return;
  currentPage=p; renderGrid();
  document.querySelector('.card').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── picker ────────────────────────────────────────────────────
function openPicker(clientId, month, tdEl) {
  activePicker = {clientId, month, tdEl};
  const picker = document.getElementById('stmt-picker');
  picker.style.display = 'block';
  const rect = tdEl.getBoundingClientRect();
  const ph   = picker.offsetHeight;
  const pw   = picker.offsetWidth;
  // position:fixed → coordinate relative al viewport, NON aggiungere scrollY/scrollX
  let top  = rect.bottom + 4;
  let left = rect.left;
  if (top  + ph > window.innerHeight - 8) top  = rect.top - ph - 4;
  if (left + pw > window.innerWidth  - 8) left = window.innerWidth - pw - 8;
  picker.style.top  = top  + 'px';
  picker.style.left = left + 'px';
}

document.getElementById('stmt-picker').querySelectorAll('.status-opt').forEach(btn => {
  btn.addEventListener('click', async () => {
    const {clientId, month, tdEl} = activePicker;
    document.getElementById('stmt-picker').style.display = 'none';
    const newState = {
      received:       btn.dataset.received === 'true',
      registered:     btn.dataset.registered === 'true',
      not_applicable: btn.dataset.na === 'true',
    };
    try {
      await sb.db.upsertBankStatement(clientId, currentYear, month, newState);
      const key = `${clientId}_${month}`;
      statements[key] = { ...(statements[key]||{}), ...newState };
      tdEl.innerHTML = stmtBadge(statements[key]);
      renderSummary();
      ui.showToast('Salvato', 'success');
      await sb.db.log('bank_statement_updated', clientId, {month, year:currentYear, ...newState});
    } catch(e) {
      ui.showToast('Errore: ' + e.message, 'error');
    }
  });
});

document.addEventListener('click', e => {
  if(!e.target.closest('#stmt-picker') && !e.target.closest('.status-cell'))
    document.getElementById('stmt-picker').style.display='none';
});

// ── events ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', ()=>{ currentPage=1; renderGrid(); });

document.getElementById('filter-year').addEventListener('change', e=>{
  currentYear=parseInt(e.target.value); loadData();
});

document.querySelectorAll('.filter-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('on'));
    chip.classList.add('on');
    statusFilter=chip.dataset.status; currentPage=1; renderGrid();
  });
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  document.getElementById('search').value='';
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('.filter-chip[data-status="all"]').classList.add('on');
  statusFilter='all'; currentPage=1; renderGrid();
});

loadData();
window.addEventListener('pageshow', (e) => { if (e.persisted) loadData(); });
</script>
</body>
</html>
