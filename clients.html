<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clienti — InDubai Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/config.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <link rel="manifest" href="/manifest-admin.json">
  <meta name="theme-color" content="#0f1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">Clienti</div>
        <div class="topbar-subtitle" id="clients-count">Caricamento...</div>
      </div>
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="search" placeholder="Cerca cliente..." style="min-width:260px">
        </div>
        <select class="form-control" id="filter-partner" style="width:auto">
          <option value="">Tutti i partner</option>
          <option value="noi">Noi</option>
          <option value="vat_consultant">VAT Consultant</option>
          <option value="affinitas">Affinitas</option>
          <option value="in_sospeso">In Sospeso</option>
        </select>
        <button class="btn btn-accent" id="btn-add">+ Nuovo Cliente</button>
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="table-wrap">
          <table id="clients-table">
            <thead>
              <tr>
                <th>Azienda</th>
                <th>General Manager</th>
                <th>Partner</th>
                <th>Conti Bancari</th>
                <th>Abbonamento</th>
                <th>CT Scadenza</th>
                <th>Lic. Aziendale</th>
                <th>VAT</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="clients-tbody">
              <tr><td colspan="9"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination" style="display:none">
          <div class="page-info" id="page-info"></div>
          <div class="page-btns" id="page-btns"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="modal-add" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nuovo Cliente</div>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome Azienda *</label>
          <input type="text" class="form-control" id="f-company" placeholder="ACME FZCO">
        </div>
        <div class="form-group">
          <label class="form-label">Nome Contatto</label>
          <input type="text" class="form-control" id="f-contact" placeholder="Mario Rossi">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="f-email" placeholder="mario@azienda.com">
        </div>
        <div class="form-group">
          <label class="form-label">Telefono UAE</label>
          <input type="text" class="form-control" id="f-phone" placeholder="+971 50 000 0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Acquisito da</label>
          <select class="form-control" id="f-source">
            <option value="pellegrino">Pellegrino</option>
            <option value="giuseppe">Giuseppe</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Partner Contabilità</label>
          <select class="form-control" id="f-partner">
            <option value="">—</option>
            <option value="noi">Noi</option>
            <option value="vat_consultant">VAT Consultant</option>
            <option value="affinitas">Affinitas</option>
            <option value="in_sospeso">In Sospeso</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Costo Servizio (AED)</label>
          <input type="number" class="form-control" id="f-cost" placeholder="1200" step="100">
        </div>
        <div class="form-group">
          <label class="form-label">Data Avvio</label>
          <input type="date" class="form-control" id="f-start">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Conti Bancari</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="bank-checkboxes">
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="wio" name="bank"> Wio</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="stripe" name="bank"> Stripe</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="paypal" name="bank"> Paypal</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="mashreq" name="bank"> Mashreq</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="payoneer" name="bank"> Payoneer</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="hubpay" name="bank"> Hubpay</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="credium" name="bank"> Credium</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="ziina" name="bank"> Ziina</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="mamo" name="bank"> Mamo</label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note Bancarie</label>
        <input type="text" class="form-control" id="f-bank-notes" placeholder="Es. Wio Business - emettere fattura mensile">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn-accent" id="btn-save-client">Crea Cliente</button>
    </div>
  </div>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/app.js"></script>
<script src="/js/i18n.js"></script>
<script>
let allClients = [];
const PAGE_SIZE = 25;
let currentPage = 1;

function licenseCell(date) {
  if (!date) return '—';
  const today = new Date();
  const exp   = new Date(date);
  const days  = Math.round((exp - today) / 86400000);
  const fmt   = ui.formatDate(date);
  if (days < 0) {
    return `<span style="display:inline-flex;align-items:center;gap:5px;background:#fef2f2;color:#dc2626;font-weight:800;padding:4px 10px;border-radius:8px;font-size:12px;border:1.5px solid #fca5a5">
      ⚠ SCADUTA<br><span style="font-size:10px;font-weight:600">${fmt}</span></span>`;
  }
  if (days <= 60) {
    return `<span style="display:inline-flex;flex-direction:column;align-items:center;background:#fff7ed;color:#c2410c;font-weight:700;padding:4px 10px;border-radius:8px;font-size:12px;border:1.5px solid #fed7aa;line-height:1.3;cursor:default" title="${days} giorni alla scadenza">
      🔴 ${fmt}<span style="font-size:10px;font-weight:800;color:#dc2626">${days}gg</span></span>`;
  }
  if (days <= 90) {
    return `<span style="display:inline-flex;flex-direction:column;align-items:center;background:#fffbeb;color:#b45309;font-weight:600;padding:4px 10px;border-radius:8px;font-size:12px;border:1.5px solid #fde68a;line-height:1.3;cursor:default" title="${days} giorni alla scadenza">
      🟡 ${fmt}<span style="font-size:10px;font-weight:700">${days}gg</span></span>`;
  }
  return `<span style="font-size:12px;color:var(--text)">${fmt}</span>`;
}

async function loadClients() {
  try {
    allClients = await sb.db.getClients();
    renderClients(allClients);
  } catch(e) {
    document.getElementById('clients-tbody').innerHTML =
      `<tr><td colspan="9"><div class="alert alert-danger" style="margin:16px">${e.message}</div></td></tr>`;
  }
}

function renderClients(clients) {
  const total = clients.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = clients.slice(start, start + PAGE_SIZE);

  document.getElementById('clients-count').textContent = `${total} clienti`;

  if (!total) {
    document.getElementById('clients-tbody').innerHTML =
      `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">👥</div><h3>Nessun cliente trovato</h3></div></td></tr>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  document.getElementById('clients-tbody').innerHTML = page.map(c => `
    <tr>
      <td>
        <div class="td-company">${ui.escapeHtml(c.company_name)}</div>
      </td>
      <td style="font-size:13px">${c.general_manager ? ui.escapeHtml(c.general_manager) : (c.contact_name ? '<span style="color:var(--text-muted);font-size:12px">'+ui.escapeHtml(c.contact_name)+'</span>' : '—')}</td>
      <td>${ui.partnerLabel(c.accounting_partner)}</td>
      <td style="font-size:12px">${(c.bank_accounts || []).join(', ') || '—'}</td>
      <td>
        ${c.service_cost ? `<strong>${ui.formatAED(c.service_cost)}</strong>` : '—'}
        ${c.subscription_day ? `<div style="font-size:11px;color:var(--text-muted)">Giorno ${c.subscription_day}</div>` : ''}
      </td>
      <td>
        ${c.corporate_tax_expiry
          ? `<span class="${ui.deadlineClass(c.corporate_tax_expiry)}">${ui.formatDate(c.corporate_tax_expiry)}</span>`
          : '—'}
      </td>
      <td>${licenseCell(c.trade_license_date)}</td>
      <td>${c.vat_registered ? '<span class="badge badge-ok">VAT ✓</span>' : '—'}</td>
      <td>
        <a href="/client-detail.html?id=${c.id}" class="btn btn-ghost btn-sm">Apri →</a>
      </td>
    </tr>
  `).join('');

  renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';
  document.getElementById('page-info').textContent = `Pagina ${currentPage} di ${totalPages} · ${total} clienti`;
  let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  getPageRange(currentPage, totalPages).forEach(p => {
    if (p === '…') btns += `<span style="padding:0 4px;line-height:34px;color:var(--text-muted)">…</span>`;
    else btns += `<button class="page-btn${p===currentPage?' on':''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  document.getElementById('page-btns').innerHTML = btns;
}

function getPageRange(cur, tot) {
  if (tot <= 7) return Array.from({length:tot}, (_,i) => i+1);
  if (cur <= 4) return [1,2,3,4,5,'…',tot];
  if (cur >= tot-3) return [1,'…',tot-4,tot-3,tot-2,tot-1,tot];
  return [1,'…',cur-1,cur,cur+1,'…',tot];
}

function goPage(p) {
  const tot = Math.ceil(getFilteredClients().length / PAGE_SIZE);
  if (p < 1 || p > tot) return;
  currentPage = p;
  renderClients(getFilteredClients());
  document.querySelector('.card').scrollIntoView({behavior:'smooth', block:'start'});
}

// Search & filter
function getFilteredClients() {
  const q = document.getElementById('search').value.toLowerCase();
  const partner = document.getElementById('filter-partner').value;
  let filtered = allClients;
  if (q) filtered = filtered.filter(c =>
    (c.company_name || '').toLowerCase().includes(q) ||
    (c.contact_name || '').toLowerCase().includes(q)
  );
  if (partner) filtered = filtered.filter(c => c.accounting_partner === partner);
  return filtered;
}

function applyFilters() {
  currentPage = 1;
  renderClients(getFilteredClients());
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-partner').addEventListener('change', applyFilters);

// Add client
document.getElementById('btn-add').addEventListener('click', () => {
  document.getElementById('modal-add').style.display = 'flex';
});

function closeModal() {
  document.getElementById('modal-add').style.display = 'none';
}

document.getElementById('modal-add').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-add')) closeModal();
});

document.getElementById('btn-save-client').addEventListener('click', async () => {
  const company = document.getElementById('f-company').value.trim();
  if (!company) { ui.showToast('Inserisci il nome azienda', 'error'); return; }

  const banks = [...document.querySelectorAll('#bank-checkboxes input:checked')].map(el => el.value);

  const btn = document.getElementById('btn-save-client');
  btn.textContent = 'Salvataggio...'; btn.disabled = true;

  try {
    const result = await sb.db.insert('clients', {
      company_name: company,
      contact_name: document.getElementById('f-contact').value.trim() || null,
      email: document.getElementById('f-email').value.trim() || null,
      phone_uae: document.getElementById('f-phone').value.trim() || null,
      source: document.getElementById('f-source').value,
      accounting_partner: document.getElementById('f-partner').value || null,
      service_cost: parseFloat(document.getElementById('f-cost').value) || null,
      start_date: document.getElementById('f-start').value || null,
      bank_accounts: banks.length ? banks : null,
      bank_notes: document.getElementById('f-bank-notes').value.trim() || null,
      is_active: true,
      in_bilancio: true,
    });

    const newId = result[0]?.id;
    await sb.db.log('client_created', newId, { company });

    // Auto-crea righe vat_register e corporate_tax per il nuovo cliente
    if (newId) {
      const partner = document.getElementById('f-partner').value || null;
      const startDate = document.getElementById('f-start').value || null;
      let ctDeadline = null;
      if (startDate) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + 89);
        ctDeadline = d.toISOString().split('T')[0];
      }
      try { await sb.db.insert('vat_register', { client_id: newId, accounting_partner: partner }); } catch(_) {}
      try { await sb.db.insert('corporate_tax', { client_id: newId, deadline: ctDeadline }); } catch(_) {}
    }

    ui.showToast(`Cliente "${company}" creato!`, 'success');
    closeModal();
    loadClients();

    // Notifica email + push a tutto lo staff
    const contactName = document.getElementById('f-contact').value.trim() || '';
    const partnerLabel = document.getElementById('f-partner').selectedOptions[0]?.text || '';
    const costVal = document.getElementById('f-cost').value || '—';
    emailNotifyStaff({
      subject: `🆕 Nuovo cliente: ${company}`,
      html: `<h2 style="margin:0 0 16px;color:#1a2744;font-size:20px">🆕 Nuovo cliente creato</h2>
             <p style="color:#374151;font-size:15px">Un nuovo cliente è stato aggiunto al portale.</p>
             <table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:16px">
               <tr><td style="padding:8px;color:#6b7280">Azienda</td><td style="padding:8px;font-weight:600">${company}</td></tr>
               ${contactName ? `<tr style="background:#f9f9f9"><td style="padding:8px;color:#6b7280">Contatto</td><td style="padding:8px">${contactName}</td></tr>` : ''}
               <tr><td style="padding:8px;color:#6b7280">Partner</td><td style="padding:8px">${partnerLabel}</td></tr>
               <tr style="background:#f9f9f9"><td style="padding:8px;color:#6b7280">Costo</td><td style="padding:8px">AED ${costVal}</td></tr>
             </table>
             <p style="text-align:center;margin-top:28px"><a href="https://portal.indubai.it/clients.html" style="background:#1a2744;color:white;padding:12px 28px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600">Apri Clienti</a></p>`,
      event_type: 'client_created',
      entity_id: newId,
      entity_type: 'client',
    });
    pushNotifyStaff({
      title: '🆕 Nuovo cliente',
      message: company + (contactName ? ' — ' + contactName : ''),
      url: 'https://portal.indubai.it/clients.html'
    });
  } catch(e) {
    ui.showToast('Errore: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Crea Cliente'; btn.disabled = false;
  }
});

// Check for ?action=new in URL
if (new URLSearchParams(location.search).get('action') === 'new') {
  document.getElementById('modal-add').style.display = 'flex';
}

loadClients();

// Ricarica se la pagina viene ripristinata dal bfcache (tasto ← del browser)
window.addEventListener('pageshow', (e) => { if (e.persisted) loadClients(); });
</script>
</body>
</html>
