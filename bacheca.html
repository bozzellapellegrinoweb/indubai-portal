<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <link rel="manifest" href="/manifest-admin.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bacheca — InDubai Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/config.js"></script>
  <style>
    /* ── Layout ── */
    .bk-wrap { display:grid; grid-template-columns:1fr 400px; gap:20px; align-items:start; }

    /* ── Post list ── */
    .bk-list { display:flex; flex-direction:column; gap:12px; }
    .bk-post { background:white; border:1.5px solid var(--border); border-radius:14px; cursor:pointer; transition:all .15s; overflow:hidden; }
    .bk-post:hover { border-color:var(--primary); box-shadow:0 4px 16px rgba(26,58,92,.08); transform:translateY(-1px); }
    .bk-post.selected { border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,58,92,.08); }
    .bk-post.pinned { border-color:#c9a84c; }
    .bk-post-head { padding:16px 18px 12px; }
    .bk-pin-bar { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:#c9a84c; text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px; }
    .bk-title { font-size:15px; font-weight:800; color:var(--text-primary); margin-bottom:6px; line-height:1.35; }
    .bk-body-preview { font-size:13px; color:var(--text-muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .bk-meta { display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
    .bk-avatar { width:24px; height:24px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; }
    .bk-author { font-size:12px; font-weight:600; color:var(--text-secondary); }
    .bk-date { font-size:11px; color:var(--text-muted); margin-left:auto; }
    .bk-counts { display:flex; align-items:center; gap:10px; padding:10px 18px; border-top:1px solid var(--border); background:var(--surface2); }
    .bk-count { font-size:12px; color:var(--text-muted); font-weight:600; display:flex; align-items:center; gap:4px; }
    .bk-count.has { color:var(--primary); }
    .bk-att-chip { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); background:white; border:1px solid var(--border); border-radius:6px; padding:3px 8px; }

    /* ── Detail panel ── */
    .bk-detail { background:white; border:1.5px solid var(--border); border-radius:14px; position:sticky; top:20px; max-height:calc(100vh - 140px); display:flex; flex-direction:column; }
    .bkd-header { padding:20px 22px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .bkd-title { font-size:18px; font-weight:800; color:var(--text-primary); line-height:1.3; margin-bottom:10px; }
    .bkd-meta { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--text-muted); flex-wrap:wrap; }
    .bkd-actions { display:flex; gap:8px; margin-top:14px; }
    .bkd-body { padding:18px 22px; overflow-y:auto; flex:1; }
    .bkd-text { font-size:14px; color:var(--text-secondary); line-height:1.75; white-space:pre-wrap; word-break:break-word; }
    .bkd-attachment { display:inline-flex; align-items:center; gap:8px; margin-top:14px; padding:10px 14px; background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; text-decoration:none; color:var(--text-primary); font-size:13px; font-weight:600; transition:border .15s; }
    .bkd-attachment:hover { border-color:var(--primary); }
    .bkd-sep { height:1px; background:var(--border); margin:18px 0; }
    .bkd-cmts-head { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text-muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    /* Comments */
    .cmt-list { display:flex; flex-direction:column; gap:12px; }
    .cmt { display:flex; gap:10px; }
    .cmt.reply { margin-left:32px; }
    .cmt-av { width:30px; height:30px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0; }
    .cmt-av.reply-av { background:#64748b; width:24px; height:24px; font-size:9px; }
    .cmt-bubble { background:var(--surface2); border-radius:10px; padding:10px 14px; flex:1; min-width:0; }
    .cmt-bubble.reply-bubble { background:#f1f5f9; }
    .cmt-top { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
    .cmt-author { font-size:12px; font-weight:700; color:var(--text-primary); }
    .cmt-time { font-size:11px; color:var(--text-muted); }
    .cmt-del { margin-left:auto; background:none; border:none; cursor:pointer; font-size:11px; color:var(--text-muted); padding:0; opacity:0; transition:opacity .15s; }
    .cmt-bubble:hover .cmt-del { opacity:1; }
    .cmt-text { font-size:13px; color:var(--text-secondary); line-height:1.55; word-break:break-word; }
    .cmt-text .mention { color:var(--primary); font-weight:700; background:#eff6ff; border-radius:4px; padding:0 3px; }
    .cmt-reply-btn { font-size:11px; color:var(--text-muted); background:none; border:none; cursor:pointer; padding:4px 0 0; font-weight:600; transition:color .12s; }
    .cmt-reply-btn:hover { color:var(--primary); }
    /* Input area */
    .bkd-input { padding:14px 18px; border-top:1px solid var(--border); flex-shrink:0; }
    .bkd-reply-ctx { display:flex; align-items:center; gap:8px; background:#eff6ff; border-radius:8px; padding:7px 12px; margin-bottom:8px; font-size:12px; color:var(--primary); font-weight:600; }
    .bkd-reply-ctx button { margin-left:auto; background:none; border:none; cursor:pointer; font-size:14px; color:var(--primary); padding:0; line-height:1; }
    .cmt-input-row { display:flex; gap:8px; align-items:flex-end; position:relative; }
    .cmt-inp { flex:1; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-family:inherit; resize:vertical; outline:none; transition:border .15s; line-height:1.5; min-height:42px; overflow-y:auto; }
    .cmt-inp:focus { border-color:var(--primary); }
    .cmt-send { padding:10px 16px; background:var(--primary); color:white; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s; white-space:nowrap; flex-shrink:0; }
    .cmt-send:hover { opacity:.88; }
    /* @mention dropdown */
    .mention-dropdown { position:absolute; bottom:calc(100% + 6px); left:0; background:white; border:1.5px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:100; min-width:200px; max-height:200px; overflow-y:auto; }
    .mention-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; transition:background .1s; }
    .mention-item:hover, .mention-item.focused { background:var(--surface2); }
    .mention-item .m-av { width:28px; height:28px; border-radius:50%; background:var(--primary); color:white; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; }
    .mention-item .m-name { font-size:13px; font-weight:600; color:var(--text-primary); }
    .mention-item .m-role { font-size:11px; color:var(--text-muted); }

    /* ── New post form ── */
    .bk-new-card { background:white; border:1.5px solid var(--border); border-radius:14px; padding:20px 22px; margin-bottom:16px; }
    .bk-new-card h3 { font-size:14px; font-weight:800; color:var(--text-primary); margin:0 0 14px; }
    .form-field { margin-bottom:12px; }
    .form-field label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); margin-bottom:5px; }
    .form-inp { width:100%; padding:10px 13px; border:1.5px solid var(--border); border-radius:9px; font-size:13px; font-family:inherit; outline:none; transition:border .15s; box-sizing:border-box; }
    .form-inp:focus { border-color:var(--primary); }
    textarea.form-inp { resize:vertical; min-height:80px; line-height:1.6; }
    .upload-zone { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1.5px dashed var(--border); border-radius:9px; cursor:pointer; transition:border .15s; background:transparent; width:100%; box-sizing:border-box; font-family:inherit; }
    .upload-zone:hover { border-color:var(--primary); }
    .upload-zone-label { font-size:13px; color:var(--text-muted); font-weight:500; }
    .upload-zone .file-chosen { font-size:12px; color:var(--primary); font-weight:600; }
    .new-post-actions { display:flex; gap:10px; align-items:center; margin-top:4px; }

    /* ── Empty state ── */
    .bk-empty { text-align:center; padding:64px 20px; color:var(--text-muted); }
    .bk-empty .ei { font-size:40px; margin-bottom:12px; }
    .bk-empty p { font-size:14px; font-weight:500; }

    /* ── Placeholder detail ── */
    .bk-no-select { display:flex; flex-direction:column; align-items:center; justify-content:center; height:340px; color:var(--text-muted); gap:10px; }
    .bk-no-select .ei { font-size:36px; }
    .bk-no-select p { font-size:13px; font-weight:500; }

    /* ── Mobile ── */
    @media (max-width:900px) {
      .bk-wrap { grid-template-columns:1fr; }
      .bk-detail { display:none; }
      .bk-detail.sheet-open { display:flex; position:fixed; inset:0; top:auto; border-radius:20px 20px 0 0; max-height:92vh; z-index:400; border:none; box-shadow:0 -8px 40px rgba(0,0,0,.18); }
      .bk-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:399; }
      .bk-sheet-overlay.open { display:block; }
      .bkd-drag { width:40px; height:4px; background:#e2e8f0; border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    }
    @media (min-width:901px) {
      .bkd-drag { display:none; }
      .bk-sheet-overlay { display:none !important; }
    }
  </style>
</head>
<body>
<div class="main-content">
  <div class="topbar">
    <div>
      <h1 style="font-size:22px;font-weight:800;margin:0">📌 Bacheca</h1>
      <div style="font-size:13px;color:var(--text-muted)">Note e aggiornamenti condivisi tra il team</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost" onclick="toggleNewPost()" id="btn-new-post">+ Nuovo post</button>
    </div>
  </div>

  <div class="content-body" style="padding:20px 24px">

    <!-- New post form (collapsed by default) -->
    <div id="new-post-form" style="display:none">
      <div class="bk-new-card">
        <h3>✏️ Nuovo post</h3>
        <div class="form-field">
          <label>Titolo *</label>
          <input type="text" class="form-inp" id="np-title" placeholder="Di cosa vuoi parlare?">
        </div>
        <div class="form-field">
          <label>Messaggio</label>
          <textarea class="form-inp" id="np-body" placeholder="Scrivi qui il dettaglio..."></textarea>
        </div>
        <div class="form-field">
          <label>Allegato</label>
          <button type="button" class="upload-zone" onclick="document.getElementById('np-file-input').click()">
            <span style="font-size:18px">📎</span>
            <span class="upload-zone-label" id="np-file-label">Clicca per allegare un file</span>
          </button>
          <input type="file" id="np-file-input" style="display:none" onchange="onFileChosen(this)">
        </div>
        <div class="new-post-actions">
          <button class="btn btn-accent" onclick="submitPost()" id="np-submit-btn">Pubblica</button>
          <button class="btn btn-ghost" onclick="toggleNewPost()">Annulla</button>
          <span id="np-upload-status" style="font-size:12px;color:var(--primary);display:none">⏳ Upload in corso...</span>
        </div>
      </div>
    </div>

    <!-- Main grid -->
    <div class="bk-wrap">

      <!-- Left: post list -->
      <div>
        <div class="bk-list" id="bk-list">
          <div class="bk-empty"><div class="ei">📌</div><p>Caricamento...</p></div>
        </div>
      </div>

      <!-- Right: detail panel -->
      <div class="bk-detail" id="bk-detail">
        <div class="bkd-drag"></div>
        <div class="bk-no-select" id="bk-no-select">
          <div class="ei">👈</div>
          <p>Seleziona un post per leggere e commentare</p>
        </div>
        <div id="bk-detail-content" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
          <!-- Header -->
          <div class="bkd-header" id="bkd-header"></div>
          <!-- Body + comments -->
          <div class="bkd-body" id="bkd-body"></div>
          <!-- Comment input -->
          <div class="bkd-input">
            <div class="bkd-reply-ctx" id="bkd-reply-ctx" style="display:none">
              <span id="bkd-reply-label"></span>
              <button onclick="clearReply()">✕</button>
            </div>
            <!-- File allegato commento -->
            <div id="cmt-file-preview" style="display:none;align-items:center;gap:8px;background:#eff6ff;border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:12px;color:var(--primary);font-weight:600">
              📎 <span id="cmt-file-name"></span>
              <button onclick="clearCmtFile()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:14px;color:var(--primary);padding:0;line-height:1">✕</button>
            </div>
            <div class="cmt-input-row">
              <div class="mention-dropdown" id="mention-dropdown" style="display:none"></div>
              <textarea class="cmt-inp" id="cmt-inp" placeholder="Scrivi un commento… usa @ per taggare" rows="1"
                oninput="onCmtInput(event)" onkeydown="onCmtKeydown(event)"></textarea>
              <button type="button" title="Allega file" onclick="document.getElementById('cmt-file-input').click()"
                style="padding:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:16px;flex-shrink:0;transition:border .15s"
                onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">📎</button>
              <input type="file" id="cmt-file-input" style="display:none" onchange="onCmtFileChosen(this)">
              <button class="cmt-send" id="cmt-send-btn" onclick="submitComment()">Invia</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Mobile sheet overlay -->
<div class="bk-sheet-overlay" id="bk-sheet-overlay" onclick="closeSheet()"></div>

<script src="/js/supabase.js"></script>
<script src="/js/app.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let posts      = [];
let allUsers   = [];
let currentPost = null;
let replyTo    = null;   // { id, author }
let cmtFile    = null;   // file allegato al commento
let mentionQuery = '';
let mentionStart = -1;
let mentionFocusIdx = 0;
let currentUser = null;
let isBkAdmin = false;
let npFile = null;

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const session = sb.requireAuth();
  if (!session) return;
  currentUser = sb.getCurrentUser();
  const profile = sb.getCurrentProfile();
  isBkAdmin = profile?.role === 'admin';

  await Promise.all([loadUsers(), loadPosts()]);
});

// ── Load users (for @mention) ──────────────────────────────────────────────
async function loadUsers() {
  try {
    allUsers = await sb.db.select('profiles', { columns: 'id,full_name,role', order: 'full_name.asc' });
  } catch(e) {
    console.warn('loadUsers:', e);
    allUsers = [];
  }
}

// ── Load posts ─────────────────────────────────────────────────────────────
async function loadPosts() {
  try {
    const rows = await sb.db.select('board_posts', {
      columns: 'id,title,body,file_url,file_name,pinned,created_at,author_id,profiles(full_name)',
      order: 'pinned.desc,created_at.desc',
    });

    // Count comments per post in one query
    const postIds = (rows || []).map(p => p.id);
    let commentCounts = {};
    if (postIds.length) {
      const counts = await sbFetch(
        `/rest/v1/board_comments?select=post_id&post_id=in.(${postIds.join(',')})`,
      );
      (counts || []).forEach(c => { commentCounts[c.post_id] = (commentCounts[c.post_id] || 0) + 1; });
    }

    posts = (rows || []).map(p => ({ ...p, commentCount: commentCounts[p.id] || 0 }));
    renderList();
  } catch(e) {
    document.getElementById('bk-list').innerHTML =
      `<div class="bk-empty"><div class="ei">⚠️</div><p>Errore caricamento: ${ui.escapeHtml(e.message)}</p></div>`;
  }
}

// ── Render list ────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('bk-list');
  if (!posts.length) {
    el.innerHTML = `<div class="bk-empty"><div class="ei">📌</div><p>Nessun post ancora.<br>Sii il primo a scrivere qualcosa!</p></div>`;
    return;
  }
  el.innerHTML = posts.map(p => {
    const initials = avatarInitials(p.profiles?.full_name || '?');
    const color = avatarColor(p.author_id);
    const isSelected = currentPost?.id === p.id;
    const bodyPreview = p.body ? ui.escapeHtml(p.body).replace(/\n/g,'  ') : '';
    return `
    <div class="bk-post${p.pinned ? ' pinned' : ''}${isSelected ? ' selected' : ''}" onclick="selectPost('${p.id}')">
      <div class="bk-post-head">
        ${p.pinned ? `<div class="bk-pin-bar">📌 Fissato</div>` : ''}
        <div class="bk-title">${ui.escapeHtml(p.title)}</div>
        ${bodyPreview ? `<div class="bk-body-preview">${bodyPreview}</div>` : ''}
        <div class="bk-meta">
          <div class="bk-avatar" style="background:${color}">${initials}</div>
          <span class="bk-author">${ui.escapeHtml(p.profiles?.full_name || 'Utente')}</span>
          <span class="bk-date">${relativeTime(p.created_at)}</span>
        </div>
      </div>
      <div class="bk-counts">
        <span class="bk-count ${p.commentCount ? 'has' : ''}">💬 ${p.commentCount} commenti</span>
        ${p.file_url ? `<span class="bk-att-chip">📎 ${ui.escapeHtml(p.file_name || 'allegato')}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Select post ────────────────────────────────────────────────────────────
async function selectPost(postId) {
  currentPost = posts.find(p => p.id === postId);
  if (!currentPost) return;
  clearReply();

  renderList(); // aggiorna selected

  document.getElementById('bk-no-select').style.display = 'none';
  const content = document.getElementById('bk-detail-content');
  content.style.display = 'flex';

  renderDetailHeader();
  await loadComments();

  // Mobile: apri sheet
  if (window.innerWidth <= 900) openSheet();
}

// ── Detail header ──────────────────────────────────────────────────────────
function renderDetailHeader() {
  const p = currentPost;
  const initials = avatarInitials(p.profiles?.full_name || '?');
  const color = avatarColor(p.author_id);
  const canAdmin = isBkAdmin || p.author_id === currentUser?.id;

  document.getElementById('bkd-header').innerHTML = `
    <div class="bkd-title">${ui.escapeHtml(p.title)}</div>
    <div class="bkd-meta">
      <div class="bk-avatar" style="background:${color};width:22px;height:22px;font-size:9px">${initials}</div>
      <span>${ui.escapeHtml(p.profiles?.full_name || 'Utente')}</span>
      <span>·</span>
      <span>${ui.formatDate(p.created_at)}</span>
    </div>
    <div class="bkd-actions">
      ${isBkAdmin ? `
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="togglePin('${p.id}',${p.pinned})">
          ${p.pinned ? '📌 Rimuovi pin' : '📌 Fissa'}
        </button>` : ''}
      ${canAdmin ? `
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px;color:#dc2626;border-color:#fca5a5" onclick="deletePost('${p.id}')">
          🗑 Elimina
        </button>` : ''}
    </div>`;
}

// ── Load + render comments ─────────────────────────────────────────────────
async function loadComments() {
  const body = document.getElementById('bkd-body');
  body.innerHTML = `<div class="bkd-text">${formatBody(currentPost.body || '')}</div>`;

  if (currentPost.file_url) {
    body.innerHTML += `<a class="bkd-attachment" href="${currentPost.file_url}" target="_blank" rel="noopener">
      📎 <span>${ui.escapeHtml(currentPost.file_name || 'Allegato')}</span>
    </a>`;
  }

  body.innerHTML += `<div class="bkd-sep"></div>
    <div class="bkd-cmts-head"><span id="cmts-count-label">Commenti</span></div>
    <div class="cmt-list" id="cmt-list"><div style="color:var(--text-muted);font-size:13px">Caricamento...</div></div>`;

  try {
    const rows = await sb.db.select('board_comments', {
      columns: 'id,body,file_url,file_name,created_at,author_id,reply_to,profiles(full_name)',
      filter: `post_id=eq.${currentPost.id}`,
      order: 'created_at.asc',
    });

    const comments = rows || [];
    document.getElementById('cmts-count-label').textContent = `Commenti (${comments.length})`;

    // Aggiorna contatore nel post
    const idx = posts.findIndex(p => p.id === currentPost.id);
    if (idx >= 0) posts[idx].commentCount = comments.length;

    const list = document.getElementById('cmt-list');
    if (!comments.length) {
      list.innerHTML = `<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Nessun commento ancora. Scrivi il primo!</div>`;
      return;
    }

    // Raggruppa: prima i top-level, poi replies
    const top = comments.filter(c => !c.reply_to);
    const replies = comments.filter(c => c.reply_to);

    list.innerHTML = top.map(c => {
      const myReplies = replies.filter(r => r.reply_to === c.id);
      return renderComment(c) + myReplies.map(r => renderComment(r, true)).join('');
    }).join('');

  } catch(e) {
    document.getElementById('cmt-list').innerHTML =
      `<div style="color:#dc2626;font-size:12px">Errore: ${ui.escapeHtml(e.message)}</div>`;
  }
}

function renderComment(c, isReply = false) {
  const initials = avatarInitials(c.profiles?.full_name || '?');
  const color = avatarColor(c.author_id);
  const canDel = isBkAdmin || c.author_id === currentUser?.id;
  return `
  <div class="cmt ${isReply ? 'reply' : ''}" id="cmt-${c.id}">
    <div class="cmt-av ${isReply ? 'reply-av' : ''}" style="background:${color}">${initials}</div>
    <div class="cmt-bubble ${isReply ? 'reply-bubble' : ''}">
      <div class="cmt-top">
        <span class="cmt-author">${ui.escapeHtml(c.profiles?.full_name || 'Utente')}</span>
        <span class="cmt-time">${relativeTime(c.created_at)}</span>
        ${canDel ? `<button class="cmt-del" onclick="deleteComment('${c.id}')">🗑</button>` : ''}
      </div>
      ${c.body ? `<div class="cmt-text">${formatMentions(ui.escapeHtml(c.body))}</div>` : ''}
      ${c.file_url ? `<a class="bkd-attachment" href="${c.file_url}" target="_blank" rel="noopener" style="margin-top:8px;font-size:12px;padding:6px 10px">📎 ${ui.escapeHtml(c.file_name || 'allegato')}</a>` : ''}
      ${!isReply ? `<button class="cmt-reply-btn" onclick="setReply('${c.id}','${ui.escapeHtml(c.profiles?.full_name || 'Utente')}')">↩ Rispondi</button>` : ''}
    </div>
  </div>`;
}

// ── Submit comment ─────────────────────────────────────────────────────────
function onCmtFileChosen(input) {
  cmtFile = input.files[0] || null;
  const preview = document.getElementById('cmt-file-preview');
  if (cmtFile) {
    document.getElementById('cmt-file-name').textContent = cmtFile.name;
    preview.style.display = 'flex';
  } else {
    preview.style.display = 'none';
  }
}

function clearCmtFile() {
  cmtFile = null;
  document.getElementById('cmt-file-input').value = '';
  document.getElementById('cmt-file-preview').style.display = 'none';
}

async function submitComment() {
  const inp = document.getElementById('cmt-inp');
  const body = inp.value.trim();
  if (!body && !cmtFile) return;

  const btn = document.getElementById('cmt-send-btn');
  btn.disabled = true;
  btn.textContent = '...';

  let file_url = null, file_name = null;
  if (cmtFile) {
    btn.textContent = '📎...';
    try {
      const uploaded = await sb.db.uploadFile(cmtFile);
      file_url  = uploaded.url;
      file_name = cmtFile.name;
    } catch(e) {
      ui.showToast('Errore upload: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Invia';
      return;
    }
  }

  try {
    const row = {
      post_id:   currentPost.id,
      author_id: currentUser.id,
      body:      body || null,
      reply_to:  replyTo?.id || null,
      file_url, file_name,
    };
    const [inserted] = await sb.db.insert('board_comments', row);
    inp.value = '';
    clearReply();
    clearCmtFile();
    await loadComments();
    document.getElementById('bkd-body').scrollTop = 9999;

    // Notifiche async (fire & forget)
    notifyMentions(body, inserted.id, currentPost.title);
    if (replyTo) notifyReply(replyTo, currentPost.title);

  } catch(e) {
    ui.showToast('Errore: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Invia';
  }
}


// ── Reply ──────────────────────────────────────────────────────────────────
function setReply(commentId, authorName) {
  replyTo = { id: commentId, author: authorName };
  document.getElementById('bkd-reply-ctx').style.display = 'flex';
  document.getElementById('bkd-reply-label').textContent = `↩ Risposta a ${authorName}`;
  document.getElementById('cmt-inp').focus();
}

function clearReply() {
  replyTo = null;
  document.getElementById('bkd-reply-ctx').style.display = 'none';
  document.getElementById('bkd-reply-label').textContent = '';
}

// ── Delete comment ─────────────────────────────────────────────────────────
async function deleteComment(id) {
  if (!confirm('Eliminare questo commento?')) return;
  try {
    await sb.db.delete('board_comments', `id=eq.${id}`);
    await loadComments();
  } catch(e) { ui.showToast('Errore: ' + e.message, 'error'); }
}

// ── New post ───────────────────────────────────────────────────────────────
function toggleNewPost() {
  const f = document.getElementById('new-post-form');
  const btn = document.getElementById('btn-new-post');
  const visible = f.style.display !== 'none';
  f.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? '+ Nuovo post' : '✕ Annulla';
  if (!visible) document.getElementById('np-title').focus();
}

function onFileChosen(input) {
  npFile = input.files[0] || null;
  document.getElementById('np-file-label').textContent =
    npFile ? `📎 ${npFile.name}` : 'Clicca per allegare un file';
  document.getElementById('np-file-label').className =
    npFile ? 'file-chosen' : 'upload-zone-label';
}

async function submitPost() {
  const title = document.getElementById('np-title').value.trim();
  const body  = document.getElementById('np-body').value.trim();
  if (!title) { ui.showToast('Il titolo è obbligatorio', 'error'); return; }

  const btn = document.getElementById('np-submit-btn');
  const status = document.getElementById('np-upload-status');
  btn.disabled = true;

  let file_url = null, file_name = null;
  if (npFile) {
    status.style.display = 'inline';
    try {
      const uploaded = await sb.db.uploadFile(npFile);
      file_url  = uploaded.url;
      file_name = npFile.name;
    } catch(e) {
      ui.showToast('Errore upload: ' + e.message, 'error');
      btn.disabled = false;
      status.style.display = 'none';
      return;
    }
    status.style.display = 'none';
  }

  try {
    await sb.db.insert('board_posts', {
      author_id: currentUser.id,
      title, body: body || null, file_url, file_name,
    });

    // Reset form
    document.getElementById('np-title').value = '';
    document.getElementById('np-body').value = '';
    document.getElementById('np-file-input').value = '';
    document.getElementById('np-file-label').textContent = 'Clicca per allegare un file';
    npFile = null;
    toggleNewPost();

    await loadPosts();
    ui.showToast('Post pubblicato!', 'success');

    // Notifica tutti gli utenti
    notifyNewPost(title);

  } catch(e) {
    ui.showToast('Errore: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Pin / Delete post ──────────────────────────────────────────────────────
async function togglePin(postId, currentlyPinned) {
  try {
    await sb.db.update('board_posts', `id=eq.${postId}`, { pinned: !currentlyPinned });
    await loadPosts();
    // re-select
    const updated = posts.find(p => p.id === postId);
    if (updated) { currentPost = updated; renderDetailHeader(); }
  } catch(e) { ui.showToast('Errore: ' + e.message, 'error'); }
}

async function deletePost(postId) {
  if (!confirm('Eliminare questo post e tutti i commenti?')) return;
  try {
    await sb.db.delete('board_posts', `id=eq.${postId}`);
    currentPost = null;
    document.getElementById('bk-no-select').style.display = 'flex';
    document.getElementById('bk-detail-content').style.display = 'none';
    if (window.innerWidth <= 900) closeSheet();
    await loadPosts();
    ui.showToast('Post eliminato', 'success');
  } catch(e) { ui.showToast('Errore: ' + e.message, 'error'); }
}

// ── @Mention autocomplete ──────────────────────────────────────────────────
function onCmtInput(e) {
  autoResizeTextarea(e.target);
  const val = e.target.value;
  const pos = e.target.selectionStart;

  // Trova @ prima del cursore
  const before = val.slice(0, pos);
  const match = before.match(/@(\w*)$/);

  if (match) {
    mentionQuery = match[1].toLowerCase();
    mentionStart = pos - match[0].length;
    showMentionDropdown();
  } else {
    hideMentionDropdown();
  }
}

function showMentionDropdown() {
  const filtered = allUsers.filter(u =>
    u.full_name.toLowerCase().includes(mentionQuery) && u.id !== currentUser?.id
  );
  const dd = document.getElementById('mention-dropdown');
  if (!filtered.length) { dd.style.display = 'none'; return; }

  mentionFocusIdx = 0;
  dd.style.display = 'block';
  dd.innerHTML = filtered.map((u, i) => `
    <div class="mention-item${i === 0 ? ' focused' : ''}" onclick="insertMention('${u.id}','${ui.escapeHtml(u.full_name)}')">
      <div class="m-av" style="background:${avatarColor(u.id)}">${avatarInitials(u.full_name)}</div>
      <div>
        <div class="m-name">${ui.escapeHtml(u.full_name)}</div>
        <div class="m-role">${u.role}</div>
      </div>
    </div>`).join('');
  dd._filtered = filtered;
}

function hideMentionDropdown() {
  document.getElementById('mention-dropdown').style.display = 'none';
  mentionQuery = '';
  mentionStart = -1;
}

function insertMention(userId, fullName) {
  const inp = document.getElementById('cmt-inp');
  const val = inp.value;
  const before = val.slice(0, mentionStart);
  const after  = val.slice(inp.selectionStart);
  inp.value = before + '@' + fullName + ' ' + after;
  hideMentionDropdown();
  inp.focus();
  const newPos = (before + '@' + fullName + ' ').length;
  inp.setSelectionRange(newPos, newPos);
}

function onCmtKeydown(e) {
  const dd = document.getElementById('mention-dropdown');
  if (dd.style.display === 'none') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
    return;
  }
  const items = dd.querySelectorAll('.mention-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    mentionFocusIdx = Math.min(mentionFocusIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    mentionFocusIdx = Math.max(mentionFocusIdx - 1, 0);
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const u = dd._filtered[mentionFocusIdx];
    if (u) insertMention(u.id, u.full_name);
    return;
  } else if (e.key === 'Escape') {
    hideMentionDropdown(); return;
  }
  items.forEach((el, i) => el.classList.toggle('focused', i === mentionFocusIdx));
}

// ── Email notifications ────────────────────────────────────────────────────
async function notifyNewPost(postTitle) {
  try {
    const recipients = allUsers.filter(u => u.id !== currentUser?.id);
    if (!recipients.length) return;

    const authorName = sb.getCurrentProfile()?.full_name || 'Un collaboratore';
    const html = `
      <h2 style="margin:0 0 8px;font-size:18px;color:#1a2744">${ui.escapeHtml(postTitle)}</h2>
      <p style="color:#4b5563;font-size:14px">
        <strong>${ui.escapeHtml(authorName)}</strong> ha pubblicato un nuovo post nella bacheca.
      </p>
      <a href="https://portal.indubai.it/bacheca.html" style="display:inline-block;margin-top:16px;padding:10px 20px;background:#1a2744;color:white;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px">
        Vai alla bacheca →
      </a>`;
    // Invia a ciascuno passando user_id (la edge function recupera l'email da auth.users)
    await Promise.all(recipients.map(u =>
      callEdge('send-email', {
        user_id: u.id,
        subject: `📌 Nuovo post in Bacheca: ${postTitle}`,
        html,
        event_type: 'board_new_post',
      }).catch(() => {})
    ));
  } catch(e) { console.warn('notifyNewPost:', e); }
}

async function notifyReply(replyToObj, postTitle) {
  try {
    const [orig] = await sb.db.select('board_comments', {
      columns: 'author_id',
      filter: `id=eq.${replyToObj.id}`,
    });
    if (!orig || orig.author_id === currentUser?.id) return;

    const authorName = sb.getCurrentProfile()?.full_name || 'Un collaboratore';
    await callEdge('send-email', {
      user_id: orig.author_id,
      subject: `↩ ${authorName} ha risposto al tuo commento`,
      html: `
        <p style="color:#4b5563;font-size:14px">
          <strong>${ui.escapeHtml(authorName)}</strong> ha risposto al tuo commento nel post
          <strong>"${ui.escapeHtml(postTitle)}"</strong>.
        </p>
        <a href="https://portal.indubai.it/bacheca.html" style="display:inline-block;margin-top:16px;padding:10px 20px;background:#1a2744;color:white;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px">
          Vedi la risposta →
        </a>`,
      event_type: 'board_reply',
    });
  } catch(e) { console.warn('notifyReply:', e); }
}

async function notifyMentions(body, commentId, postTitle) {
  try {
    const mentionedNames = [...body.matchAll(/@([\w\s]+?)(?=\s|$|[^a-zA-Z\s])/g)].map(m => m[1].trim().toLowerCase());
    if (!mentionedNames.length) return;

    const mentioned = allUsers.filter(u =>
      mentionedNames.some(n => u.full_name.toLowerCase() === n) && u.id !== currentUser?.id
    );
    if (!mentioned.length) return;

    const authorName = sb.getCurrentProfile()?.full_name || 'Un collaboratore';

    for (const u of mentioned) {
      await callEdge('send-email', {
        user_id: u.id,
        subject: `🔔 ${authorName} ti ha menzionato in Bacheca`,
        html: `
          <p style="color:#4b5563;font-size:14px">
            <strong>${ui.escapeHtml(authorName)}</strong> ti ha menzionato in un commento nel post
            <strong>"${ui.escapeHtml(postTitle)}"</strong>.
          </p>
          <div style="margin:16px 0;padding:12px 16px;background:#f3f4f6;border-left:4px solid #1a2744;border-radius:4px;font-size:13px;color:#374151">
            ${ui.escapeHtml(body)}
          </div>
          <a href="https://portal.indubai.it/bacheca.html" style="display:inline-block;padding:10px 20px;background:#1a2744;color:white;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px">
            Vai alla bacheca →
          </a>`,
        event_type: 'board_mention',
        entity_id: commentId,
        entity_type: 'board_comment',
      });

      // Salva menzione in DB
      try {
        await sb.db.insert('board_mentions', { comment_id: commentId, user_id: u.id, notified: true }, { returning: false });
      } catch(_) {}
    }
  } catch(e) { console.warn('notifyMentions:', e); }
}

async function callEdge(fn, body) {
  const token = sb.getSession()?.access_token;
  const res = await fetch(`${window.ENV_SUPABASE_URL}/functions/v1/${fn}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function formatBody(text) {
  return ui.escapeHtml(text).replace(/\n/g, '<br>');
}

function formatMentions(html) {
  return html.replace(/@([\w\s]+?)(?=\s|&lt;|$)/g, (_, name) =>
    `<span class="mention">@${name}</span>`
  );
}

function relativeTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'Ora';
  if (m < 60) return `${m} min fa`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h fa`;
  const d = Math.floor(h / 24);
  if (d < 7)  return `${d}g fa`;
  return ui.formatDate(iso);
}

function avatarInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

const AVATAR_COLORS = ['#1a3a5c','#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#65a30d'];
function avatarColor(id) {
  if (!id) return AVATAR_COLORS[0];
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % AVATAR_COLORS.length;
  return AVATAR_COLORS[h];
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 400) + 'px';
}

// ── Mobile sheet ───────────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('bk-detail').classList.add('sheet-open');
  document.getElementById('bk-sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('bk-detail').classList.remove('sheet-open');
  document.getElementById('bk-sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
