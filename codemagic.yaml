workflows:

  # ── iOS BUILD ────────────────────────────────────────────────
  indubai-ios:
    name: InDubai iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Main
      ios_signing:
        distribution_type: app_store
        bundle_identifier: it.indubai.clientportal
      vars:
        BUNDLE_ID: it.indubai.clientportal
        XCODE_WORKSPACE: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "6743720585"
      node: 22

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          npx cap sync ios
          # Rimuovi riferimento a OnesignalCordovaPlugin che non esiste (plugin rimosso)
          rm -rf ios/capacitor-cordova-ios-plugins/sources/OnesignalCordovaPlugin 2>/dev/null || true
          # Rimuovi la voce dal Package.swift dei cordova plugins se esiste
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i "" "/OnesignalCordovaPlugin/d" ios/App/CapApp-SPM/Package.swift || true
          fi
          # Pulisci anche il podspec se presente
          if [ -f "ios/capacitor-cordova-ios-plugins/CordovaPlugins.podspec" ]; then
            sed -i "" "/OnesignalCordovaPlugin/d" ios/capacitor-cordova-ios-plugins/CordovaPlugins.podspec || true
          fi
          echo "✅ Cleaned OnesignalCordovaPlugin references"
          # Fix swift-tools-version se cap sync genera .iOS(.v18) che richiede 6.0
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i "" "s/\/\/ swift-tools-version: 5\.[0-9]/\/\/ swift-tools-version: 6.0/" ios/App/CapApp-SPM/Package.swift || true
            echo "✅ Patched swift-tools-version to 6.0"
          fi

      - name: Set bundle ID and version
        script: |
          cd ios/App
          # Prendi l'ultimo build number da App Store Connect e incrementa
          BUILD_NUMBER=17
          sed -i "" "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" App.xcodeproj/project.pbxproj
          sed -i "" "s/MARKETING_VERSION = [0-9.]*/MARKETING_VERSION = 1.4.0/g" App.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist
          echo "Build number set to $BUILD_NUMBER"
          grep "CURRENT_PROJECT_VERSION" App.xcodeproj/project.pbxproj

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true



  # ── SIMULATOR (App Preview) ──────────────────────────────────
  indubai-simulator:
    name: InDubai iOS Simulator
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      groups:
        - Main
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "6743720585"
      node: 22

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          npx cap sync ios
          rm -rf ios/capacitor-cordova-ios-plugins/sources/OnesignalCordovaPlugin 2>/dev/null || true
          sed -i "" "/OnesignalCordovaPlugin/d" ios/App/CapApp-SPM/Package.swift 2>/dev/null || true
          echo "✅ Cleaned OnesignalCordovaPlugin references"

      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

  # ── ANDROID BUILD ────────────────────────────────────────────
  indubai-android:
    name: InDubai Android
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - indubai_keystore              # nome del keystore in Codemagic
      vars:
        PACKAGE_NAME: it.indubai.clientportal
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Set package name
        script: |
          # Aggiorna applicationId in build.gradle se necessario
          cd android
          sed -i "s/applicationId .*/applicationId \"$PACKAGE_NAME\"/" app/build.gradle

      - name: Build Android APK/AAB
        script: |
          cd android
          ./gradlew bundleRelease   # AAB per Play Store
          # ./gradlew assembleRelease  # APK per distribuzione diretta

      - name: Sign AAB
        script: |
          cd android/app/build/outputs/bundle/release
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore $CM_KEYSTORE_PATH \
            -storepass $CM_KEYSTORE_PASSWORD \
            -keypass $CM_KEY_PASSWORD \
            app-release.aab $CM_KEY_ALIAS

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal                  # internal → alpha → beta → production
        submit_as_draft: true
