workflows:

  # ── iOS BUILD ────────────────────────────────────────────────
  indubai-ios:
    name: InDubai iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - Main
      ios_signing:
        distribution_type: app_store
        bundle_identifier: it.indubai.clientportal
      vars:
        BUNDLE_ID: it.indubai.clientportal
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: node_modules/.bin/cap sync ios

      - name: Set bundle ID
        script: |
          cd ios/App
          xcrun agvtool new-marketing-version 1.0.0
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist

      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true


  # ── ANDROID BUILD ────────────────────────────────────────────
  indubai-android:
    name: InDubai Android
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - indubai_keystore              # nome del keystore in Codemagic
      vars:
        PACKAGE_NAME: it.indubai.clientportal
      node: 18
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Capacitor sync
        script: node_modules/.bin/cap sync android

      - name: Set package name
        script: |
          # Aggiorna applicationId in build.gradle se necessario
          cd android
          sed -i "s/applicationId .*/applicationId \"$PACKAGE_NAME\"/" app/build.gradle

      - name: Build Android APK/AAB
        script: |
          cd android
          ./gradlew bundleRelease   # AAB per Play Store
          # ./gradlew assembleRelease  # APK per distribuzione diretta

      - name: Sign AAB
        script: |
          cd android/app/build/outputs/bundle/release
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore $CM_KEYSTORE_PATH \
            -storepass $CM_KEYSTORE_PASSWORD \
            -keypass $CM_KEY_PASSWORD \
            app-release.aab $CM_KEY_ALIAS

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal                  # internal → alpha → beta → production
        submit_as_draft: true
