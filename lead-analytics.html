<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lead per Fonte — InDubai Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/config.js"></script>
  <style>
    .la-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .la-range-btn { background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-muted); }
    .la-range-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .la-refresh-btn { margin-left: auto; background: #f0f4f8; border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .la-refresh-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .la-custom-range { display: flex; align-items: center; gap: 6px; background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 8px; }
    .la-custom-range input[type=date] { border: none; font-size: 12px; font-family: inherit; color: var(--text); outline: none; }
    .la-custom-range span { font-size: 11px; color: var(--text-muted); }
    .la-custom-apply { background: var(--accent); border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; color: #1e2d42; }
    .la-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .la-kpi { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; }
    .la-kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 8px; }
    .la-kpi-val { font-size: 26px; font-weight: 800; color: var(--primary); }
    .la-kpi-delta { font-size: 12px; font-weight: 700; margin-top: 6px; }
    .la-kpi-delta.up { color: var(--success); }
    .la-kpi-delta.down { color: var(--danger); }
    .la-kpi-delta.flat { color: var(--text-muted); }
    .la-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 900px) { .la-grid { grid-template-columns: 1fr; } }
    .la-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 22px; }
    .la-card-title { font-size: 14px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .la-card-hint { font-size: 11px; font-weight: 500; color: var(--text-muted); }
    .la-source-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .la-source-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; background: white; color: var(--text); transition: all .12s; }
    .la-source-chip.off { opacity: .4; }
    .la-source-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .la-source-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; }
    .la-source-label { flex: 0 0 150px; font-size: 12px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .la-bar-track { flex: 1; height: 10px; border-radius: 6px; background: var(--surface2); overflow: hidden; }
    .la-bar-fill { height: 100%; border-radius: 6px; }
    .la-source-count { flex: 0 0 70px; text-align: right; font-size: 12px; font-weight: 700; color: var(--text-muted); }
    .la-legend-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
    .la-simple-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
    .la-simple-row:last-child { border-bottom: none; }
    .la-simple-val { font-weight: 700; color: var(--primary); }
    .la-trend-wrap { display: flex; align-items: flex-end; gap: 6px; height: 180px; overflow-x: auto; padding-bottom: 4px; }
    .la-trend-col { display: flex; flex-direction: column-reverse; min-width: 22px; height: 100%; border-radius: 4px 4px 0 0; overflow: hidden; }
    .la-trend-seg { width: 100%; }
    .la-trend-labels { display: flex; gap: 6px; margin-top: 6px; overflow-x: auto; }
    .la-trend-label { min-width: 22px; font-size: 9px; color: var(--text-muted); text-align: center; white-space: nowrap; transform: rotate(-45deg); transform-origin: top left; }
    .la-won-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .la-won-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); padding: 8px 10px; border-bottom: 2px solid var(--border); }
    .la-won-table td { padding: 10px; border-bottom: 1px solid var(--border); }
    .la-won-table tr:last-child td { border-bottom: none; }
    .la-won-table td.num { text-align: right; font-weight: 700; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <link rel="manifest" href="/manifest-admin.json">
  <meta name="theme-color" content="#0f1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InDubai">
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">🎯 Lead per Fonte</div>
    </div>
    <div class="page-content">

      <div class="la-toolbar">
        <button class="la-range-btn" data-days="7" onclick="setRange(7)">7 giorni</button>
        <button class="la-range-btn" data-days="30" onclick="setRange(30)">30 giorni</button>
        <button class="la-range-btn active" data-days="90" onclick="setRange(90)">90 giorni</button>
        <button class="la-range-btn" data-days="180" onclick="setRange(180)">6 mesi</button>
        <button class="la-range-btn" data-days="365" onclick="setRange(365)">12 mesi</button>
        <button class="la-range-btn" data-days="all" onclick="setRange('all')">Da sempre</button>
        <div class="la-custom-range">
          <input type="date" id="la-start" />
          <span>→</span>
          <input type="date" id="la-end" />
          <button class="la-custom-apply" onclick="applyCustomRange()">Applica</button>
        </div>
        <button class="la-refresh-btn" onclick="loadAnalytics()">↻ Aggiorna</button>
      </div>

      <div id="la-body">
        <div style="text-align:center;padding:60px"><div class="spinner"></div></div>
      </div>

    </div>
  </div>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/app.js"></script>
<script src="/js/i18n.js"></script>
<script>
const FN_URL = 'https://gvdoqcgkzbziqufahhxh.supabase.co/functions/v1/ghl-lead-analytics';
let currentRange = 90;
let customRange = null; // {start, end}
let lastData = null;
let activeSources = new Set();

const SOURCE_COLORS = {
  'Facebook': '#1877f2', 'Instagram': '#e1306c', 'Google Ads': '#fbbc05',
  'Google (Organico)': '#34a853', 'Organico (SEO)': '#16a34a', 'Diretto': '#6b7a95',
  'Social (altro)': '#8b5cf6', 'WhatsApp': '#25d366', 'Referral': '#c9a84c',
  'Inserito manualmente (CRM)': '#64748b', 'Non specificato': '#c1c9d6',
};
function colorFor(source) { return SOURCE_COLORS[source] || '#94a3b8'; }

function setRange(days) {
  currentRange = days;
  customRange = null;
  document.getElementById('la-start').value = '';
  document.getElementById('la-end').value = '';
  document.querySelectorAll('.la-range-btn').forEach(b => b.classList.toggle('active', String(b.dataset.days) === String(days)));
  loadAnalytics();
}

function applyCustomRange() {
  const start = document.getElementById('la-start').value;
  const end = document.getElementById('la-end').value;
  if (!start || !end) { alert('Seleziona entrambe le date'); return; }
  if (start > end) { alert('La data di inizio deve precedere quella di fine'); return; }
  customRange = { start, end };
  document.querySelectorAll('.la-range-btn').forEach(b => b.classList.remove('active'));
  loadAnalytics();
}

async function loadAnalytics() {
  const body = document.getElementById('la-body');
  body.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div></div>';
  try {
    let qs;
    if (customRange) qs = `start=${customRange.start}&end=${customRange.end}&compare=1`;
    else if (currentRange === 'all') qs = 'all=1';
    else qs = `days=${currentRange}&compare=1`;

    const res = await fetch(`${FN_URL}?${qs}`, {
      headers: { Authorization: 'Bearer ' + (sb.getSession()?.access_token || window.ENV_SUPABASE_ANON_KEY) },
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    lastData = data;
    activeSources = new Set((data.bySource || []).map(s => s.source));
    render(data);
  } catch (e) {
    body.innerHTML = `<div class="alert alert-danger">Errore nel caricamento dati GHL: ${ui.escapeHtml(e.message)}</div>`;
  }
}

function toggleSource(source) {
  if (activeSources.has(source)) activeSources.delete(source); else activeSources.add(source);
  if (lastData) render(lastData);
}

function render(data) {
  const body = document.getElementById('la-body');
  const totalRange = data.totalInRange || 0;

  // Delta vs periodo precedente
  let deltaHTML = '';
  if (data.previousPeriod) {
    const prevTotal = data.previousPeriod.totalInRange || 0;
    if (prevTotal > 0) {
      const deltaPct = Math.round(((totalRange - prevTotal) / prevTotal) * 1000) / 10;
      const cls = deltaPct > 0 ? 'up' : deltaPct < 0 ? 'down' : 'flat';
      const arrow = deltaPct > 0 ? '▲' : deltaPct < 0 ? '▼' : '—';
      deltaHTML = `<div class="la-kpi-delta ${cls}">${arrow} ${Math.abs(deltaPct)}% vs periodo precedente (${prevTotal})</div>`;
    } else if (totalRange > 0) {
      deltaHTML = `<div class="la-kpi-delta up">▲ nuovo rispetto a periodo precedente (0 lead)</div>`;
    }
  }

  const won = data.won || { total: 0, totalValue: 0, bySource: [] };
  const convRate = totalRange ? Math.round((won.total / totalRange) * 1000) / 10 : 0;

  const kpis = `
    <div class="la-kpis">
      <div class="la-kpi"><div class="la-kpi-label">Lead nel periodo</div><div class="la-kpi-val">${totalRange.toLocaleString('it-IT')}</div>${deltaHTML}</div>
      <div class="la-kpi"><div class="la-kpi-label">Lead totali (da sempre)</div><div class="la-kpi-val">${(data.totalAllTime||0).toLocaleString('it-IT')}</div></div>
      <div class="la-kpi"><div class="la-kpi-label">Clienti vinti nel periodo</div><div class="la-kpi-val">${won.total}</div><div class="la-kpi-delta flat">${convRate}% conversione lead→vinto</div></div>
      <div class="la-kpi"><div class="la-kpi-label">Valore vinto nel periodo</div><div class="la-kpi-val" style="font-size:20px">AED ${Math.round(won.totalValue).toLocaleString('it-IT')}</div></div>
      <div class="la-kpi"><div class="la-kpi-label">Fonte principale</div><div class="la-kpi-val" style="font-size:18px">${ui.escapeHtml(data.bySource?.[0]?.source || '—')}</div></div>
      <div class="la-kpi"><div class="la-kpi-label">Fonti tracciate</div><div class="la-kpi-val">${data.bySource?.length || 0}</div></div>
    </div>`;

  // Filtro fonte (chip togglabili) — condiviso tra distribuzione e trend
  const filterChips = (data.bySource || []).map(s => {
    const off = activeSources.has(s.source) ? '' : 'off';
    return `<div class="la-source-chip ${off}" onclick="toggleSource('${s.source.replace(/'/g,"\\'")}')">
      <span class="dot" style="background:${colorFor(s.source)}"></span>${ui.escapeHtml(s.source)}
    </div>`;
  }).join('');

  // Distribuzione filtrata
  const visibleSources = (data.bySource || []).filter(s => activeSources.has(s.source));
  const visibleTotal = visibleSources.reduce((a, s) => a + s.count, 0);
  const bySourceRows = visibleSources.map(s => {
    const pct = visibleTotal ? Math.round((s.count / visibleTotal) * 1000) / 10 : 0;
    return `
    <div class="la-source-row">
      <div class="la-source-label"><span class="la-legend-dot" style="background:${colorFor(s.source)}"></span>${ui.escapeHtml(s.source)}</div>
      <div class="la-bar-track"><div class="la-bar-fill" style="width:${pct}%;background:${colorFor(s.source)}"></div></div>
      <div class="la-source-count">${s.count} (${pct}%)</div>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:20px;color:var(--text-muted)">Nessuna fonte selezionata</div>';

  // Trend stacked bars (solo fonti attive)
  const periods = data.trend || [];
  const maxTotal = Math.max(1, ...periods.map(p => Object.entries(p.sources).filter(([s]) => activeSources.has(s)).reduce((a,[,c])=>a+c,0)));
  const trendCols = periods.map(p => {
    const entries = Object.entries(p.sources).filter(([s]) => activeSources.has(s));
    const total = entries.reduce((a,[,c])=>a+c,0);
    const segs = entries.map(([s,c]) => {
      const h = (c / maxTotal) * 100;
      return `<div class="la-trend-seg" style="height:${h}%;background:${colorFor(s)}" title="${ui.escapeHtml(s)}: ${c}"></div>`;
    }).join('');
    return `<div class="la-trend-col" style="height:${Math.max(4,(total/maxTotal)*100)}%" title="${p.period}: ${total} lead">${segs}</div>`;
  }).join('');
  const trendLabels = periods.map(p => `<div class="la-trend-label">${p.period.slice(5)}</div>`).join('');

  const landingRows = (data.topLandingPages || []).map(l => `
    <div class="la-simple-row"><span>${ui.escapeHtml(l.label)}</span><span class="la-simple-val">${l.count}</span></div>`).join('')
    || '<div style="text-align:center;padding:16px;color:var(--text-muted)">—</div>';

  const tagRows = (data.topTags || []).map(t => `
    <div class="la-simple-row"><span>${ui.escapeHtml(t.label)}</span><span class="la-simple-val">${t.count}</span></div>`).join('')
    || '<div style="text-align:center;padding:16px;color:var(--text-muted)">—</div>';

  const leadBySource = Object.fromEntries((data.bySource || []).map(s => [s.source, s.count]));
  const wonRows = (won.bySource || []).map(w => {
    const leadCount = leadBySource[w.source] || 0;
    const conv = leadCount ? Math.round((w.count / leadCount) * 1000) / 10 : null;
    return `
    <tr>
      <td><span class="la-legend-dot" style="background:${colorFor(w.source)}"></span>${ui.escapeHtml(w.source)}</td>
      <td class="num">${w.count}</td>
      <td class="num">AED ${Math.round(w.value).toLocaleString('it-IT')}</td>
      <td class="num">${conv !== null ? conv + '%' : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">Nessun cliente vinto nel periodo selezionato</td></tr>`;

  const wonTable = `
    <div class="la-card" style="margin-bottom:20px">
      <div class="la-card-title"><span>Clienti vinti per fonte</span><span class="la-card-hint">in base alla data di chiusura (won) nel periodo</span></div>
      <table class="la-won-table">
        <thead><tr><th>Fonte</th><th style="text-align:right">Vinti</th><th style="text-align:right">Valore</th><th style="text-align:right">Conversione</th></tr></thead>
        <tbody>${wonRows}</tbody>
      </table>
    </div>`;

  body.innerHTML = `
    ${kpis}
    <div class="la-source-filters">${filterChips}</div>
    <div class="la-grid">
      <div class="la-card">
        <div class="la-card-title"><span>Distribuzione per fonte</span><span class="la-card-hint">${visibleTotal} lead mostrati</span></div>
        ${bySourceRows}
      </div>
      <div class="la-card">
        <div class="la-card-title"><span>Andamento lead nel tempo</span></div>
        <div class="la-trend-wrap">${trendCols || ''}</div>
        <div class="la-trend-labels">${trendLabels}</div>
      </div>
    </div>
    <div class="la-grid">
      <div class="la-card">
        <div class="la-card-title">Top moduli / landing page</div>
        ${landingRows}
      </div>
      <div class="la-card">
        <div class="la-card-title">Top tag GHL</div>
        ${tagRows}
      </div>
    </div>
    ${wonTable}`;
}

loadAnalytics();
</script>
</body>
</html>
